                uploadStatus.textContent = 'Please select a valid image file';
                uploadStatus.style.color = '#dc2626';
                return;
            }

            uploadStatus.textContent = 'Processing image...';
            uploadStatus.style.color = '#6b7280';

            try {
                const tempImg = document.createElement('img');
                const tempUrl = URL.createObjectURL(file);
                tempImg.src = tempUrl;
                try {
                    await new Promise((resolve, reject) => {
                        tempImg.onload = resolve;
                        tempImg.onerror = reject;
                    });
                    if (!isWorkspaceGenerationCurrent(generation)) return;

                    const originalWidth = tempImg.naturalWidth;
                    const originalHeight = tempImg.naturalHeight;
                    const preprocessingResult = await preprocessForSVG(tempImg);
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    const imageForVectorization = preprocessingResult.processedImage;
                    const isBW = await isBlackAndWhite(imageForVectorization);
                    if (!isWorkspaceGenerationCurrent(generation)) return;

                    const imageWrapper = document.createElement('div');
                    imageWrapper.className = 'image-wrapper';

                    const uploadId = 'uploaded_' + Date.now();
                    if (isBW) {
                        uploadStatus.textContent = 'Converting to SVG...';

                        const initialMode = 'binary';
                        imageForVectorization._renderMode = initialMode;
                        imageForVectorization._traceParams = defaultTraceParams();
                        const svg = await vectorizeImage(imageForVectorization, originalWidth, originalHeight, initialMode);
                        if (!isWorkspaceGenerationCurrent(generation)) return;
                        const record = createSourceRuntimeRecord({
                            generation,
                            blob: file,
                            origin: { kind: 'upload', productId: uploadId, variant: '', filename: file.name || '', url: '' },
                            width: originalWidth,
                            height: originalHeight,
                            preprocess: true
                        });
                        if (!record) return;
                        renderConvertedSource(record, imageForVectorization, svg, imageWrapper);

                        uploadStatus.textContent = 'Image converted successfully!';
                        uploadStatus.style.color = '#059669';
                    } else {
                        const note = document.createElement('p');
                        note.style.cssText = 'color: #f59e0b; font-size: 0.875rem; margin: 0.5rem 0 0 0;';
                        note.textContent = 'This image may not be ideal for SVG conversion. Best results with high-contrast black and white images.';

                        const record = createSourceRuntimeRecord({
                            generation,
                            blob: file,
                            origin: { kind: 'upload', productId: uploadId, variant: '', filename: file.name || '', url: '' },
                            width: originalWidth,
                            height: originalHeight,
                            preprocess: true
                        });
                        if (!record) return;
                        renderRasterSource(record, imageWrapper, {
                            alt: 'Uploaded image',
                            note,
                            onForceConvertStart: () => {
                                if (!isWorkspaceGenerationCurrent(generation)) return;
                                uploadStatus.textContent = 'Force-converting to SVG...';
                                uploadStatus.style.color = '#6b7280';
                            },
                            onForceConvert: () => {
                                if (!isWorkspaceGenerationCurrent(generation)) return;
                                uploadStatus.textContent = 'Image force-converted to SVG!';
                                uploadStatus.style.color = '#059669';
                            },
                            onForceConvertEnd: converted => {
                                if (converted ||
                                    uploadStatus.textContent !== 'Force-converting to SVG...') return;
                                uploadStatus.textContent = 'Image uploaded (not converted to SVG)';
                                uploadStatus.style.color = '#f59e0b';
                            }
                        });

                        uploadStatus.textContent = 'Image uploaded (not converted to SVG)';
                        uploadStatus.style.color = '#f59e0b';
                    }

                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    imageContainer.insertBefore(imageWrapper, imageContainer.firstChild);
                } finally {
                    URL.revokeObjectURL(tempUrl);
                }

            } catch (error) {
                if (isWorkspaceGenerationCurrent(generation)) {
                    console.error('Error processing uploaded image:', error);
                    uploadStatus.textContent = 'Error processing image';
                    uploadStatus.style.color = '#dc2626';
                }
            } finally {
                if (!isWorkspaceGenerationCurrent(generation) &&
                    (uploadStatus.textContent === 'Processing image...' ||
                        uploadStatus.textContent === 'Converting to SVG...')) {
                    const previousWasPending = previousStatus.text === 'Processing image...' ||
                        previousStatus.text === 'Converting to SVG...';
                    uploadStatus.textContent = previousStatus.text && !previousWasPending
                        ? previousStatus.text
                        : 'Upload cancelled';
                    uploadStatus.style.color = previousStatus.text && !previousWasPending
                        ? previousStatus.color
                        : '#6b7280';
                }
            }
        }

        async function forceConvertImage(blob, originalWidth, originalHeight, productId, imageWrapper, record) {
            const generation = record && record.generation !== undefined
                ? record.generation
                : workspaceGeneration;
            if (!isWorkspaceGenerationCurrent(generation)) return false;

            // Load original (color) image from blob. The object URL is only
            // needed long enough to decode the bitmap into `img`, so it's
            // revoked immediately after (success or failure) rather than
            // leaking for the lifetime of the page.
            const img = document.createElement('img');
            const decodeUrl = URL.createObjectURL(blob);
            img.src = decodeUrl;
            try {
                await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });
            } finally {
                URL.revokeObjectURL(decodeUrl);
            }
            if (!isWorkspaceGenerationCurrent(generation)) return false;

            const initialMode = 'binary';
            img._renderMode = initialMode;
            // _traceParams is left unset here: vectorizeImage falls back to
            // defaultTraceParams() for this initial conversion, and
            // renderConvertedSource's merge seeds the record's persisted copy —
            // no need to compute the defaults a second time up front.
            const svg = await vectorizeImage(img, originalWidth, originalHeight, initialMode);
            if (!isWorkspaceGenerationCurrent(generation)) return false;

            // Reuse the already-registered source record when one was passed
            // (the normal path, coming from renderRasterSource) so the source
            // keeps its stable id; otherwise synthesize a standalone record so
            // force conversion still works when called directly.
            const sourceRecord = record || {
                id: `standalone-${productId}-${Date.now()}`,
                generation,
                blob,
                origin: { kind: 'catalog', productId, variant: '', filename: '', url: '' },
                width: originalWidth,
                height: originalHeight,
                preprocess: false
            };

            // Keep the live raster card intact while decode/vectorization is in
            // flight. Only swap its DOM after the generation check succeeds;
            // rollback can therefore reattach a complete, usable old card.
            imageWrapper.innerHTML = '';
            renderConvertedSource(sourceRecord, img, svg, imageWrapper);
            return true;
        }

        function blobToDataUrl(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function adjustImageHue(img, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] < 250 || data[i + 1] < 250 || data[i + 2] < 250) {
                    data[i] = r;
                    data[i + 1] = g;
                    data[i + 2] = b;
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            img.src = canvas.toDataURL();
        }

        function hasStampPackageHeader(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const totalPixels = canvas.width * canvas.height;
            const sampleStep = Math.max(1, Math.floor(Math.sqrt(totalPixels / 50000)));

            let sampled = 0;
            let nearBlack = 0;
            let topSampled = 0;
            let topNearBlack = 0;

            for (let y = 0; y < canvas.height; y += sampleStep) {
                for (let x = 0; x < canvas.width; x += sampleStep) {
                    const idx = (y * canvas.width + x) * 4;
                    const r = data[idx];
                    const g = data[idx + 1];
                    const b = data[idx + 2];
                    const isNearBlack = r < 45 && g < 45 && b < 45;

                    sampled++;
                    if (isNearBlack) nearBlack++;
                    if (y < canvas.height * 0.55) {
                        topSampled++;
                        if (isNearBlack) topNearBlack++;
                    }
                }
            }

            if (sampled === 0 || topSampled === 0) return false;
            return (nearBlack / sampled) > 0.008 && (topNearBlack / topSampled) > 0.012;
        }

        function detectDieSetPalette(img) {
            if (hasStampPackageHeader(img)) return false;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const totalPixels = canvas.width * canvas.height;
            // Sample large images sparsely to keep detection quick and predictable.
            const sampleStep = Math.max(1, Math.floor(Math.sqrt(totalPixels / 50000)));

            let sampled = 0;
            let activePixels = 0;
            let activeLowSaturation = 0;
            let activeNearPalette = 0;
            let activeFarFromPalette = 0;
            let activeMidDark = 0;
            let activeVivid = 0;
            let solidDieShape = 0;

            function minPaletteDistance(r, g, b) {
                // Distance to the closest known die-sheet neutral tone.
                let minDist = Infinity;
                for (const [pr, pg, pb] of DIE_SET_PALETTE) {
                    const dr = r - pr;
                    const dg = g - pg;
                    const db = b - pb;
                    const dist = Math.sqrt((dr * dr) + (dg * dg) + (db * db));
                    if (dist < minDist) minDist = dist;
                }
                return minDist;
            }

            for (let y = 0; y < canvas.height; y += sampleStep) {
                for (let x = 0; x < canvas.width; x += sampleStep) {
                    const idx = (y * canvas.width + x) * 4;
                    const r = data[idx];
                    const g = data[idx + 1];
                    const b = data[idx + 2];
                    const maxC = Math.max(r, g, b);
                    const minC = Math.min(r, g, b);
                    const lum = (0.299 * r) + (0.587 * g) + (0.114 * b);
                    const paletteDist = minPaletteDistance(r, g, b);

                    sampled++;
                    // Ignore near-white background when classifying die-set palette behavior.
                    if (lum >= 245) continue;

                    activePixels++;
                    const chroma = maxC - minC;
                    // Die sheets are mostly neutral grays/off-whites, so chroma stays low.
                    if (chroma < 22) activeLowSaturation++;
                    // "Near" and "far" bins let us require palette clustering and reject other colors.
                    if (paletteDist < 36) activeNearPalette++;
                    if (paletteDist > 72) activeFarFromPalette++;
                    // Mid-dark pixels represent the gray die shapes (not just white paper).
                    if (lum > 70 && lum < 205) activeMidDark++;
                    // Vivid pixels indicate normal product photography and should disqualify.
                    if (chroma > 42) activeVivid++;
                    // Standalone die photos have a meaningful amount of flat dark-gray material.
                    if (chroma < 18 && paletteDist < 28 && lum > 65 && lum < 155) solidDieShape++;
                }
            }

            if (sampled === 0) return false;
            // Require enough non-background coverage to avoid classifying mostly empty frames.
            if (activePixels < Math.max(150, sampled * 0.06)) return false;

            const activeLowSatPct = activeLowSaturation / activePixels;
            const activeNearPalettePct = activeNearPalette / activePixels;
            const activeFarPalettePct = activeFarFromPalette / activePixels;
            const activeMidDarkPct = activeMidDark / activePixels;
            const activeVividPct = activeVivid / activePixels;
            const solidDieShapePct = solidDieShape / sampled;

            // Final gate: strongly neutral + palette-clustered + little color outside palette.
            return (
                activeLowSatPct > 0.9 &&
                activeNearPalettePct > 0.9 &&
                activeFarPalettePct < 0.16 &&
                activeMidDarkPct > 0.12 &&
                activeVividPct < 0.08 &&
                solidDieShapePct > 0.04
            );
        }

        function percentileFromHistogram(histogram, total, percentile) {
            const target = total * percentile;
            let cumulative = 0;
            for (let i = 0; i < 256; i++) {
                cumulative += histogram[i];
                if (cumulative >= target) return i;
            }
            return 255;
        }

        function otsuThreshold(histogram, total) {
            let sum = 0;
            for (let i = 0; i < 256; i++) {
                sum += i * histogram[i];
            }

            let sumBackground = 0;
            let weightBackground = 0;
            let maxVariance = 0;
            let bestThreshold = 128;

            for (let i = 0; i < 256; i++) {
                weightBackground += histogram[i];
                if (weightBackground === 0) continue;

                const weightForeground = total - weightBackground;
                if (weightForeground === 0) break;

                sumBackground += i * histogram[i];
                const meanBackground = sumBackground / weightBackground;
                const meanForeground = (sum - sumBackground) / weightForeground;
                const variance = weightBackground * weightForeground * ((meanBackground - meanForeground) ** 2);

                if (variance > maxVariance) {
                    maxVariance = variance;
                    bestThreshold = i;
                }
            }

            return bestThreshold;
        }

        async function createNormalizedDieSetImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const firstHistogram = new Uint32Array(256);

            for (let i = 0; i < data.length; i += 4) {
                const gray = Math.round((0.299 * data[i]) + (0.587 * data[i + 1]) + (0.114 * data[i + 2]));
                firstHistogram[gray]++;
            }

            const totalPixels = canvas.width * canvas.height;
            const low = percentileFromHistogram(firstHistogram, totalPixels, 0.02);
            const high = percentileFromHistogram(firstHistogram, totalPixels, 0.98);
            const stretchRange = Math.max(1, high - low);

            const stretchedHistogram = new Uint32Array(256);

            for (let i = 0; i < data.length; i += 4) {
                const gray = (0.299 * data[i]) + (0.587 * data[i + 1]) + (0.114 * data[i + 2]);
                const normalized = Math.max(0, Math.min(255, ((gray - low) * 255) / stretchRange));
                const gammaAdjusted = Math.pow(normalized / 255, 0.9) * 255;
                const outputGray = Math.max(0, Math.min(255, Math.round(gammaAdjusted)));
                stretchedHistogram[outputGray]++;
                data[i] = outputGray;
                data[i + 1] = outputGray;
                data[i + 2] = outputGray;
            }

            let threshold = otsuThreshold(stretchedHistogram, totalPixels);
            threshold = Math.max(90, Math.min(200, threshold));

            for (let i = 0; i < data.length; i += 4) {
                const value = data[i] < threshold ? 0 : 255;
                data[i] = value;
                data[i + 1] = value;
                data[i + 2] = value;
            }

            ctx.putImageData(imageData, 0, 0);

            const normalizedImage = new Image();
            normalizedImage.src = canvas.toDataURL('image/png');
            await new Promise((resolve, reject) => {
                normalizedImage.onload = resolve;
                normalizedImage.onerror = reject;
            });
            return normalizedImage;
        }

        async function preprocessForSVG(img) {
            const isDieSetLike = detectDieSetPalette(img);
            if (!isDieSetLike) {
                return {
                    processedImage: img,
                    dieSetDetected: false
                };
            }

            const normalized = await createNormalizedDieSetImage(img);
            return {
                processedImage: normalized,
                dieSetDetected: true
            };
        }

        async function isBlackAndWhite(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            let blackPixels = 0;
            let whitePixels = 0;
            let totalPixels = 0;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // Check if pixel is black (all channels close to 0)
                if (r < 50 && g < 50 && b < 50) {
                    blackPixels++;
                }
                // Check if pixel is white (all channels close to 255)
                else if (r > 200 && g > 200 && b > 200) {
                    whitePixels++;
                }
                totalPixels++;
            }
            
            const blackPercentage = (blackPixels / totalPixels) * 100;
            const whitePercentage = (whitePixels / totalPixels) * 100;
            
            // Consider it black and white if more than 90% of pixels are either black or white
            return (blackPercentage + whitePercentage) > 90;
        }

        function medianCutQuantize(pixels, numColors) {
            if (pixels.length === 0) return [[0, 0, 0]];
            let buckets = [pixels];
            while (buckets.length < numColors) {
                let maxRange = -1, maxIdx = 0, maxCh = 0;
                for (let bi = 0; bi < buckets.length; bi++) {
                    const bk = buckets[bi];
                    if (bk.length < 2) continue;
                    for (let ch = 0; ch < 3; ch++) {
                        let lo = 255, hi = 0;
                        for (const p of bk) { if (p[ch] < lo) lo = p[ch]; if (p[ch] > hi) hi = p[ch]; }
                        if (hi - lo > maxRange) { maxRange = hi - lo; maxIdx = bi; maxCh = ch; }
                    }
                }
                if (maxRange <= 0) break;
                const bk = buckets[maxIdx];
                bk.sort((a, b) => a[maxCh] - b[maxCh]);
                const mid = bk.length >> 1;
                buckets.splice(maxIdx, 1, bk.slice(0, mid), bk.slice(mid));
            }
            return buckets.map(bk => {
                if (bk.length === 0) return [0, 0, 0];
                let sr = 0, sg = 0, sb = 0;
                for (const p of bk) { sr += p[0]; sg += p[1]; sb += p[2]; }
                const n = bk.length;
                return [Math.round(sr / n), Math.round(sg / n), Math.round(sb / n)];
            });
        }

        function traceLayerWithPotrace(dataUrl, params) {
            params = params || {};
            return new Promise(resolve => {
                Potrace.setParameter({
                    turdsize: params.turdsize !== undefined ? params.turdsize : 25,
                    alphamax: params.alphamax !== undefined ? params.alphamax : 0.8,
                    optcurve: true,
                    opttolerance: params.opttolerance !== undefined ? params.opttolerance : 0.2
                });
                Potrace.loadImageFromUrl(dataUrl);
                Potrace.process(function() {
                    const svg = Potrace.getSVG(1);
                    const match = svg.match(/<path[^>]*\bd="([^"]*)"/);
                    resolve(match && match[1] && match[1].trim() ? match[1] : null);
                });
            });
        }

        async function convertToColorSVG(img, originalWidth, originalHeight, params) {
            // Backwards-compat: callers used to pass a raw numColors integer.
            if (typeof params === 'number') params = { numColors: params };
            params = params || {};
            const numColors = params.numColors || 8;
            const canvas = document.createElement('canvas');
            canvas.width = originalWidth;
            canvas.height = originalHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0, originalWidth, originalHeight);
            const imageData = ctx.getImageData(0, 0, originalWidth, originalHeight);
            const data = imageData.data;
            const totalPx = originalWidth * originalHeight;

            // Sample pixels for quantization (every Nth pixel for speed)
            const step = Math.max(1, Math.floor(Math.sqrt(totalPx / 60000)));
            const sampled = [];
            for (let y = 0; y < originalHeight; y += step) {
                for (let x = 0; x < originalWidth; x += step) {
                    const i = (y * originalWidth + x) * 4;
                    const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
                    if (a < 128) continue;
                    if (r > 240 && g > 240 && b > 240) continue;
                    sampled.push([r, g, b]);
                }
            }

            const palette = medianCutQuantize(sampled, numColors);

            // Pre-assign every pixel to its nearest palette index
            const assignment = new Uint8Array(totalPx);
            const BG_INDEX = 255;
            for (let i = 0, pi = 0; i < data.length; i += 4, pi++) {
                const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
                if (a < 128 || (r > 240 && g > 240 && b > 240)) {
                    assignment[pi] = BG_INDEX;
                    continue;
                }
                let minD = Infinity, best = 0;
                for (let ci = 0; ci < palette.length; ci++) {
                    const dr = r - palette[ci][0], dg = g - palette[ci][1], db = b - palette[ci][2];
                    const d = dr * dr + dg * dg + db * db;
                    if (d < minD) { minD = d; best = ci; }
                }
                assignment[pi] = best;
            }

            // Trace each color layer
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = originalWidth;
            maskCanvas.height = originalHeight;
            const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

            const layers = [];
            for (let ci = 0; ci < palette.length; ci++) {
                const maskData = maskCtx.createImageData(originalWidth, originalHeight);
                const md = maskData.data;
                let hasPixels = false;
                for (let pi = 0; pi < totalPx; pi++) {
                    const oi = pi * 4;
                    if (assignment[pi] === ci) {
                        md[oi] = md[oi + 1] = md[oi + 2] = 0;
                        hasPixels = true;
                    } else {
                        md[oi] = md[oi + 1] = md[oi + 2] = 255;
                    }
                    md[oi + 3] = 255;
                }
                if (!hasPixels) continue;

                maskCtx.putImageData(maskData, 0, 0);
                const maskUrl = maskCanvas.toDataURL('image/png');
                const pathD = await traceLayerWithPotrace(maskUrl, params);
                if (pathD) {
                    const hex = '#' + palette[ci].map(c => c.toString(16).padStart(2, '0')).join('');
                    layers.push({ color: hex, pathD });
                }
            }

            let svg = `<svg id="svg" version="1.1" width="${originalWidth}" height="${originalHeight}" xmlns="http://www.w3.org/2000/svg">`;
            for (const layer of layers) {
                svg += `<path d="${layer.pathD}" fill="${layer.color}" fill-rule="evenodd" stroke="none"/>`;
            }
            svg += '</svg>';
            return svg;
        }

        async function convertToSVG(img, originalWidth, originalHeight, params) {
            params = params || {};
            const threshold = params.threshold !== undefined ? params.threshold : 128;
            const turdsize = params.turdsize !== undefined ? params.turdsize : 25;
            const alphamax = params.alphamax !== undefined ? params.alphamax : 0.8;
            const opttolerance = params.opttolerance !== undefined ? params.opttolerance : 0.2;
            return new Promise((resolve, reject) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                canvas.width = originalWidth;
                canvas.height = originalHeight;

                ctx.drawImage(img, 0, 0);

                // Pre-binarize at the user's threshold so Potrace receives a true B&W
                // mask. (Potrace's internal threshold is a fallback; doing it here
                // gives consistent results with the same number that's shown in the UI.)
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    const gray = (r + g + b) / 3;

                    data[i] = data[i + 1] = data[i + 2] = gray < threshold ? 0 : 255;
                }

                ctx.putImageData(imageData, 0, 0);

                const dataUrl = canvas.toDataURL('image/png');

                Potrace.setParameter({
                    turdsize: turdsize,
                    alphamax: alphamax,
                    optcurve: true,
                    opttolerance: opttolerance,
                    threshold: 128
                });

                Potrace.loadImageFromUrl(dataUrl);

                Potrace.process(function() {
                    const svg = Potrace.getSVG(1);
                    resolve(svg);
                });
            });
        }

        function tintSVG(svg, color) {
            if (!svg) return;
            
            // Get the path element
            const path = svg.querySelector('path');
            if (!path) return;
            
            // Update the fill color
            path.setAttribute('fill', color);
        }

        // controlKey is the stable source id used for every source-specific DOM
        // id here; productId is threaded through only so extraction can label,
        // name downloads for, and tag the extracted object's productId metadata.
        // options.suppressAutoDetect skips the automatic detection pass (used
        // during project hydration, where the saved objects are restored
        // directly and an auto-detect would be wasted canvas work).
        function createObjectDetectionControls(originalImage, svgContainer, originalWidth, originalHeight, controlKey, productId, initialState, options = {}) {
            const controlsDiv = document.createElement('div');
            controlsDiv.className = 'object-detection-controls';

            // Slider rows reuse the tracer-param-row grid so the detection
            // and tracing settings panels read as one family of controls.
            const mkSliderRow = (labelText, input, hint) => {
                const row = document.createElement('div');
                row.className = 'tracer-param-row';
                row.title = hint;
                const label = document.createElement('label');
                label.textContent = labelText;
                const value = document.createElement('span');
                value.className = 'tracer-param-value';
                value.textContent = input.value;
                input.addEventListener('input', () => {
                    value.textContent = input.value;
                });
                row.appendChild(label);
                row.appendChild(input);
                row.appendChild(value);
                return row;
            };

            const minSizeInput = document.createElement('input');
            minSizeInput.type = 'range';
            minSizeInput.min = '100';
            minSizeInput.max = '5000';
            minSizeInput.value = '500';
            minSizeInput.id = `minSize-${controlKey}`;
            if (initialState && Number.isFinite(initialState.minSize)) {
                minSizeInput.value = String(initialState.minSize);
            }

            const gapInput = document.createElement('input');
            gapInput.type = 'range';
            gapInput.min = '1';
            gapInput.max = '40';
            gapInput.value = '20';
            gapInput.id = `gapTolerance-${controlKey}`;
            if (initialState && Number.isFinite(initialState.gapTolerance)) {
                gapInput.value = String(initialState.gapTolerance);
            }

            // Actions row
            const buttonsContainer = document.createElement('div');
            buttonsContainer.className = 'detection-actions';

            // Always-available object detection rerun. Lets users re-detect after
            // the SVG has been re-traced with new tracer params, or just to retry
            // with the current detection knobs.
            const refreshButton = document.createElement('button');
            refreshButton.className = 'detect-button';
            refreshButton.textContent = 'Re-detect';
            refreshButton.title = 'Run object detection again with the current settings';
            refreshButton.id = `refreshButton-${controlKey}`;
            refreshButton.onclick = () => detectAndShowObjects(originalImage, svgContainer, originalWidth, originalHeight, controlKey, productId);

            const toggleBordersButton = document.createElement('button');
            toggleBordersButton.className = 'btn-secondary';
            toggleBordersButton.textContent = 'Hide Borders';
            toggleBordersButton.title = 'Show or hide the detected-object outlines';
            toggleBordersButton.style.display = 'none';
            toggleBordersButton.id = `toggleBorders-${controlKey}`;
            toggleBordersButton.onclick = () => toggleObjectBorders(svgContainer, toggleBordersButton);

            const joinButton = document.createElement('button');
            joinButton.className = 'detect-button';
            joinButton.textContent = 'Join 2 Selected';
            joinButton.title = 'Merge the selected objects into one';
            joinButton.style.backgroundColor = '#7c3aed';
            joinButton.style.display = 'none';
            joinButton.onclick = () => joinSelectedObjects(svgContainer, originalImage, originalWidth, originalHeight, controlKey, productId);
            svgContainer.joinButton = joinButton;
            svgContainer.selectedForJoin = [];

            buttonsContainer.appendChild(refreshButton);
            buttonsContainer.appendChild(toggleBordersButton);
            buttonsContainer.appendChild(joinButton);

            svgContainer.showToggleBorders = () => {
                toggleBordersButton.style.display = 'inline-block';
            };

            // Status line
            const infoDiv = document.createElement('div');
            infoDiv.className = 'object-count-info';
            infoDiv.id = `objectInfo-${controlKey}`;
            infoDiv.textContent = 'Auto-detecting objects in the image...';

            // Usage hint
            const infoText = document.createElement('div');
            infoText.className = 'detection-hint';
            infoText.innerHTML = 'Click an object to extract it. <strong>⌘/Ctrl-click</strong> selects several; <strong>Join Selected</strong> merges them into one.';

            // Collapsible settings, matching the tracing-settings panel.
            const settingsPanel = document.createElement('details');
            settingsPanel.className = 'tracer-params';
            const settingsSummary = document.createElement('summary');
            settingsSummary.textContent = 'Detection settings';
            settingsPanel.appendChild(settingsSummary);
            const settingsBody = document.createElement('div');
            settingsBody.className = 'tracer-params-body';
            settingsBody.appendChild(mkSliderRow('Min size', minSizeInput, 'Ignore objects smaller than this many pixels'));
            settingsBody.appendChild(mkSliderRow('Gap tolerance', gapInput, 'Bridge gaps up to this many pixels when grouping ink into objects'));
            settingsPanel.appendChild(settingsBody);

            // Assemble the structure
            controlsDiv.appendChild(buttonsContainer);
            controlsDiv.appendChild(infoDiv);
            controlsDiv.appendChild(infoText);
            controlsDiv.appendChild(settingsPanel);
            
            // Auto-start object detection — skipped during project hydration
            // (suppressAutoDetect), where saved objects are restored directly
            // and the user can still trigger Re-detect on demand.
            if (!options.suppressAutoDetect) {
                setTimeout(() => {
                    detectAndShowObjects(originalImage, svgContainer, originalWidth, originalHeight, controlKey, productId);
                }, 500);
            }

            controlsDiv.getState = () => ({
                minSize: parseInt(minSizeInput.value, 10),
                gapTolerance: parseInt(gapInput.value, 10)
            });

            return controlsDiv;
        }

        function detectAndShowObjects(originalImage, svgContainer, originalWidth, originalHeight, controlKey, productId) {
            const generation = originalImage._workspaceGeneration === undefined
                ? workspaceGeneration
                : originalImage._workspaceGeneration;
            if (!isWorkspaceGenerationCurrent(generation)) return;
            // Clear any existing overlays
            const existingOverlays = svgContainer.querySelectorAll('.object-overlay');
            existingOverlays.forEach(overlay => overlay.remove());

            // Reset join selection
            svgContainer.selectedForJoin = [];
            if (svgContainer.joinButton) svgContainer.joinButton.style.display = 'none';
            
            // Get UI elements - use the refresh button instead of old detect button
            const refreshButton = document.getElementById(`refreshButton-${controlKey}`);
            const toggleBordersButton = document.getElementById(`toggleBorders-${controlKey}`);
            const infoDiv = document.getElementById(`objectInfo-${controlKey}`);
            
            // Set loading state (disabled styling comes from .detect-button:disabled)
            if (refreshButton) {
                refreshButton.textContent = 'Detecting...';
                refreshButton.disabled = true;
            }
            
            if (infoDiv) {
                infoDiv.textContent = 'Analyzing image for objects...';
                infoDiv.style.color = '#059669';
            }
            
            // Get parameters
            const minSize = parseInt(document.getElementById(`minSize-${controlKey}`).value);
            const gapTolerance = parseInt(document.getElementById(`gapTolerance-${controlKey}`).value);
            
            // Start async processing (no setTimeout needed since we're chunking)
            findConnectedComponents(originalImage, minSize, gapTolerance)
                .then(objects => {
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    // Update info
                    if (objects.length > 0) {
                        infoDiv.textContent = `Found ${objects.length} objects. Click on any highlighted area to extract it.`;
                        infoDiv.style.color = '#059669';
                        
                        // Show the toggle borders button when objects are found
                        if (toggleBordersButton) {
                            toggleBordersButton.style.display = 'inline-block';
                        }
                    } else {
                        infoDiv.textContent = 'No objects found. Try adjusting the parameters.';
                        infoDiv.style.color = '#dc2626';
                        
                        // Hide the toggle borders button when no objects
                        if (toggleBordersButton) {
                            toggleBordersButton.style.display = 'none';
                        }
                    }
                    
                    // Create clickable overlays for each object
                    objects.forEach((obj, index) => {
                        const overlay = document.createElement('div');
                        overlay.className = 'object-overlay detected';
                        
                        // Store object data for resize updates
                        overlay.dataset.objectBounds = JSON.stringify(obj.bounds);
                        overlay.dataset.originalWidth = originalWidth;
                        overlay.dataset.originalHeight = originalHeight;
                        overlay.dataset.objectIndex = index;
                        
                        // Calculate initial position
                        updateOverlayPosition(overlay, svgContainer);
                        
                        overlay.title = `Object ${index + 1} (${obj.pixelCount} pixels)`;
                        
                        overlay.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (e.metaKey || e.ctrlKey) {
                                // Toggle selection for joining
                                const idx = (svgContainer.selectedForJoin || []).indexOf(obj);
                                if (idx === -1) {
                                    svgContainer.selectedForJoin.push(obj);
                                    overlay.classList.add('selected-for-join');
                                } else {
                                    svgContainer.selectedForJoin.splice(idx, 1);
                                    overlay.classList.remove('selected-for-join');
                                }
                                const n = svgContainer.selectedForJoin.length;
                                if (svgContainer.joinButton) {
                                    if (n >= 2) {
                                        svgContainer.joinButton.style.display = 'inline-block';
                                        svgContainer.joinButton.textContent = `Join ${n} Selected`;
                                    } else {
                                        svgContainer.joinButton.style.display = 'none';
                                    }
                                }
                            } else {
                                extractObject(obj, originalImage, originalWidth, originalHeight, controlKey, productId, index + 1);
                                overlay.style.display = 'none';
                            }
                        });
                        
                        svgContainer.appendChild(overlay);
                    });
                    
                    // Add resize listener for this container if not already added
                    if (!svgContainer.dataset.resizeListenerAdded) {
                        svgContainer.dataset.resizeListenerAdded = 'true';
                        
                        const resizeObserver = new ResizeObserver(() => {
                            updateAllOverlayPositions(svgContainer);
                        });
                        resizeObserver.observe(svgContainer);
                        
                        // Also listen for window resize as a backup
                        window.addEventListener('resize', () => {
                            setTimeout(() => {
                                if (isWorkspaceGenerationCurrent(generation)) {
                                    updateAllOverlayPositions(svgContainer);
                                }
                            }, 50);
                        });
                    }
                    
                    if (toggleBordersButton && objects.length > 0) {
                        toggleBordersButton.textContent = 'Hide Borders';
                    }
                })
                .catch(error => {
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    console.error('Error during object detection:', error);
                    infoDiv.textContent = 'Error occurred during object detection. Please try again.';
                    infoDiv.style.color = '#dc2626';
                })
                .finally(() => {
                    // Operation-local button cleanup is safe for a detached
                    // successful replacement and necessary if rollback
                    // reattached this exact controls DOM.
                    if (refreshButton) {
                        refreshButton.textContent = 'Re-detect';
                        refreshButton.disabled = false;
                    }
                });
        }

        function updateOverlayPosition(overlay, svgContainer) {
            const bounds = JSON.parse(overlay.dataset.objectBounds);
            const originalWidth = parseInt(overlay.dataset.originalWidth);
            const originalHeight = parseInt(overlay.dataset.originalHeight);
            
            // Calculate position relative to current SVG container size
            const containerRect = svgContainer.getBoundingClientRect();
            const scaleX = containerRect.width / originalWidth;
            const scaleY = containerRect.height / originalHeight;
            
            overlay.style.left = `${bounds.left * scaleX}px`;
            overlay.style.top = `${bounds.top * scaleY}px`;
            overlay.style.width = `${bounds.width * scaleX}px`;
            overlay.style.height = `${bounds.height * scaleY}px`;
        }

        function updateAllOverlayPositions(svgContainer) {
            const overlays = svgContainer.querySelectorAll('.object-overlay.detected');
            overlays.forEach(overlay => {
                if (overlay.style.display !== 'none') {
                    updateOverlayPosition(overlay, svgContainer);
                }
            });
        }

        function toggleObjectBorders(svgContainer, toggleButton) {
            const overlays = svgContainer.querySelectorAll('.object-overlay.detected');
            const isCurrentlyVisible = overlays.length > 0 && overlays[0].style.visibility !== 'hidden';
            
            overlays.forEach(overlay => {
                if (isCurrentlyVisible) {
                    overlay.style.visibility = 'hidden';
                    toggleButton.textContent = 'Show Borders';
                } else {
                    overlay.style.visibility = 'visible';
                    toggleButton.textContent = 'Hide Borders';
                }
            });
        }

        function hasNearbyParentInk(parent, child, imageWidth) {
            const parentPixels = new Set(parent.pixelIndices);
            const maxDistance = Math.max(16, Math.min(40, Math.round(imageWidth * 0.035)));

            for (const childIdx of child.pixelIndices) {
                const childX = childIdx % imageWidth;
                const childY = (childIdx / imageWidth) | 0;

                for (let dy = -maxDistance; dy <= maxDistance; dy++) {
                    const y = childY + dy;
                    if (y < parent.bounds.top || y > parent.bounds.bottom) continue;

                    for (let dx = -maxDistance; dx <= maxDistance; dx++) {
                        const x = childX + dx;
                        if (x < parent.bounds.left || x > parent.bounds.right) continue;
                        if (parentPixels.has(y * imageWidth + x)) return true;
                    }
                }
            }

            return false;
        }

        function mergeContainedComponents(components, imageWidth) {
            if (components.length < 2) return components;

            // Sort largest-area first so we test containment against the biggest parent
            components.sort((a, b) => {
                const areaA = a.bounds.width * a.bounds.height;
                const areaB = b.bounds.width * b.bounds.height;
                return areaB - areaA;
            });

            const absorbed = new Set();

            for (let i = 0; i < components.length; i++) {
                if (absorbed.has(i)) continue;
                const parent = components[i].bounds;

                for (let j = i + 1; j < components.length; j++) {
                    if (absorbed.has(j)) continue;
                    const child = components[j].bounds;

                    if (child.left >= parent.left && child.right <= parent.right &&
                        child.top >= parent.top && child.bottom <= parent.bottom &&
                        hasNearbyParentInk(components[i], components[j], imageWidth)) {
                        // child is fully contained — merge into parent
                        components[j].pixelIndices.forEach(idx => components[i].pixelIndices.push(idx));
                        components[i].pixelCount += components[j].pixelCount;

                        // Bounds don't need expanding (parent already encloses child)
                        // Update getPixels to include merged indices
                        const mergedIndices = components[i].pixelIndices;
                        components[i].getPixels = () => mergedIndices.map(
                            idx => ({ x: idx % imageWidth, y: (idx / imageWidth) | 0 })
                        );

                        absorbed.add(j);
                    }
                }
            }

            return components.filter((_, i) => !absorbed.has(i));
        }

        function findConnectedComponents(image, minSize, gapTolerance) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = image.naturalWidth;
                canvas.height = image.naturalHeight;
                ctx.drawImage(image, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const width = canvas.width;
                const height = canvas.height;
                
                // Convert to binary array (true for black pixels) - optimized with larger chunks and Uint8Array
                const binary = new Uint8Array(width * height);
                
                // Process binary conversion in larger chunks for better performance
                let binaryIndex = 0;
                function processBinaryChunk() {
                    const chunkSize = 50000; // Increased from 10k to 50k pixels per chunk
                    const endIndex = Math.min(binaryIndex + chunkSize, data.length);
                    
                    // Optimized binary conversion with bitwise operations
                    for (let i = binaryIndex; i < endIndex; i += 4) {
                        const gray = (data[i] + data[i + 1] + data[i + 2]) * 0.333; // Faster than division
                        binary[i >> 2] = gray < 128 ? 1 : 0; // Bitwise shift instead of division
                    }
                    
                    binaryIndex = endIndex;
                    
                    if (binaryIndex < data.length) {
                        requestAnimationFrame(processBinaryChunk);
                    } else {
                        processMorphology();
                    }
                }
                
                function processMorphology() {
                    if (gapTolerance <= 1) {
                        findComponents();
                        return;
                    }
                    
                    let iter = 0;
                    function dilateIteration() {
                        if (iter >= gapTolerance) {
                            findComponents();
                            return;
                        }
                        
                        // Use in-place dilation with temp array for better memory efficiency
                        const temp = new Uint8Array(width * height);
                        let processed = 0;
                        const chunkSize = 5000; // Increased from 1k to 5k pixels per chunk
                        
                        function processDilateChunk() {
                            const endRow = Math.min(processed + chunkSize, height - 1);
                            
                            for (let y = Math.max(processed, 1); y < endRow; y++) {
                                const rowOffset = y * width;
                                for (let x = 1; x < width - 1; x++) {
                                    const idx = rowOffset + x;
                                    if (!binary[idx]) {
                                        // Optimized neighbor check - unrolled loop for speed
                                        if (binary[idx - width - 1] || binary[idx - width] || binary[idx - width + 1] ||
                                            binary[idx - 1] || binary[idx + 1] ||
                                            binary[idx + width - 1] || binary[idx + width] || binary[idx + width + 1]) {
                                            temp[idx] = 1;
                                        }
                                    } else {
                                        temp[idx] = 1;
                                    }
                                }
                            }
                            
                            processed = endRow;
                            
                            if (processed < height - 1) {
                                requestAnimationFrame(processDilateChunk);
                            } else {
                                binary.set(temp); // Fast array copy
                                iter++;
                                requestAnimationFrame(dilateIteration);
                            }
                        }
                        
                        processDilateChunk();
                    }
                    
                    dilateIteration();
                }
                
                function findComponents() {
                    const visited = new Uint8Array(width * height);
                    const components = [];
                    let currentY = 0;
                    
                    function processComponentChunk() {
                        const chunkSize = 200; // Increased from 50 to 200 rows per chunk
                        const endY = Math.min(currentY + chunkSize, height);
                        
                        for (let y = currentY; y < endY; y++) {
                            const rowOffset = y * width;
                            for (let x = 0; x < width; x++) {
                                const idx = rowOffset + x;
                                if (binary[idx] && !visited[idx]) {
                                    const component = floodFillOptimized(x, y, binary, visited, width, height);
                                    if (component.pixelCount >= minSize) {
                                        // Calculate final bounds
                                        component.bounds.width = component.bounds.right - component.bounds.left + 1;
                                        component.bounds.height = component.bounds.bottom - component.bounds.top + 1;
                                        
                                        // Use exact flood-fill pixels — avoids picking up
                                        // ink from neighbouring objects sharing the bounding box
                                        component.getPixels = () => component.pixelIndices.map(
                                            idx => ({ x: idx % width, y: (idx / width) | 0 })
                                        );
                                        
                                        components.push(component);
                                    }
                                }
                            }
                        }
                        
                        currentY = endY;
                        
                        if (currentY < height) {
                            requestAnimationFrame(processComponentChunk);
                        } else {
                            resolve(mergeContainedComponents(components, width));
                        }
                    }
                    
                    processComponentChunk();
                }
                
                processBinaryChunk();
            });
        }

        function floodFillOptimized(startX, startY, binary, visited, width, height) {
            // Use array for stack instead of pushing objects for better performance
            const stack = new Array(width * height * 2); // Pre-allocate maximum possible size
            let stackTop = 0;
            stack[stackTop++] = startX;
            stack[stackTop++] = startY;

            const component = {
                pixelCount: 0,
                bounds: { left: startX, top: startY, right: startX, bottom: startY },
                pixelIndices: [] // exact pixels belonging to this component
            };

            while (stackTop > 0) {
                const y = stack[--stackTop];
                const x = stack[--stackTop];
                const idx = y * width + x;

                if (x < 0 || x >= width || y < 0 || y >= height || visited[idx] || !binary[idx]) {
                    continue;
                }

                visited[idx] = 1;
                component.pixelCount++;
                component.pixelIndices.push(idx);

                // Update bounds with bitwise operations for slight performance gain
                if (x < component.bounds.left) component.bounds.left = x;
                if (x > component.bounds.right) component.bounds.right = x;
                if (y < component.bounds.top) component.bounds.top = y;
                if (y > component.bounds.bottom) component.bounds.bottom = y;

                // Add 4-connected neighbors - unrolled for better performance
                if (x + 1 < width) {
                    stack[stackTop++] = x + 1;
                    stack[stackTop++] = y;
                }
                if (x - 1 >= 0) {
                    stack[stackTop++] = x - 1;
                    stack[stackTop++] = y;
                }
                if (y + 1 < height) {
                    stack[stackTop++] = x;
                    stack[stackTop++] = y + 1;
                }
                if (y - 1 >= 0) {
                    stack[stackTop++] = x;
                    stack[stackTop++] = y - 1;
                }
            }

            return component;
        }

        // Helper function to reconstruct pixel coordinates from binary data for extraction
        function getPixelsFromBounds(bounds, binary, width) {
            const pixels = [];
            for (let y = bounds.top; y <= bounds.bottom; y++) {
                const rowOffset = y * width;
                for (let x = bounds.left; x <= bounds.right; x++) {
                    const idx = rowOffset + x;
                    if (binary[idx]) {
                        pixels.push({ x, y });
                    }
                }
            }
            return pixels;
        }

        function joinSelectedObjects(svgContainer, originalImage, originalWidth, originalHeight, controlKey, productId) {
            const objects = svgContainer.selectedForJoin;
            if (!objects || objects.length < 2) return;

            // Merge bounding boxes
            const combinedBounds = {
                left:   Math.min(...objects.map(o => o.bounds.left)),
                top:    Math.min(...objects.map(o => o.bounds.top)),
                right:  Math.max(...objects.map(o => o.bounds.right)),
                bottom: Math.max(...objects.map(o => o.bounds.bottom)),
            };
            combinedBounds.width  = combinedBounds.right  - combinedBounds.left + 1;
            combinedBounds.height = combinedBounds.bottom - combinedBounds.top  + 1;

            // Merge pixel indices (deduplicate via Set)
            const allIndices = new Set();
            objects.forEach(o => o.pixelIndices.forEach(i => allIndices.add(i)));
            const pixelIndices = Array.from(allIndices);

            const combinedObject = {
                bounds: combinedBounds,
                pixelIndices,
                pixelCount: pixelIndices.length,
                getPixels: () => pixelIndices.map(idx => ({
                    x: idx % originalWidth,
                    y: (idx / originalWidth) | 0
                }))
            };

            // Hide the selected overlays
            svgContainer.querySelectorAll('.object-overlay.selected-for-join').forEach(o => {
                o.style.display = 'none';
            });

            // Clear selection
            svgContainer.selectedForJoin = [];
            if (svgContainer.joinButton) svgContainer.joinButton.style.display = 'none';

            extractObject(combinedObject, originalImage, originalWidth, originalHeight, controlKey, productId, 'Joined');
        }

        function extractObject(objectData, originalImage, originalWidth, originalHeight, controlKey, productId, objectNumber) {
            const generation = originalImage._workspaceGeneration === undefined
                ? workspaceGeneration
                : originalImage._workspaceGeneration;
            if (!isWorkspaceGenerationCurrent(generation)) return;
            // Show loading feedback
            const infoDiv = document.getElementById(`objectInfo-${controlKey}`);
            if (infoDiv) {
                infoDiv.textContent = `Extracting Object ${objectNumber}...`;
                infoDiv.style.color = '#059669';
            }
            
            // Use setTimeout to allow UI to update
            setTimeout(() => {
                if (!isWorkspaceGenerationCurrent(generation)) return;
                try {
                    // Create a new canvas with just this object
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const bounds = objectData.bounds;
                    const padding = 20; // Add some padding around the object
                    
                    canvas.width = bounds.width + (padding * 2);
                    canvas.height = bounds.height + (padding * 2);
                    
                    // Fill with white
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Get original image data
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCanvas.width = originalWidth;
                    tempCanvas.height = originalHeight;
                    tempCtx.drawImage(originalImage, 0, 0);
                    const originalData = tempCtx.getImageData(0, 0, originalWidth, originalHeight);
                    
                    // Create new image data for just this object
                    const newImageData = ctx.createImageData(canvas.width, canvas.height);
                    const newData = newImageData.data;
                    
                    // Fill new canvas with white
                    for (let i = 0; i < newData.length; i += 4) {
                        newData[i] = 255;     // R
                        newData[i + 1] = 255; // G  
                        newData[i + 2] = 255; // B
                        newData[i + 3] = 255; // A
                    }
                    
                    // Copy only the pixels belonging to this object
                    objectData.getPixels().forEach(pixel => {
                        const sourceIdx = (pixel.y * originalWidth + pixel.x) * 4;
                        const targetX = pixel.x - bounds.left + padding;
                        const targetY = pixel.y - bounds.top + padding;
                        const targetIdx = (targetY * canvas.width + targetX) * 4;
                        
                        if (targetIdx >= 0 && targetIdx < newData.length) {
                            newData[targetIdx] = originalData.data[sourceIdx];         // R
                            newData[targetIdx + 1] = originalData.data[sourceIdx + 1]; // G
                            newData[targetIdx + 2] = originalData.data[sourceIdx + 2]; // B
                            newData[targetIdx + 3] = 255;                              // A
                        }
                    });
                    
                    ctx.putImageData(newImageData, 0, 0);
                    
                    const extractedImage = new Image();
                    extractedImage.onload = async () => {
                        if (!isWorkspaceGenerationCurrent(generation)) return;
                        try {
                            // Mirror the parent plate's render-mode + tracer params so
                            // extracts come out matching the plate the user is looking at.
                            const mode = originalImage._renderMode || 'binary';
                            const params = originalImage._traceParams || defaultTraceParams();
                            const svg = await vectorizeImage(extractedImage, canvas.width, canvas.height, mode, params);
                            if (!isWorkspaceGenerationCurrent(generation)) return;
                            createExtractedObjectCard(svg, canvas.width, canvas.height, productId, objectNumber, originalWidth, originalHeight, {
                                controlKey,
                                sourceId: originalImage._projectSourceId || '',
                                generation
                            });
                            
                            // Restore info message
                            if (infoDiv) {
                                const objectsContainer = document.getElementById(`objects-${controlKey}`);
                                const objectCount = objectsContainer ? objectsContainer.children.length : 0;
                                const remainingOverlays = document.querySelectorAll('.object-overlay.detected').length;
                                if (remainingOverlays > 0) {
                                    infoDiv.textContent = `Object ${objectNumber} extracted! Click on remaining highlighted areas to extract more objects.`;
                                } else {
                                    infoDiv.textContent = `All visible objects have been extracted. You can adjust parameters and detect again to find different objects.`;
                                }
                            }
                        } catch (error) {
                            if (!isWorkspaceGenerationCurrent(generation)) return;
                            console.error('Error converting object to SVG:', error);
                            if (infoDiv) {
                                infoDiv.textContent = `Error extracting Object ${objectNumber}. Please try again.`;
                                infoDiv.style.color = '#dc2626';
                            }
                        }
                    };
                    extractedImage.src = canvas.toDataURL();
                } catch (error) {
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    console.error('Error during object extraction:', error);
                    if (infoDiv) {
                        infoDiv.textContent = `Error extracting Object ${objectNumber}. Please try again.`;
                        infoDiv.style.color = '#dc2626';
                    }
                }
            }, 50);
        }

        const CRICUT_DEFAULT_BORDER = 15;
        const CRICUT_DEFAULT_FLOOD = 0;
        const CRICUT_BORDER_MAX = 120;
        const CRICUT_FLOOD_MAX = 300;

        function clampInteger(value, min, max, fallback) {
            const parsed = parseInt(value, 10);
            if (!Number.isFinite(parsed)) return fallback;
            return Math.max(min, Math.min(max, parsed));
        }

        function normalizeCricutOptions(optionsOrBuffer, gapFloodPx) {
            const raw = (optionsOrBuffer && typeof optionsOrBuffer === 'object')
                ? optionsOrBuffer
                : { outerBufferPx: optionsOrBuffer, gapFloodPx };
            const scale = Number(raw.previewScale);
            return {
                outerBufferPx: clampInteger(raw.outerBufferPx, 0, CRICUT_BORDER_MAX, CRICUT_DEFAULT_BORDER),
                gapFloodPx: clampInteger(raw.gapFloodPx, 0, CRICUT_FLOOD_MAX, CRICUT_DEFAULT_FLOOD),
                previewScale: Number.isFinite(scale) && scale > 0 ? scale : 2
            };
        }

        // previewScale is a transient, viewport-derived hint that only sizes
        // the live Cricut PNG preview — it is not part of a saved object or
        // scene. Captured project records keep just the durable border/flood;
        // hydration re-derives previewScale through normalizeCricutOptions.
        function persistedCricutOptions(options) {
            return {
                outerBufferPx: options.outerBufferPx,
                gapFloodPx: options.gapFloodPx
            };
        }

        function readCricutOptionsFromInputs(borderInput, floodInput, writeBack = true) {
            const options = normalizeCricutOptions({
                outerBufferPx: borderInput.value,
                gapFloodPx: floodInput.value
            });
            if (writeBack) {
                borderInput.value = options.outerBufferPx;
                floodInput.value = options.gapFloodPx;
            }
            return options;
        }

        function createCricutNumberField(labelText, defaultValue, min, max, title) {
            const field = document.createElement('label');
            field.className = 'cricut-field';

            const label = document.createElement('span');
            label.textContent = labelText;

            const input = document.createElement('input');
            input.type = 'number';
            input.min = String(min);
            input.max = String(max);
            input.step = '1';
            input.value = String(defaultValue);
            input.title = title;
            input.setAttribute('aria-label', title);

            field.appendChild(label);
            field.appendChild(input);
            field.input = input;
            return field;
        }

        function getCricutPreviewScale(width, height, maxPreviewDim = 360) {
            const maxSourceDim = Math.max(width || 1, height || 1);
            return Math.max(0.12, Math.min(0.6, maxPreviewDim / maxSourceDim));
        }

        // Builds an extracted-object card and registers a stable, live
        // record for it in projectWorkspace.extractedObjects. `options` lets
        // hydrateExtractedObject (project-open path) reproduce a saved
        // object exactly: an explicit `id`/`sourceId`, initial `color`/
        // `cricut` state, and `scroll: false` so opening a project doesn't
        // jump the page once per restored object.
        //
        // Fails clearly instead of corrupting state: if the object's
        // `objects-${controlKey}` area (keyed on the stable source id) doesn't
        // exist (e.g. a saved object's source failed to hydrate) or the SVG
        // string doesn't parse, this logs and returns null without registering
        // anything in the Map.
        function createExtractedObjectCard(svgString, width, height, productId, objectNumber, refW, refH, options = {}) {
            const generation = options.generation === undefined
                ? workspaceGeneration
                : options.generation;
            if (!isWorkspaceGenerationCurrent(generation)) return null;
            // Objects attach to their source card by the STABLE source id
            // (controlKey/sourceId), never the shared productId — two variants
            // of one product otherwise collide on one card. productId is kept
            // only for labels/downloads/metadata below.
            const controlKey = options.controlKey || options.sourceId || productId;
            const objectsContainer = document.getElementById(`objects-${controlKey}`);
            if (!objectsContainer) {
                console.error(`createExtractedObjectCard: no objects container for control key "${controlKey}" (product "${productId}", sourceId "${options.sourceId || ''}"); object not created`);
                return null;
            }

            // Parsed through the same safe DOMParser path as source
            // snapshots (parseSvgElement) — svgString may be a saved
            // project-file record, never assigned through innerHTML.
            const svg = parseSvgElement(svgString);
            if (!svg) {
                console.error(`createExtractedObjectCard: could not parse SVG for object "${options.label || objectNumber}" (product "${productId}"); object not created`);
                return null;
            }
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');

            // Show the objects header if this is the first object
            const objectsHeader = document.getElementById(`objectsHeader-${controlKey}`);
            if (objectsHeader && objectsContainer.children.length === 0) {
                objectsHeader.style.display = 'block';
            }

            const objectId = options.id || nextStableId('object', 'nextObjectId');
            if (options.id) bumpIdCounterPastExisting(options.id, 'nextObjectId');

            // Create the object card
            const objectCard = document.createElement('div');
            objectCard.className = 'svg-object-card';
            objectCard.dataset.projectObjectId = objectId;

            const objectState = {
                id: objectId,
                generation,
                sourceId: options.sourceId || '',
                productId,
                label: options.label || `Object ${objectNumber}`,
                width,
                height,
                referenceWidth: refW,
                referenceHeight: refH,
                svg,
                card: objectCard,
                colorControl: null,
                borderInput: null,
                floodInput: null
            };
            projectWorkspace.extractedObjects.set(objectId, objectState);

            // Create preview container
            const preview = document.createElement('div');
            preview.className = 'svg-object-preview cricut-preview';
            preview.appendChild(svg);

            const cricutPreviewImg = document.createElement('img');
            cricutPreviewImg.alt = 'Cricut PNG preview';

            const cricutPreviewStatus = document.createElement('span');
            cricutPreviewStatus.className = 'cricut-preview-status';
            cricutPreviewStatus.textContent = 'Rendering...';
            preview.appendChild(cricutPreviewStatus);
            
            // Create controls container
            const controls = document.createElement('div');
            controls.className = 'object-controls';
            
            // Create header
            const header = document.createElement('div');
            header.className = 'object-header';
            
            const title = document.createElement('span');
            title.textContent = objectState.label;
            
            const actions = document.createElement('div');
            actions.className = 'object-actions';
            
            const removeButton = document.createElement('button');
            removeButton.className = 'remove-object-compact';
            removeButton.textContent = '✕';
            removeButton.title = 'Remove';
            removeButton.onclick = () => {
                if (typeof objectState.resetPreview === 'function') objectState.resetPreview();
                projectWorkspace.extractedObjects.delete(objectId);
                objectCard.remove();
            };

            const dlIcon = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:-1px;margin-right:4px"><path d="M6 1v7M3.5 5.5L6 8l2.5-2.5M2 10.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

            const downloadButton = document.createElement('button');
            downloadButton.innerHTML = dlIcon + 'SVG';
            downloadButton.onclick = () => downloadObjectSVG(svg, productId, width, height);

            const downloadJpgButton = document.createElement('button');
            downloadJpgButton.innerHTML = dlIcon + 'JPG';
            downloadJpgButton.onclick = () => downloadObjectJPG(svg, productId, width, height);

            const cricutInitial = normalizeCricutOptions(options.cricut || {});
            const borderField = createCricutNumberField('Border', cricutInitial.outerBufferPx, 0, CRICUT_BORDER_MAX, 'Outer cut border in px');
            const floodField = createCricutNumberField('Flood', cricutInitial.gapFloodPx, 0, CRICUT_FLOOD_MAX, 'Connect gaps up to this px size');
            const borderInput = borderField.input;
            const floodInput = floodField.input;
            objectState.borderInput = borderInput;
            objectState.floodInput = floodInput;
            let cricutPreviewTimer = null;
            let cricutPreviewToken = 0;

            const scheduleCricutPreview = () => {
                const previewGeneration = objectState.generation;
                if (!isWorkspaceGenerationCurrent(previewGeneration)) return;
                cricutPreviewToken++;
                const token = cricutPreviewToken;
                clearTimeout(cricutPreviewTimer);
                cricutPreviewStatus.textContent = 'Rendering...';
                cricutPreviewStatus.style.display = 'inline-block';
                cricutPreviewTimer = setTimeout(async () => {
                    if (!isWorkspaceGenerationCurrent(previewGeneration)) return;
                    try {
                        const liveCricutOptions = readCricutOptionsFromInputs(borderInput, floodInput, false);
                        const canvas = await buildCricutCanvas(svg, width, height, {
                            ...liveCricutOptions,
