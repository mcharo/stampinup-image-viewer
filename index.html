                "Pumpkin Pie": "#f89433",
                "Daffodil Delight": "#ffdc67",
                "Lemon Lime Twist": "#dee568",
                "Granny Apple Green": "#a3c149",
                "Coastal Cabana": "#90d2be",
                "Azure Afternoon": "#27a0d6",
                "Berry Burst": "#b74985"
            },
            "Regals": {
                "Cherry Cobbler": "#a10637",
                "Real Red": "#c52342",
                "Cajun Craze": "#c0492d",
                "Crushed Curry": "#f8bd16",
                "Old Olive": "#98a04d",
                "Garden Green": "#4d8b56",
                "Shaded Spruce": "#00815b",
                "Pretty Peacock": "#006f71",
                "Blueberry Bushel": "#0d5993",
                "Gorgeous Grape": "#855da4"
            },
            "Neutrals": {
                "Mossy Meadow": "#656739",
                "Misty Moonlight": "#58728e",
                "Night of Navy": "#213e6d",
                "Blackberry Bliss": "#582752",
                "Early Espresso": "#63412c",
                "Pecan Pie": "#a97448",
                "Crumb Cake": "#c8ad8c",
                "Gray Granite": "#b3aba1",
                "Smoky Slate": "#bdbdbe",
                "Basic Gray": "#767e85"
            }
        };

        const projectWorkspace = {
            sources: new Map(),
            extractedObjects: new Map(),
            objectUrls: new Set(),
            nextSourceId: 1,
            nextObjectId: 1
        };
        // Monotonic cancellation token for every source-workspace lifetime.
        // It is deliberately separate from projectWorkspace (whose maps are
        // swapped during transactional open/rollback) and is NEVER restored
        // backward. Any async continuation must retain the generation it
        // started in and verify it after each await/timer/image callback.
        let workspaceGeneration = 0;
        // Open Project preflights may overlap, but workspace mutation is
        // serialized. Request ids establish "newest invocation wins" before
        // preflight starts; the queue tail always absorbs rejection so one bad
        // validation/hydration cannot poison later opens.
        let openRequestSequence = 0;
        let activeOpenTransactionRequestId = null;
        let activeOpenTransactionRestore = null;
        let openReplacementQueue = Promise.resolve();

        function advanceWorkspaceGeneration() {
            workspaceGeneration += 1;
            return workspaceGeneration;
        }

        function isWorkspaceGenerationCurrent(generation) {
            return generation === workspaceGeneration;
        }

        function enqueueOpenReplacement(work) {
            const result = openReplacementQueue.then(work, work);
            openReplacementQueue = result.then(() => undefined, () => undefined);
            return result;
        }

        function rebindWorkspaceRecordsToGeneration(generation) {
            for (const record of projectWorkspace.sources.values()) {
                record.generation = generation;
                if (record.image) record.image._workspaceGeneration = generation;
            }
            for (const object of projectWorkspace.extractedObjects.values()) {
                object.generation = generation;
            }
        }

        function resetExtractedObjectPreviews(objects = projectWorkspace.extractedObjects) {
            for (const object of objects.values()) {
                if (typeof object.resetPreview === 'function') object.resetPreview();
            }
        }

        function scheduleExtractedObjectPreviews(objects = projectWorkspace.extractedObjects) {
            for (const object of objects.values()) {
                if (typeof object.schedulePreview === 'function') object.schedulePreview();
            }
        }

        function nextStableId(prefix, counterKey) {
            return `${prefix}-${projectWorkspace[counterKey]++}`;
        }

        function trackedObjectUrl(blob) {
            const url = URL.createObjectURL(blob);
            projectWorkspace.objectUrls.add(url);
            return url;
        }

        function revokeOwnedObjectUrl(url, ownerUrls) {
            if (!url) return;
            if (ownerUrls) ownerUrls.delete(url);
            URL.revokeObjectURL(url);
        }

        function revokeProjectObjectUrls() {
            projectWorkspace.objectUrls.forEach(url => URL.revokeObjectURL(url));
            projectWorkspace.objectUrls.clear();
        }

        function createSourceRuntimeRecord(input) {
            const generation = input.generation === undefined
                ? workspaceGeneration
                : input.generation;
            if (!isWorkspaceGenerationCurrent(generation)) return null;
            const id = input.id || nextStableId('source', 'nextSourceId');
            const record = {
                id,
                generation,
                blob: input.blob,
                origin: input.origin,
                width: input.width,
                height: input.height,
                preprocess: Boolean(input.preprocess),
                image: input.image || null,
                wrapper: input.wrapper || null,
                svgContainer: null,
                renderModeControl: null,
                traceControl: null,
                colorControl: null,
                detectionControl: null
            };
            if (record.image) record.image._workspaceGeneration = generation;
            projectWorkspace.sources.set(id, record);
            return record;
        }

        // Maps a productId back to a stable LIVE source id that actually owns
        // an objects container (raster-only sources do not). Prefers a source
        // whose origin productId matches, else the first eligible converted
        // source. Used by composer merge, whose result is not tied to one of
        // the input objects but still needs a deterministic persisted host.
        function resolveObjectsControlKey(productId) {
            let fallback = null;
            for (const record of projectWorkspace.sources.values()) {
                const container = record.wrapper &&
                    record.wrapper.querySelector(`#objects-${record.id}`);
                if (!container || !container.isConnected) continue;
                if (fallback === null) fallback = record.id;
                if (record.origin && String(record.origin.productId) === String(productId)) return record.id;
            }
            return fallback;
        }

        function clearSourceWorkspace() {
            const generation = advanceWorkspaceGeneration();
            document.getElementById('imageContainer').replaceChildren();
            projectWorkspace.sources.clear();
            projectWorkspace.extractedObjects.clear();
            projectWorkspace.nextSourceId = 1;
            projectWorkspace.nextObjectId = 1;
            revokeProjectObjectUrls();
            updateProjectActionState();
            return generation;
        }

        function updateProjectActionState() {
            const button = document.getElementById('saveProjectButton');
            if (button) button.disabled = projectWorkspace.sources.size === 0 &&
                (!composerSvg || composerSvg.querySelectorAll('.composer-object').length === 0);
        }

        // Keeps nextSourceId/nextObjectId ahead of any explicit id restored
        // from a project file, so a subsequently-registered source (e.g. a
        // fresh upload after Open Project) can never mint a colliding id.
        function bumpIdCounterPastExisting(id, counterKey) {
            const match = /-(\d+)$/.exec(String(id || ''));
            if (!match) return;
            const next = parseInt(match[1], 10) + 1;
            if (Number.isFinite(next) && next > projectWorkspace[counterKey]) {
                projectWorkspace[counterKey] = next;
            }
        }

        // Builds a ProjectDocument snapshot of the live workspace. A reused
        // die-source Blob (the same object shared by two SourceRuntimeRecords)
        // is encoded once via the assetIds Map, keyed by Blob identity, so the
        // saved file doesn't duplicate that raster.
        //
        // captureExtractedObjects/captureComposer are produced by later tasks;
        // detected via `typeof` so source-only save works before those exist.
        async function captureProjectDocument() {
            const projectDocument = StampinUpProjectFile.createEmptyProject({
                savedAt: new Date().toISOString(),
                activeProductId: document.getElementById('productId').value
            });
            projectDocument.project.stampSetName = detectedStampSetName || '';

            const assetIds = new Map();
            for (const record of projectWorkspace.sources.values()) {
                let assetId = assetIds.get(record.blob);
                if (!assetId) {
                    assetId = `asset-${assetIds.size + 1}`;
                    assetIds.set(record.blob, assetId);
                    projectDocument.assets[assetId] = await StampinUpProjectFile.encodeBlob(record.blob);
                }
                const svg = record.svgContainer && record.svgContainer.querySelector('svg');
                projectDocument.sources.push({
                    id: record.id,
                    assetId,
                    width: record.width,
                    height: record.height,
                    preprocess: Boolean(record.preprocess),
                    origin: { ...record.origin },
                    render: svg ? {
                        mode: record.image._renderMode || 'binary',
                        traceParams: { ...defaultTraceParams(), ...(record.image._traceParams || {}) },
                        color: record.colorControl.getState(),
                        svg: new XMLSerializer().serializeToString(svg)
                    } : null,
                    detection: record.detectionControl
                        ? record.detectionControl.getState()
                        : { minSize: 500, gapTolerance: 20 }
                });
            }
            projectDocument.extractedObjects = typeof captureExtractedObjects === 'function'
                ? captureExtractedObjects() : [];
            projectDocument.composer = typeof captureComposer === 'function'
                ? captureComposer() : null;
            return projectDocument;
        }

        async function saveProject() {
            const button = document.getElementById('saveProjectButton');
            const projectStatus = document.getElementById('projectStatus');
            const original = button.textContent;
            button.disabled = true;
            button.textContent = 'Saving…';
            try {
                const project = await captureProjectDocument();
                const text = StampinUpProjectFile.serializeProject(project);
                const blob = new Blob([text], { type: StampinUpProjectFile.MIME_TYPE });
                const productId = sanitizeForFilename(project.project.activeProductId || 'project');
                const date = project.project.savedAt.slice(0, 10);
                triggerDownload(blob, `stampinup_${productId}_${date}.stampinup-project`);
                if (projectStatus) projectStatus.textContent = 'Project saved';
            } catch (error) {
                console.error('Error saving project:', error);
                if (projectStatus) projectStatus.textContent = error.message;
            } finally {
                button.textContent = original;
                updateProjectActionState();
            }
        }

        // Confirms every asset actually decodes as an image before the caller
        // is told the file is good, and enforces the real decoded raster
        // limits — metadata-only dimension/pixel checks (in the codec) are
        // bypassable, so the *decoded* naturalWidth/naturalHeight are what's
        // measured here. For every source referencing an asset, the saved
        // width/height must match that asset's decoded natural dimensions
        // (shared assets and the die-substituted source Blob included — they
        // all resolve to the same decoded size). Decoding happens off tracked
        // object URLs created solely for this check, which are always revoked
        // afterward (success or failure) — they never leak into
        // projectWorkspace.objectUrls and never touch the live workspace.
        async function verifyAssetsAreDecodable(assets, sources = []) {
            const maxDimension = StampinUpProjectFile.MAX_DIMENSION;
            const maxPixels = StampinUpProjectFile.MAX_PIXELS;
            const sourcesByAsset = new Map();
            for (const source of sources) {
                if (!sourcesByAsset.has(source.assetId)) sourcesByAsset.set(source.assetId, []);
                sourcesByAsset.get(source.assetId).push(source);
            }
            const validationUrls = [];
            try {
                for (const [id, blob] of assets) {
                    const url = URL.createObjectURL(blob);
                    validationUrls.push(url);
                    const probe = new Image();
                    probe.src = url;
                    await new Promise((resolve, reject) => {
                        probe.onload = resolve;
                        probe.onerror = () => reject(new Error(`Project asset ${id} could not be decoded as an image`));
                    });
                    const decodedWidth = probe.naturalWidth;
                    const decodedHeight = probe.naturalHeight;
                    if (decodedWidth > maxDimension || decodedHeight > maxDimension) {
                        throw new Error(`Project asset ${id} decodes to ${decodedWidth}×${decodedHeight}, exceeding the ${maxDimension}px dimension limit`);
                    }
                    if (decodedWidth * decodedHeight > maxPixels) {
                        throw new Error(`Project asset ${id} decodes to ${decodedWidth * decodedHeight} pixels, exceeding the pixel limit`);
                    }
                    for (const source of sourcesByAsset.get(id) || []) {
                        if (source.width !== decodedWidth || source.height !== decodedHeight) {
                            throw new Error(`Source ${source.id} saved dimensions ${source.width}×${source.height} do not match asset ${id} decoded dimensions ${decodedWidth}×${decodedHeight}`);
                        }
                    }
                }
            } finally {
                validationUrls.forEach(url => URL.revokeObjectURL(url));
            }
        }

        // Parses, schema-validates, sanitizes, and base64-decodes the file,
        // then confirms every referenced raster asset actually decodes as an
        // image — all before the caller touches the live workspace. Any
        // failure here (oversized file, malformed JSON/schema, unsafe SVG,
        // undecodable image bytes) throws and leaves the current workspace
        // completely untouched.
        async function readProjectFile(file) {
            if (!file || file.size > StampinUpProjectFile.MAX_PROJECT_BYTES) {
                throw new Error('Project file exceeds the 100 MiB limit');
            }
            const project = StampinUpProjectFile.parseProjectText(await file.text());
            const assets = new Map();
            for (const [id, asset] of Object.entries(project.assets)) {
                assets.set(id, StampinUpProjectFile.decodeAsset(asset));
            }
            await verifyAssetsAreDecodable(assets, project.sources);
            return { project, assets };
        }

        function workspaceHasContent() {
            return projectWorkspace.sources.size > 0 ||
                Boolean(composerSvg && composerSvg.querySelector('.composer-object'));
        }

        // Full teardown of both the composer and the source workspace, used
        // right before a validated project replaces the live workspace.
        // Invalid projects (caught by readProjectFile) never reach this call.
        // Composer resources are torn down first (see resetComposerWorkspace),
        // then the source workspace, matching the brief's required ordering.
        function clearFullWorkspace() {
            resetComposerWorkspace();
            clearSourceWorkspace();
        }

        // Recreates one saved source exactly as it was: the raster loads from
        // its persisted Blob, optional die-set preprocessing re-runs
        // deterministically against that same Blob, and — critically — the
        // saved SVG snapshot is what gets rendered. vectorizeImage is never
        // called here, so opening a project never silently re-traces it.
        async function hydrateSource(source, blob, generation = workspaceGeneration) {
            if (!isWorkspaceGenerationCurrent(generation)) return null;
            const wrapper = document.createElement('div');
            wrapper.className = 'image-wrapper';
            const raster = new Image();
            // One tracked URL for this blob, reused for the raw-raster <img>
            // below so raster hydration doesn't mint a second URL just to
            // display the same blob it already decoded.
            const ownerUrls = projectWorkspace.objectUrls;
            const rasterUrl = trackedObjectUrl(blob);
            raster.src = rasterUrl;
            await new Promise((resolve, reject) => {
                raster.onload = resolve;
                raster.onerror = () => reject(new Error(`Could not decode source ${source.id}`));
            });
            if (!isWorkspaceGenerationCurrent(generation)) {
                revokeOwnedObjectUrl(rasterUrl, ownerUrls);
                return null;
            }
            const image = source.preprocess ? (await preprocessForSVG(raster)).processedImage : raster;
            if (!isWorkspaceGenerationCurrent(generation)) {
                revokeOwnedObjectUrl(rasterUrl, ownerUrls);
                return null;
            }
            const record = createSourceRuntimeRecord({
                id: source.id,
                generation,
                blob,
                origin: source.origin,
                width: source.width,
                height: source.height,
                preprocess: source.preprocess,
                image,
                wrapper
            });
            if (!record) {
                revokeOwnedObjectUrl(rasterUrl, ownerUrls);
                return null;
            }
            bumpIdCounterPastExisting(source.id, 'nextSourceId');
            if (source.render) {
                // Detection overlays are derived rather than serialized, so
                // defer regeneration until the entire project transaction has
                // committed successfully.
                renderConvertedSource(record, image, source.render.svg, wrapper, {
                    mode: source.render.mode,
                    traceParams: source.render.traceParams,
                    color: source.render.color,
                    detection: source.detection,
                    suppressAutoDetect: true
                });
            } else {
                renderRasterSource(record, wrapper, { objectUrl: rasterUrl });
            }
            if (!isWorkspaceGenerationCurrent(generation)) {
                revokeOwnedObjectUrl(rasterUrl, ownerUrls);
                return null;
            }
            document.getElementById('imageContainer').appendChild(wrapper);
            return record;
        }

        // Begins an atomic workspace replacement. Detaches — never destroys —
        // the current source runtime records, image-container DOM, composer,
        // and the productId/stamp-set UI, leaving the live workspace empty so
        // the incoming project can hydrate into it. The returned handle either
        // commit()s (disposing the now-replaced old workspace and revoking its
        // object URLs) or restore()s (revoking the half-built new workspace's
        // URLs, tearing down any partial new composer, and putting the exact
        // previous DOM + runtime state back). This is what makes the
        // post-preflight hydration phase atomic: a mid-hydration failure can
        // neither destroy the old workspace nor leave a partial new one.
        function beginWorkspaceReplacement(requestId) {
            if (activeOpenTransactionRequestId !== null) {
                throw new Error('Another project replacement transaction is already active');
            }
            activeOpenTransactionRequestId = requestId;
            const generation = advanceWorkspaceGeneration();
            const imageContainer = document.getElementById('imageContainer');
            const stampSetInfo = document.getElementById('stampSetInfo');
            const previous = {
                sources: projectWorkspace.sources,
                extractedObjects: projectWorkspace.extractedObjects,
                objectUrls: projectWorkspace.objectUrls,
                nextSourceId: projectWorkspace.nextSourceId,
                nextObjectId: projectWorkspace.nextObjectId,
                imageNodes: Array.from(imageContainer.children),
                productId: document.getElementById('productId').value,
                stampSetName: detectedStampSetName,
                stampSetInfoText: stampSetInfo ? stampSetInfo.textContent : null,
                composer: snapshotComposerState()
            };
            resetExtractedObjectPreviews(previous.extractedObjects);

            // Swap in fresh, empty live state; the old state is retained on
            // `previous` (its object URLs are NOT revoked here, so old images
            // keep working if we roll back).
            imageContainer.replaceChildren();
            projectWorkspace.sources = new Map();
            projectWorkspace.extractedObjects = new Map();
            projectWorkspace.objectUrls = new Set();
            projectWorkspace.nextSourceId = 1;
            projectWorkspace.nextObjectId = 1;
            detachComposerState();

            let settled = false;
            const transaction = {
                generation,
                ownsMutation() {
                    return !settled && activeOpenTransactionRequestId === requestId;
                },
                commit() {
                    if (settled ||
                        activeOpenTransactionRequestId !== requestId ||
                        openRequestSequence !== requestId) return false;
                    settled = true;
                    // The old workspace is fully replaced: revoke its object
                    // URLs and drop its detached DOM/composer (its pending
                    // preview timer was already cleared by detachComposerState).
                    previous.objectUrls.forEach(url => URL.revokeObjectURL(url));
                    previous.objectUrls.clear();
                    activeOpenTransactionRequestId = null;
                    activeOpenTransactionRestore = null;
                    return true;
                },
                restore() {
                    if (settled || activeOpenTransactionRequestId !== requestId) return false;
                    settled = true;
                    // A rollback is a distinct workspace lifetime from both
                    // the detached previous state and the failed incoming
                    // state. Advancing again makes every partial incoming
                    // callback stale before any old DOM/state is reattached.
                    const rollbackGeneration = advanceWorkspaceGeneration();
                    // Discard the half-built new workspace: revoke its URLs and
                    // tear down any partial new composer.
                    resetExtractedObjectPreviews();
                    revokeProjectObjectUrls();
                    resetComposerWorkspace();
                    imageContainer.replaceChildren();
                    // Put the exact previous runtime state + DOM back.
                    projectWorkspace.sources = previous.sources;
                    projectWorkspace.extractedObjects = previous.extractedObjects;
                    projectWorkspace.objectUrls = previous.objectUrls;
                    projectWorkspace.nextSourceId = previous.nextSourceId;
                    projectWorkspace.nextObjectId = previous.nextObjectId;
                    // The generation counter is monotonic: do not restore the
                    // old number. Rebind restored runtime records to this new,
                    // active lifetime so future user actions work while every
                    // callback captured before replacement remains stale.
                    rebindWorkspaceRecordsToGeneration(rollbackGeneration);
                    imageContainer.replaceChildren(...previous.imageNodes);
                    document.getElementById('productId').value = previous.productId;
                    detectedStampSetName = previous.stampSetName;
                    if (stampSetInfo && previous.stampSetInfoText !== null) {
                        stampSetInfo.textContent = previous.stampSetInfoText;
                    }
                    scheduleExtractedObjectPreviews();
                    restoreComposerState(previous.composer);
                    updateProjectActionState();
                    activeOpenTransactionRequestId = null;
                    activeOpenTransactionRestore = null;
                    return true;
                }
            };
            activeOpenTransactionRestore = transaction.restore;
            return transaction;
        }

        // Reads and validates the file (readProjectFile is the sole preflight
        // gate — see its comment), optionally confirms replacing a non-empty
        // workspace, then hydrates inside a workspace-replacement transaction.
        // A cancelled confirmation, or any preflight failure, leaves the
        // current workspace untouched; a mid-hydration failure is rolled back
        // (previous workspace restored, new URLs revoked) before rethrowing.
        async function openProjectFile(file, callbacks = {}) {
            const requestId = ++openRequestSequence;
            // Invocation itself transfers ownership, before validation/decode.
            // If an older mutation is active, restore its retained baseline now
            // so a rejected or cancelled newest request still leaves complete,
            // truthful workspace state.
            if (activeOpenTransactionRestore) {
                activeOpenTransactionRestore();
                // The superseded async work may still be awaiting an external
                // promise, but its transaction is now settled and its
                // generation is stale. Release the serialization tail so a
                // later valid request is not blocked behind dead work.
                openReplacementQueue = Promise.resolve();
            }
            let prepared;
            try {
                prepared = await readProjectFile(file);
            } catch (error) {
                if (requestId === openRequestSequence &&
                    typeof callbacks.onError === 'function') callbacks.onError(error);
                throw error;
            }

            return enqueueOpenReplacement(async () => {
                if (requestId !== openRequestSequence) return false;
                if (workspaceHasContent() && !window.confirm('Replace the current workspace with this project?')) {
                    if (requestId === openRequestSequence &&
                        typeof callbacks.onResult === 'function') callbacks.onResult(false, 'cancelled');
                    return false;
                }

                const transaction = beginWorkspaceReplacement(requestId);
                try {
                    detectedStampSetName = prepared.project.project.stampSetName || '';
                    document.getElementById('productId').value = prepared.project.project.activeProductId || '';
                    const stampSetInfo = document.getElementById('stampSetInfo');
                    if (stampSetInfo) stampSetInfo.textContent = detectedStampSetName ? `Stamp set: ${detectedStampSetName}` : '';

                    for (const source of prepared.project.sources) {
                        const hydrated = await hydrateSource(
                            source,
                            prepared.assets.get(source.assetId),
                            transaction.generation
                        );
                        if (requestId !== openRequestSequence ||
                            !transaction.ownsMutation()) {
                            transaction.restore();
                            return false;
                        }
                        if (!hydrated) throw new Error(`Project source ${source.id} hydration was cancelled`);
                    }
                    if (typeof hydrateExtractedObject === 'function') {
                        for (const object of prepared.project.extractedObjects) {
                            if (!hydrateExtractedObject(object)) {
                                throw new Error(`Could not restore extracted object ${object.id}`);
                            }
                        }
                    }
                    if (typeof hydrateComposer === 'function') hydrateComposer(prepared.project.composer);

                    if (requestId !== openRequestSequence ||
                        !transaction.ownsMutation()) {
                        transaction.restore();
                        return false;
                    }
                    if (!transaction.commit()) {
                        transaction.restore();
                        return false;
                    }
                    updateProjectActionState();
                    // Detection overlays are derived state and are not stored in
                    // the project file. Rebuild them only after commit so a
                    // failed hydration never starts work against staged UI.
                    for (const source of prepared.project.sources) {
                        if (!source.render) continue;
                        const record = projectWorkspace.sources.get(source.id);
                        if (!record) continue;
                        detectAndShowObjects(
                            record.image,
                            record.svgContainer,
                            record.width,
                            record.height,
                            record.id,
                            record.origin.productId
                        );
                    }
                    if (requestId === openRequestSequence &&
                        typeof callbacks.onResult === 'function') callbacks.onResult(true, 'committed');
                    return true;
                } catch (error) {
                    const superseded = requestId !== openRequestSequence;
                    transaction.restore();
                    if (superseded) return false;
                    if (typeof callbacks.onError === 'function') callbacks.onError(error);
                    throw error;
                }
            });
        }

        function createColorControls(onColorApply, initialState) {
            const colorControl = document.createElement('div');
            colorControl.className = 'color-control';

            const colorInputs = document.createElement('div');
            colorInputs.className = 'color-inputs';

            const colorPicker = document.createElement('input');
            colorPicker.type = 'color';
            colorPicker.className = 'color-picker';
            colorPicker.value = '#000000';

            const hexInput = document.createElement('input');
            hexInput.type = 'text';
            hexInput.className = 'hex-input';
            hexInput.value = '#000000';
            hexInput.placeholder = '#000000';

            const paletteSelector = document.createElement('select');
            paletteSelector.className = 'palette-selector';

            Object.keys(COLOR_PALETTES).forEach(paletteName => {
                const option = document.createElement('option');
                option.value = paletteName;
                option.textContent = paletteName;
                paletteSelector.appendChild(option);
            });

            const colorPalette = document.createElement('div');
            colorPalette.className = 'color-palette';

            function updatePalette(paletteName) {
                colorPalette.innerHTML = '';
                const colors = COLOR_PALETTES[paletteName];
                if (!colors) return;
                Object.entries(colors).forEach(([name, hex]) => {
                    const swatch = document.createElement('div');
                    swatch.className = 'color-swatch';
                    swatch.style.backgroundColor = hex;
                    swatch.dataset.tooltip = name;
                    swatch.dataset.hex = hex;
                    swatch.addEventListener('click', () => {
                        colorPalette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                        swatch.classList.add('active');
                        colorPicker.value = hex;
                        hexInput.value = hex;
                        onColorApply(hex);
                    });
                    colorPalette.appendChild(swatch);
                });
            }

            updatePalette(paletteSelector.value);
            paletteSelector.addEventListener('change', (e) => updatePalette(e.target.value));

            colorPicker.addEventListener('input', (e) => {
                const color = e.target.value;
                hexInput.value = color;
                onColorApply(color);
                colorPalette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            });

            hexInput.addEventListener('input', (e) => {
                let color = e.target.value;
                if (color.charAt(0) !== '#') color = '#' + color;
                if (/^#[0-9A-Fa-f]{6}$/.test(color)) {
                    colorPicker.value = color;
                    onColorApply(color);
                    colorPalette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                }
            });

            colorInputs.appendChild(colorPicker);
            colorInputs.appendChild(hexInput);
            colorControl.appendChild(colorInputs);
            colorControl.appendChild(paletteSelector);

            function setState(state) {
                if (state && /^#[0-9a-f]{6}$/i.test(state.value)) {
                    colorPicker.value = state.value;
                    hexInput.value = state.value;
                }
                if (state && COLOR_PALETTES[state.palette]) {
                    paletteSelector.value = state.palette;
                    updatePalette(state.palette);
                }
                // Mark whichever swatch (if any) matches the restored color as
                // active, so a reopened project visually highlights it the
                // same way a live click would — matched via dataset.hex, not
                // style.backgroundColor, since a real browser normalizes the
                // latter (e.g. to rgb(...)) on read-back.
                if (state && /^#[0-9a-f]{6}$/i.test(state.value)) {
                    const target = state.value.toLowerCase();
                    colorPalette.querySelectorAll('.color-swatch').forEach(swatch => {
                        if ((swatch.dataset.hex || '').toLowerCase() === target) {
                            swatch.classList.add('active');
                        } else {
                            swatch.classList.remove('active');
                        }
                    });
                }
            }

            setState(initialState);

            return {
                colorControl,
                colorPalette,
                getState: () => ({ value: colorPicker.value, palette: paletteSelector.value }),
                setState
            };
        }

        // Tracer presets. The first entry doubles as the default — its values
        // are cloned per image so per-plate tweaks don't bleed across plates.
        // 'Halftone-optimized' keeps every dot (turdsize 1) and uses sharp
        // corners (alphamax 0) so binary tracing preserves halftone fills
        // instead of dissolving them.
        const TRACER_PRESETS = Object.freeze([
            Object.freeze({
                id: 'default',
                label: 'Default',
                params: Object.freeze({ threshold: 128, turdsize: 25, alphamax: 0.8, opttolerance: 0.2, numColors: 8 })
            }),
            Object.freeze({
                id: 'halftone',
                label: 'Halftone-optimized',
                params: Object.freeze({ threshold: 128, turdsize: 1, alphamax: 0.0, opttolerance: 0.2, numColors: 8 })
            })
        ]);

        const TRACE_PARAM_DEFAULTS = TRACER_PRESETS[0].params;

        function defaultTraceParams() {
            return Object.assign({}, TRACE_PARAM_DEFAULTS);
        }

        // Vectorize an image with the selected mode. 'binary' (the default) uses
        // a single-threshold tracer via convertToSVG and is crisp for line art —
        // the right pick for the typical Stampin' Up product mix. 'color' uses
        // median-cut quantization via convertToColorSVG and preserves halftone
        // tones; flip to it for stamps with halftone fills. params overrides the
        // defaults for the shared knobs (turdsize/alphamax/opttolerance) plus the
        // mode-specific ones (threshold for binary, numColors for color).
        async function vectorizeImage(image, originalWidth, originalHeight, mode, params) {
            params = params || image._traceParams || defaultTraceParams();
            if (mode === 'binary') {
                return await convertToSVG(image, originalWidth, originalHeight, params);
            }
            return await convertToColorSVG(image, originalWidth, originalHeight, params);
        }

        // Insert a vectorized SVG into a container, scaled to fill via viewBox.
        // Replaces only the existing <svg> element (if any) so absolutely-positioned
        // siblings — the detection overlays in particular — survive a re-trace.
        // Parses through a detached DOMParser document rather than assigning
        // through innerHTML: svgString may be a project file's saved snapshot
        // (sanitized by StampinUpProjectFile, but never trusted enough to hand
        // to innerHTML) as well as a freshly-traced Potrace result.
        // Parses an SVG string into a live element via a detached DOMParser
        // document rather than assigning through innerHTML — the one path
        // used for every SVG string that might have come from a project file
        // (a saved source snapshot or a saved extracted-object record),
        // never just the freshly-traced Potrace output. Returns null (never
        // throws) for anything that doesn't parse to a bare <svg> root, so
        // callers can fail clearly instead of inserting a parser error node.
        function parseSvgElement(svgString) {
            const parsedDocument = new DOMParser().parseFromString(svgString, 'image/svg+xml');
            if (parsedDocument.querySelector('parsererror')) return null;
            const root = parsedDocument.documentElement;
            return (root && root.localName === 'svg') ? root : null;
        }

        function insertScaledSVG(container, svgString, originalWidth, originalHeight) {
            // Parse the ORIGINAL svg first, then set viewBox/width/height on the
            // parsed root via setAttribute (which replaces, never duplicates).
            // Regex-appending these onto the raw <svg ...> tag duplicated any
            // width/height a producer (Potrace output, or a saved project
            // snapshot) had already written, and a strict image/svg+xml
            // DOMParser rejects duplicate XML attributes — blanking the preview.
            const newSvg = parseSvgElement(svgString);
            if (!newSvg) {
                container.replaceChildren();
                return;
            }
            newSvg.setAttribute('viewBox', `0 0 ${originalWidth} ${originalHeight}`);
            newSvg.setAttribute('width', '100%');
            newSvg.setAttribute('height', '100%');
            const existingSvg = container.querySelector('svg');
            if (existingSvg) {
                existingSvg.replaceWith(newSvg);
            } else {
                container.insertBefore(newSvg, container.firstChild);
            }
        }

        // Two-button render-mode toggle. Stamps the chosen mode onto the source
        // image so extractObject can mirror the plate's choice for individual
        // extracts. Defaults to 'binary' (crisp line art) — that's the right pick
        // for the typical Stampin' Up product mix; flip to 'color' for halftones.
        function createRenderModeToggle(image, svgContainer, originalWidth, originalHeight, defaultMode) {
            const wrap = document.createElement('div');
            wrap.style.width = '100%';
            wrap.style.display = 'flex';
            wrap.style.flexDirection = 'column';
            wrap.style.gap = '0.35rem';

            const row = document.createElement('div');
            row.className = 'render-mode-toggle';

            const colorBtn = document.createElement('button');
            colorBtn.type = 'button';
            colorBtn.textContent = 'Preserve halftone';
            colorBtn.title = 'Keep halftone tones (color quantize)';

            const binaryBtn = document.createElement('button');
            binaryBtn.type = 'button';
            binaryBtn.textContent = 'Crisp line art';
            binaryBtn.title = 'Single-threshold trace for clean line art';

            let currentMode = defaultMode === 'color' ? 'color' : 'binary';
            image._renderMode = currentMode;

            function syncButtons() {
                colorBtn.classList.toggle('active', currentMode === 'color');
                binaryBtn.classList.toggle('active', currentMode === 'binary');
            }

            async function setMode(mode) {
                if (currentMode === mode) return;
                const generation = image._workspaceGeneration === undefined
                    ? workspaceGeneration
                    : image._workspaceGeneration;
                if (!isWorkspaceGenerationCurrent(generation)) return;
                const previous = currentMode;
                currentMode = mode;
                image._renderMode = mode;
                syncButtons();
                if (typeof wrap._onChange === 'function') wrap._onChange(mode);
                colorBtn.disabled = true;
                binaryBtn.disabled = true;
                const targetBtn = mode === 'binary' ? binaryBtn : colorBtn;
                const originalLabel = targetBtn.textContent;
                targetBtn.textContent = 'Tracing…';
                try {
                    const svg = await vectorizeImage(image, originalWidth, originalHeight, mode);
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    insertScaledSVG(svgContainer, svg, originalWidth, originalHeight);
                } catch (err) {
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    console.error('Render mode toggle failed', err);
                    currentMode = previous;
                    image._renderMode = previous;
                    syncButtons();
                    if (typeof wrap._onChange === 'function') wrap._onChange(previous);
                } finally {
                    // These are operation-local control references. Restoring
                    // them is safe even when stale (detached on success) and
                    // required when a failed Open Project reattaches this DOM.
                    targetBtn.textContent = originalLabel;
                    colorBtn.disabled = false;
                    binaryBtn.disabled = false;
                }
            }

            colorBtn.onclick = () => setMode('color');
            binaryBtn.onclick = () => setMode('binary');
            syncButtons();

            row.appendChild(colorBtn);
            row.appendChild(binaryBtn);
            wrap.appendChild(row);
            wrap._setMode = setMode;
            wrap._currentMode = () => currentMode;
            return wrap;
        }

        // Tracer parameters panel: collapsible <details> with sliders for the
        // Potrace knobs. Threshold is binary-mode only; numColors is color-mode
        // only — irrelevant rows dim out (rather than disappearing) so the layout
        // stays stable when the mode toggle is flipped.
        function createTracerParamsPanel(image, svgContainer, originalWidth, originalHeight, getMode) {
            const params = image._traceParams || defaultTraceParams();
            image._traceParams = params;

            const details = document.createElement('details');
            details.className = 'tracer-params';

            const summary = document.createElement('summary');
            summary.textContent = 'Tracing settings';
            details.appendChild(summary);

            const body = document.createElement('div');
            body.className = 'tracer-params-body';

            const SLIDERS = [
                { key: 'threshold', label: 'Threshold', min: 0, max: 255, step: 1, fixed: 0, modes: ['binary'], hint: 'Pixel < threshold becomes black' },
                { key: 'turdsize', label: 'Turdsize', min: 0, max: 200, step: 1, fixed: 0, modes: ['binary', 'color'], hint: 'Drop blobs smaller than this many pixels' },
                { key: 'alphamax', label: 'Corner', min: 0, max: 1.33, step: 0.01, fixed: 2, modes: ['binary', 'color'], hint: 'Lower = sharper corners' },
                { key: 'opttolerance', label: 'Curve fit', min: 0, max: 1, step: 0.01, fixed: 2, modes: ['binary', 'color'], hint: 'Higher = smoother curves, less detail' },
                { key: 'numColors', label: 'Colors', min: 2, max: 16, step: 1, fixed: 0, modes: ['color'], hint: 'Median-cut palette size' }
            ];

            const presetRow = document.createElement('div');
            presetRow.className = 'tracer-preset-row';
            const presetLabel = document.createElement('label');
            presetLabel.textContent = 'Preset';
            presetRow.appendChild(presetLabel);
            const presetButtons = document.createElement('div');
            presetButtons.className = 'tracer-preset-buttons';
            const presetButtonByKey = {};
            TRACER_PRESETS.forEach(preset => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'tracer-preset';
                btn.textContent = preset.label;
                btn.dataset.preset = preset.id;
                btn.onclick = () => applyPreset(preset);
                presetButtons.appendChild(btn);
                presetButtonByKey[preset.id] = btn;
            });
            presetRow.appendChild(presetButtons);
            body.appendChild(presetRow);

            const rows = [];
            SLIDERS.forEach(spec => {
                const row = document.createElement('div');
                row.className = 'tracer-param-row';
                row.title = spec.hint;

                const label = document.createElement('label');
                label.textContent = spec.label;

                const input = document.createElement('input');
                input.type = 'range';
                input.min = spec.min;
                input.max = spec.max;
                input.step = spec.step;
                input.value = params[spec.key];

                const valueDisplay = document.createElement('span');
                valueDisplay.className = 'tracer-param-value';
                valueDisplay.textContent = Number(params[spec.key]).toFixed(spec.fixed);

                input.addEventListener('input', () => {
                    const v = Number(input.value);
                    params[spec.key] = v;
                    valueDisplay.textContent = v.toFixed(spec.fixed);
                    clearActivePreset();
                });

                row.appendChild(label);
                row.appendChild(input);
                row.appendChild(valueDisplay);
                body.appendChild(row);
                rows.push({ spec, row, input, valueDisplay });
            });

            const actions = document.createElement('div');
            actions.className = 'tracer-param-actions';

            const retraceBtn = document.createElement('button');
            retraceBtn.type = 'button';
            retraceBtn.textContent = 'Re-trace';

            actions.appendChild(retraceBtn);
            body.appendChild(actions);

            details.appendChild(body);

            function syncActiveRows() {
                const mode = (typeof getMode === 'function' ? getMode() : 'color') || 'color';
                rows.forEach(({ spec, row, input }) => {
                    const active = spec.modes.includes(mode);
                    row.classList.toggle('disabled', !active);
                    input.disabled = !active;
                });
            }

            function setActivePreset(presetId) {
                Object.entries(presetButtonByKey).forEach(([key, btn]) => {
                    btn.classList.toggle('active', key === presetId);
                });
            }

            function clearActivePreset() {
                Object.values(presetButtonByKey).forEach(btn => btn.classList.remove('active'));
            }

            function applySliderValues() {
                rows.forEach(({ spec, input, valueDisplay }) => {
                    input.value = params[spec.key];
                    valueDisplay.textContent = Number(params[spec.key]).toFixed(spec.fixed);
                });
            }

            async function retrace() {
                const generation = image._workspaceGeneration === undefined
                    ? workspaceGeneration
                    : image._workspaceGeneration;
                if (!isWorkspaceGenerationCurrent(generation)) return;
                const mode = (typeof getMode === 'function' ? getMode() : 'color') || 'color';
                const originalLabel = retraceBtn.textContent;
                retraceBtn.disabled = true;
                Object.values(presetButtonByKey).forEach(btn => { btn.disabled = true; });
                retraceBtn.textContent = 'Tracing…';
                try {
                    const svg = await vectorizeImage(image, originalWidth, originalHeight, mode, params);
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    insertScaledSVG(svgContainer, svg, originalWidth, originalHeight);
                } catch (err) {
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    console.error('Re-trace failed', err);
                } finally {
                    // Reset only the controls captured by this operation. If
                    // rollback restored their DOM, they must not remain stuck
                    // in the stale operation's loading/disabled state.
                    retraceBtn.textContent = originalLabel;
                    retraceBtn.disabled = false;
                    Object.values(presetButtonByKey).forEach(btn => { btn.disabled = false; });
                }
            }

            async function applyPreset(preset) {
                Object.assign(params, preset.params);
                applySliderValues();
                setActivePreset(preset.id);
                await retrace();
            }

            retraceBtn.onclick = retrace;

            // Match an active preset based on the params already on the image,
            // so reopening the panel reflects the current state.
            const matched = TRACER_PRESETS.find(preset =>
                Object.entries(preset.params).every(([k, v]) => params[k] === v)
            );
            if (matched) setActivePreset(matched.id);

            details._syncActiveRows = syncActiveRows;
            syncActiveRows();
            return details;
        }

        function findBannerRegion(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Analyze the left 60%, top 50% of the image where packaging appears
            const scanW = Math.floor(img.naturalWidth * 0.6);
            const scanH = Math.floor(img.naturalHeight * 0.5);
            canvas.width = scanW;
            canvas.height = scanH;
            ctx.drawImage(img, 0, 0, scanW, scanH, 0, 0, scanW, scanH);

            const imageData = ctx.getImageData(0, 0, scanW, scanH);
            const pixels = imageData.data;
            const DARK = 50;

            function lum(i) {
                return pixels[i] * 0.299 + pixels[i + 1] * 0.587 + pixels[i + 2] * 0.114;
            }

            // Per-row: fraction of pixels darker than threshold
            const rowDark = new Float32Array(scanH);
            for (let y = 0; y < scanH; y++) {
                let n = 0;
                for (let x = 0; x < scanW; x++) {
                    if (lum((y * scanW + x) * 4) < DARK) n++;
                }
                rowDark[y] = n / scanW;
            }

            // Collect contiguous dark-row bands (>= 25% dark pixels per row)
            const ROW_TH = 0.25;
            const rawBands = [];
            let start = null;
            for (let y = 0; y < scanH; y++) {
                if (rowDark[y] >= ROW_TH) {
                    if (start === null) start = y;
                } else if (start !== null) {
                    rawBands.push({ y0: start, y1: y });
                    start = null;
                }
            }
            if (start !== null) rawBands.push({ y0: start, y1: scanH });
            if (rawBands.length === 0) return null;

            // Merge bands separated by small gaps (handles white text box inside banner)
            const MERGE_GAP = Math.floor(scanH * 0.06);
            const merged = [{ ...rawBands[0] }];
            for (let i = 1; i < rawBands.length; i++) {
                const prev = merged[merged.length - 1];
                if (rawBands[i].y0 - prev.y1 <= MERGE_GAP) {
                    prev.y1 = rawBands[i].y1;
                } else {
                    merged.push({ ...rawBands[i] });
                }
            }

            // Pick the tallest band that meets minimum height
            const MIN_H = Math.max(20, scanH * 0.05);
            const tallest = merged
                .filter(b => (b.y1 - b.y0) >= MIN_H)
                .sort((a, b) => (b.y1 - b.y0) - (a.y1 - a.y0))[0];
            if (!tallest) return null;

            // Find horizontal extent: first and last columns with >= 20% dark pixels in the band
            const bandH = tallest.y1 - tallest.y0;
            const COL_TH = 0.2;
            let x0 = 0, x1 = scanW;

            for (let x = 0; x < scanW; x++) {
                let n = 0;
                for (let y = tallest.y0; y < tallest.y1; y++) {
                    if (lum((y * scanW + x) * 4) < DARK) n++;
                }
                if (n / bandH >= COL_TH) { x0 = x; break; }
            }
            for (let x = scanW - 1; x >= 0; x--) {
                let n = 0;
                for (let y = tallest.y0; y < tallest.y1; y++) {
                    if (lum((y * scanW + x) * 4) < DARK) n++;
                }
                if (n / bandH >= COL_TH) { x1 = x + 1; break; }
            }

            // Small padding so text at edges isn't clipped
            const padY = Math.max(2, Math.floor(bandH * 0.05));
            const padX = Math.max(2, Math.floor((x1 - x0) * 0.02));
            return {
                x0: Math.max(0, x0 - padX),
                y0: Math.max(0, tallest.y0 - padY),
                x1: Math.min(img.naturalWidth, x1 + padX),
                y1: Math.min(img.naturalHeight, tallest.y1 + padY)
            };
        }

        function extractOCRLines(data) {
            if (data.lines && data.lines.length > 0) return data.lines;
            const lines = [];
            for (const block of (data.blocks || [])) {
                for (const para of (block.paragraphs || [])) {
                    for (const line of (para.lines || [])) {
                        lines.push(line);
                    }
                }
            }
            return lines;
        }

        function cleanOCRText(text) {
            return text.replace(/[|[\]{}]/g, '').replace(/\s+/g, ' ').trim();
        }

        async function detectStampSetName(imageBlob, generation = workspaceGeneration) {
            if (!isWorkspaceGenerationCurrent(generation)) return;
            const infoDiv = document.getElementById('stampSetInfo');
            infoDiv.textContent = 'Detecting stamp set name...';
            detectedStampSetName = '';
            let imageUrl = null;
            let worker = null;

            try {
                const img = new Image();
                imageUrl = URL.createObjectURL(imageBlob);
                img.src = imageUrl;
                await new Promise(resolve => { img.onload = resolve; });
                if (!isWorkspaceGenerationCurrent(generation)) return;

                // Step 1: Find the black banner region via pixel analysis
                const region = findBannerRegion(img);
                if (!region) {
                    if (isWorkspaceGenerationCurrent(generation)) infoDiv.textContent = '';
                    return;
                }

                // Step 2: Crop to just the banner
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const rw = region.x1 - region.x0;
                const rh = region.y1 - region.y0;
                canvas.width = rw;
                canvas.height = rh;
                ctx.drawImage(img, region.x0, region.y0, rw, rh, 0, 0, rw, rh);

                // Step 3: Invert colors (white text on black → black text on white for OCR)
                const imageData = ctx.getImageData(0, 0, rw, rh);
                const px = imageData.data;
                for (let i = 0; i < px.length; i += 4) {
                    px[i] = 255 - px[i];
                    px[i + 1] = 255 - px[i + 1];
                    px[i + 2] = 255 - px[i + 2];
                }
                ctx.putImageData(imageData, 0, 0);

                // Step 4: OCR just the banner
                worker = await Tesseract.createWorker('eng');
                if (!isWorkspaceGenerationCurrent(generation)) return;
                const result = await worker.recognize(canvas);
                if (!isWorkspaceGenerationCurrent(generation)) return;

                // Step 5: Find the stamp set name using anchor-based approach
                const anchorPatterns = [/photopolymer/i, /stamp\s*set/i, /cling/i, /clear.?mount/i, /wood.?mount/i];
                const ocrLines = extractOCRLines(result.data);

                const anchorLines = [];
                const candidateLines = [];
                for (const line of ocrLines) {
                    const text = cleanOCRText(line.text);
                    if (text.length < 2) continue;
                    if (anchorPatterns.some(p => p.test(text))) {
                        anchorLines.push(line);
                    } else {
                        candidateLines.push(line);
                    }
                }

                if (anchorLines.length > 0 && candidateLines.length > 0) {
                    let bestCandidate = null;
                    let bestDistance = Infinity;
                    for (const candidate of candidateLines) {
                        const cy = (candidate.bbox.y0 + candidate.bbox.y1) / 2;
                        for (const anchor of anchorLines) {
                            const ay = (anchor.bbox.y0 + anchor.bbox.y1) / 2;
                            const dist = Math.abs(cy - ay);
                            if (dist < bestDistance) {
                                bestDistance = dist;
                                bestCandidate = candidate;
                            }
                        }
                    }
                    if (bestCandidate) {
                        detectedStampSetName = cleanOCRText(bestCandidate.text);
                        infoDiv.textContent = `Stamp set: ${detectedStampSetName}`;
                        return;
                    }
                }

                // Fallback: filter out anchor text and take the first remaining line
                const textLines = result.data.text
                    .split('\n')
                    .map(l => cleanOCRText(l))
                    .filter(l => l.length > 1)
                    .filter(l => !anchorPatterns.some(p => p.test(l)));

                if (textLines.length > 0) {
                    detectedStampSetName = textLines[0];
                    infoDiv.textContent = `Stamp set: ${detectedStampSetName}`;
                } else {
                    infoDiv.textContent = '';
                }
            } catch (err) {
                if (isWorkspaceGenerationCurrent(generation)) {
                    console.error('OCR detection failed:', err);
                    infoDiv.textContent = '';
                }
            } finally {
                if (imageUrl) URL.revokeObjectURL(imageUrl);
                if (worker) {
                    try {
                        await worker.terminate();
                    } catch (terminateError) {
                        if (isWorkspaceGenerationCurrent(generation)) {
                            console.error('OCR worker cleanup failed:', terminateError);
                        }
                    }
                }
            }
        }

        function createMainDownloadRow(svgContainer, productId, originalWidth, originalHeight) {

            const downloadJpgButton = document.createElement('button');

        // controlKey is the STABLE source id (not the shared productId): two
        // catalog variants of one product share a productId, so keying these
        // ids on productId collides. See renderConvertedSource.
        function appendObjectsArea(wrapper, controlKey) {
            const objectsHeader = createSectionHeader('Individual Objects');
            objectsHeader.style.display = 'none';
            objectsHeader.id = `objectsHeader-${controlKey}`;
            wrapper.appendChild(objectsHeader);

            const objectsContainer = document.createElement('div');
            objectsContainer.className = 'objects-container';
            objectsContainer.id = `objects-${controlKey}`;
            wrapper.appendChild(objectsContainer);
        }

        // Renders the shared "converted source" UI (SVG preview, detection
        // controls, render-mode/tracer/color controls, downloads, and the
        // individual-objects area) for a registered source. `initial` carries
        // restore state for the project-open path (`hydrateSource`); live
        // conversion call sites pass {}. Trace params are merged over
        // defaultTraceParams() rather than replacing it outright, so a
        // partially-specified restored/seeded object still ends up with every
        // required key.
        function renderConvertedSource(record, image, svgString, wrapper, initial = {}) {
            record.image = image;
            record.wrapper = wrapper;
            image._projectSourceId = record.id;
            image._workspaceGeneration = record.generation;
            image._renderMode = initial.mode || image._renderMode || 'binary';
            image._traceParams = { ...defaultTraceParams(), ...(initial.traceParams || image._traceParams || {}) };

            const svgContainer = document.createElement('div');
            svgContainer.className = 'svg-container';
            insertScaledSVG(svgContainer, svgString, record.width, record.height);
            wrapper.appendChild(svgContainer);

            // Detection controls, objects container, and every source-specific
            // DOM id are keyed on the stable source id (record.id), NOT the
            // shared productId — otherwise two variants of one product collide
            // (extraction lands on the wrong card; detection reads the wrong
            // settings). productId stays reserved for filenames/labels/metadata.
            const detection = createObjectDetectionControls(
                image, svgContainer, record.width, record.height, record.id, record.origin.productId,
                initial.detection, { suppressAutoDetect: initial.suppressAutoDetect }
            );
            wrapper.appendChild(createSectionHeader('Object Detection'));
            wrapper.appendChild(detection);

            const controls = document.createElement('div');
            controls.className = 'controls';
            const mode = createRenderModeToggle(image, svgContainer, record.width, record.height, image._renderMode);
            const trace = createTracerParamsPanel(image, svgContainer, record.width, record.height, mode._currentMode);
            mode._onChange = () => trace._syncActiveRows();
            const color = createColorControls(value => {
                const svg = svgContainer.querySelector('svg');
                if (svg) svg.querySelectorAll('path').forEach(path => path.setAttribute('fill', value));
            }, initial.color);

            controls.appendChild(mode);
            controls.appendChild(trace);
            controls.appendChild(color.colorControl);
            controls.appendChild(color.colorPalette);
            controls.appendChild(createMainDownloadRow(svgContainer, record.origin.productId, record.width, record.height));

            wrapper.appendChild(createSectionHeader('Full Image'));
            wrapper.appendChild(controls);
            appendObjectsArea(wrapper, record.id);

            Object.assign(record, {
                image,
                wrapper,
                svgContainer,
                renderModeControl: mode,
                traceControl: trace,
                colorControl: color,
                detectionControl: detection
            });
            updateProjectActionState();
            return wrapper;
        }

        // Renders a not-yet-converted raster source: the tracked object URL
        // plus a "Force Convert to SVG" button. `options` lets callers (e.g.
        // the upload flow) inject an alt text, an inline note, and hooks that
        // mirror the status-text feedback the inline call sites used to wire
        // by hand.
        function renderRasterSource(record, wrapper, options = {}) {
            record.wrapper = wrapper;

            const img = document.createElement('img');
            // Reuse a caller-provided tracked URL (raster hydration already
            // minted one to decode the blob) instead of churning a new one.
            img.src = options.objectUrl || trackedObjectUrl(record.blob);
            img.alt = options.alt || `Product ${record.origin.productId}`;
            wrapper.appendChild(img);

            if (options.note) wrapper.appendChild(options.note);

            const forceBtn = document.createElement('button');
            forceBtn.className = 'force-convert-button';
            forceBtn.textContent = 'Convert to SVG';
            const actionHint = document.createElement('span');
            actionHint.className = 'raster-action-hint';
            actionHint.textContent = 'Not detected as line art — trace it to vectors anyway.';
            const actionRow = document.createElement('div');
            actionRow.className = 'raster-action-row';
            actionRow.appendChild(forceBtn);
            actionRow.appendChild(actionHint);
            forceBtn.onclick = () => {
                forceBtn.textContent = 'Converting...';
                forceBtn.disabled = true;
                if (typeof options.onForceConvertStart === 'function') options.onForceConvertStart();
                const generation = record.generation;
                const resetForceControl = () => {
                    forceBtn.textContent = 'Convert to SVG';
                    forceBtn.disabled = false;
                };
                const result = forceConvertImage(record.blob, record.width, record.height, record.origin.productId, wrapper, record);
                if (result && typeof result.then === 'function') {
                    return result.then(converted => {
                        if (!converted) {
                            // A failed project replacement may have restored
                            // this exact raster card while its old conversion
                            // became stale. Recover the operation-local button.
                            resetForceControl();
                            if (typeof options.onForceConvertEnd === 'function') {
                                options.onForceConvertEnd(false);
                            }
                            return false;
                        }
                        if (converted && isWorkspaceGenerationCurrent(record.generation)) {
                            if (typeof options.onForceConvert === 'function') options.onForceConvert();
                        }
                        if (typeof options.onForceConvertEnd === 'function') {
                            options.onForceConvertEnd(true);
                        }
                        return true;
                    }).catch(error => {
                        resetForceControl();
                        if (isWorkspaceGenerationCurrent(generation)) {
                            console.error('Force conversion failed', error);
                        }
                        if (typeof options.onForceConvertEnd === 'function') {
                            options.onForceConvertEnd(false);
                        }
                        return false;
                    });
                }
                return result;
            };
            wrapper.appendChild(actionRow);

            record.forceButton = forceBtn;
            updateProjectActionState();
            return wrapper;
        }

        async function loadImages() {
            const productId = document.getElementById('productId').value;
            const errorDiv = document.getElementById('error');
            const imageContainer = document.getElementById('imageContainer');
            
            if (!productId) {
                errorDiv.textContent = 'Please enter a product ID';
                return;
            }

            const generation = clearSourceWorkspace();
            detectedStampSetName = '';
            document.getElementById('stampSetInfo').textContent = '';
            errorDiv.textContent = '';

            const imageUrls = [
                `${baseUrl}/${productId}.jpg`,
                `${baseUrl}/${productId}o01.jpg`
            ];
            let dieSourceBlob = null;

            for (const url of imageUrls) {
                if (!isWorkspaceGenerationCurrent(generation)) return;
                try {
                    const response = await fetch(url);
                    if (!isWorkspaceGenerationCurrent(generation)) return;
                    if (response.ok) {
                        const blob = await response.blob();
                        if (!isWorkspaceGenerationCurrent(generation)) return;
                        
                        const imageWrapper = document.createElement('div');
                        imageWrapper.className = 'image-wrapper';
                        
                        if (url.includes('o01')) {
                            const sourceBlob = dieSourceBlob || blob;
                            // Create a temporary image to get dimensions
                            const tempImg = document.createElement('img');
                            const tempUrl = URL.createObjectURL(sourceBlob);
                            tempImg.src = tempUrl;
                            try {
                                await new Promise(resolve => {
                                    tempImg.onload = resolve;
                                });
                                if (!isWorkspaceGenerationCurrent(generation)) return;

                                const originalWidth = tempImg.naturalWidth;
                                const originalHeight = tempImg.naturalHeight;

                                const preprocessingResult = await preprocessForSVG(tempImg);
                                if (!isWorkspaceGenerationCurrent(generation)) return;
                                const imageForVectorization = preprocessingResult.processedImage;
                                const isBW = await isBlackAndWhite(imageForVectorization);
                                if (!isWorkspaceGenerationCurrent(generation)) return;

                                // Persist sourceBlob (the blob actually decoded/vectorized
                                // above), not the raw outline `blob` bytes — when a die-set
                                // is detected, sourceBlob is the main-image blob substituted
                                // in for vectorization, and originalWidth/originalHeight are
                                // already derived from it. Saving `blob` here would pair the
                                // wrong bytes with these dimensions and desync a reloaded
                                // project's raster from its saved SVG.
                                if (isBW) {
                                    // Default the auto-vectorize path to the color-quantize tracer
                                    // (preserves halftone tones). The render-mode toggle below lets
                                    // the user flip to the binary tracer for crisper line art.
                                    const initialMode = 'binary';
                                    imageForVectorization._renderMode = initialMode;
                                    imageForVectorization._traceParams = defaultTraceParams();
                                    const svg = await vectorizeImage(imageForVectorization, originalWidth, originalHeight, initialMode);
                                    if (!isWorkspaceGenerationCurrent(generation)) return;
                                    const record = createSourceRuntimeRecord({
                                        generation,
                                        blob: sourceBlob,
                                        origin: { kind: 'catalog', productId, variant: 'outline', filename: '', url },
                                        width: originalWidth,
                                        height: originalHeight,
                                        preprocess: true
                                    });
                                    if (!record) return;
                                    renderConvertedSource(record, imageForVectorization, svg, imageWrapper);
                                } else {
                                    const record = createSourceRuntimeRecord({
                                        generation,
                                        blob: sourceBlob,
                                        origin: { kind: 'catalog', productId, variant: 'outline', filename: '', url },
                                        width: originalWidth,
                                        height: originalHeight,
                                        preprocess: true
                                    });
                                    if (!record) return;
                                    renderRasterSource(record, imageWrapper);
                                }
                            } finally {
                                URL.revokeObjectURL(tempUrl);
                            }
                        } else {
                            const detectionProbe = document.createElement('img');
                            const probeUrl = URL.createObjectURL(blob);
                            detectionProbe.src = probeUrl;
                            try {
                                await new Promise((resolve, reject) => {
                                    detectionProbe.onload = resolve;
                                    detectionProbe.onerror = reject;
                                });
                                if (!isWorkspaceGenerationCurrent(generation)) return;
                                const dieProbeResult = await preprocessForSVG(detectionProbe);
                                if (!isWorkspaceGenerationCurrent(generation)) return;
                                if (dieProbeResult.dieSetDetected) {
                                    dieSourceBlob = blob;
                                }
                                const originalWidth = detectionProbe.naturalWidth;
                                const originalHeight = detectionProbe.naturalHeight;

                                const record = createSourceRuntimeRecord({
                                    generation,
                                    blob,
                                    origin: { kind: 'catalog', productId, variant: 'main', filename: '', url },
                                    width: originalWidth,
                                    height: originalHeight,
                                    preprocess: false
                                });
                                if (!record) return;
                                renderRasterSource(record, imageWrapper);

                                // Kick off OCR detection in the background for the product photo.
                                detectStampSetName(blob, generation);
                            } finally {
                                URL.revokeObjectURL(probeUrl);
                            }
                        }

                        if (!isWorkspaceGenerationCurrent(generation)) return;
                        imageContainer.appendChild(imageWrapper);
                    }
                } catch (error) {
                    if (isWorkspaceGenerationCurrent(generation)) {
                        console.error(`Error loading image ${url}:`, error);
                    }
                }
            }

            if (isWorkspaceGenerationCurrent(generation) && imageContainer.children.length === 0) {
                errorDiv.textContent = 'No images found for this product ID';
            }
        }

        async function processUploadedImage(file) {
            const generation = workspaceGeneration;
            const uploadStatus = document.getElementById('uploadStatus');
            const imageContainer = document.getElementById('imageContainer');
            const previousStatus = {
                text: uploadStatus.textContent,
                color: uploadStatus.style.color
            };

            if (!file.type.startsWith('image/')) {
