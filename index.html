        let composerStatus = null;
        let composerProductId = null;
        let composerNextId = 1;
        let composerSelected = [];   // array of <g> elements
        let composerDrag = null;     // {active, startSvgX, startSvgY, origPositions}
        let composerResizeDrag = null; // {g, corner, startSvgX, startSvgY, origScale, origTx, origTy, srcW, srcH}
        let composerZoom = 1;
        let composerCricutPreviewImg = null;
        let composerCricutPreviewStatus = null;
        let composerCricutPreviewTimer = null;
        let composerCricutPreviewToken = 0;

        function getComposerCricutOptions(writeBack = false) {
            const borderInput = document.getElementById('composerCricutBorder');
            const floodInput = document.getElementById('composerCricutFlood');
            if (!borderInput || !floodInput) return normalizeCricutOptions();
            return readCricutOptionsFromInputs(borderInput, floodInput, writeBack);
        }

        function setComposerCricutPreviewStatus(text) {
            if (!composerCricutPreviewStatus) return;
            composerCricutPreviewStatus.textContent = text;
            composerCricutPreviewStatus.style.display = text ? 'inline-block' : 'none';
        }

        function composerScheduleCricutPreview() {
            if (!composerCricutPreviewImg || !composerCricutPreviewStatus) return;
            composerCricutPreviewToken++;
            const token = composerCricutPreviewToken;
            clearTimeout(composerCricutPreviewTimer);
            setComposerCricutPreviewStatus('Rendering...');

            composerCricutPreviewTimer = setTimeout(async () => {
                try {
                    const exportData = buildComposerCricutExportSvg();
                    if (!exportData) {
                        if (token === composerCricutPreviewToken) {
                            composerCricutPreviewImg.removeAttribute('src');
                            if (composerCricutPreviewImg.parentNode) composerCricutPreviewImg.remove();
                            setComposerCricutPreviewStatus('Preview');
                        }
                        return;
                    }

                    const options = getComposerCricutOptions(false);
                    const canvas = await buildCricutCanvas(exportData.svg, exportData.width, exportData.height, {
                        ...options,
                        previewScale: getCricutPreviewScale(exportData.width, exportData.height, 260)
                    });
                    if (token !== composerCricutPreviewToken) return;

                    const frame = composerCricutPreviewStatus.parentNode;
                    composerCricutPreviewImg.src = canvas.toDataURL('image/png');
                    if (frame && !composerCricutPreviewImg.parentNode) {
                        frame.insertBefore(composerCricutPreviewImg, composerCricutPreviewStatus);
                    }
                    setComposerCricutPreviewStatus('');
                } catch (err) {
                    if (token === composerCricutPreviewToken) setComposerCricutPreviewStatus('Preview failed');
                    console.error('Composer Cricut preview failed', err);
                }
            }, 250);
        }

        // ── Lazy init ──

        function ensureComposer(productId) {
            if (composerSection) {
                composerSection.style.display = '';
                composerSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                if (productId) composerProductId = productId;
                return;
            }
            composerProductId = productId;

            composerSection = document.createElement('div');
            composerSection.className = 'composer-section';
            composerSection.id = 'composerSection';

            const heading = document.createElement('h2');
            heading.textContent = 'Composition Workspace';
            composerSection.appendChild(heading);

            // Toolbar
            const toolbar = document.createElement('div');
            toolbar.className = 'composer-toolbar';

            const mkBtn = (label, cls, onclick) => {
                const b = document.createElement('button');
                b.textContent = label;
                if (cls) b.className = cls;
                b.onclick = onclick;
                return b;
            };
            const mkDivider = () => {
                const d = document.createElement('div');
                d.className = 'tb-divider';
                return d;
            };

            // Selection group
            const selGroup = document.createElement('div');
            selGroup.className = 'composer-toolbar-group';
            selGroup.appendChild(mkBtn('Select All', '', composerSelectAll));
            selGroup.appendChild(mkBtn('Deselect', '', composerDeselectAll));
            toolbar.appendChild(selGroup);
            toolbar.appendChild(mkDivider());

            // Layer group
            const layerGroup = document.createElement('div');
            layerGroup.className = 'composer-toolbar-group';
            layerGroup.appendChild(mkBtn('↑ Forward', '', composerBringForward));
            layerGroup.appendChild(mkBtn('↓ Backward', '', composerSendBackward));
            toolbar.appendChild(layerGroup);
            toolbar.appendChild(mkDivider());

            // Resize group
            const resizeGroup = document.createElement('div');
            resizeGroup.className = 'composer-toolbar-group';
            resizeGroup.appendChild(mkBtn('− Smaller', '', () => composerResizeSelected(0.9)));
            resizeGroup.appendChild(mkBtn('+ Larger', '', () => composerResizeSelected(1.1)));
            const scaleLabel = document.createElement('span');
            scaleLabel.id = 'composerScaleLabel';
            scaleLabel.style.cssText = 'font-size:0.72rem; color:#6b7280; min-width:36px; text-align:center; font-variant-numeric:tabular-nums;';
            scaleLabel.textContent = '100%';
            resizeGroup.appendChild(scaleLabel);
            resizeGroup.appendChild(mkBtn('Reset', '', composerResetScale));
            toolbar.appendChild(resizeGroup);
            toolbar.appendChild(mkDivider());

            // Align group
            const alignGroup = document.createElement('div');
            alignGroup.className = 'composer-toolbar-group';
            alignGroup.appendChild(mkBtn('⫢L', '', () => composerAlign('left')));
            alignGroup.appendChild(mkBtn('⫠H', '', () => composerAlign('center-h')));
            alignGroup.appendChild(mkBtn('⫢R', '', () => composerAlign('right')));
            alignGroup.appendChild(mkBtn('⊤T', '', () => composerAlign('top')));
            alignGroup.appendChild(mkBtn('⊞V', '', () => composerAlign('center-v')));
            alignGroup.appendChild(mkBtn('⊥B', '', () => composerAlign('bottom')));
            alignGroup.appendChild(mkBtn('⊙ Center', '', () => composerAlign('canvas-center')));
            toolbar.appendChild(alignGroup);
            toolbar.appendChild(mkDivider());

            // Actions
            const actGroup = document.createElement('div');
            actGroup.className = 'composer-toolbar-group';
            actGroup.appendChild(mkBtn('Merge All', 'primary-action', composerMerge));
            actGroup.appendChild(mkBtn('Remove Selected', 'danger-action', composerRemoveSelected));
            actGroup.appendChild(mkBtn('Clear', 'danger-action', composerClear));
            toolbar.appendChild(actGroup);
            toolbar.appendChild(mkDivider());

            // Cricut export
            const cricutGroup = document.createElement('div');
            cricutGroup.className = 'cricut-group';
            const cricutBorderField = createCricutNumberField('Border', CRICUT_DEFAULT_BORDER, 0, CRICUT_BORDER_MAX, 'Outer cut border in px');
            const cricutFloodField = createCricutNumberField('Flood', CRICUT_DEFAULT_FLOOD, 0, CRICUT_FLOOD_MAX, 'Connect gaps up to this px size');
            cricutBorderField.input.id = 'composerCricutBorder';
            cricutFloodField.input.id = 'composerCricutFlood';

            composerCricutPreviewImg = document.createElement('img');
            composerCricutPreviewImg.alt = 'Cricut PNG preview';
            composerCricutPreviewStatus = document.createElement('span');
            composerCricutPreviewStatus.className = 'cricut-preview-status';
            composerCricutPreviewStatus.textContent = 'Preview';
            composerCricutPreviewStatus.style.display = 'inline-block';
            const composerCricutPreview = document.createElement('div');
            composerCricutPreview.className = 'composer-cricut-preview cricut-preview';
            composerCricutPreview.appendChild(composerCricutPreviewStatus);

            const cricutBtn = mkBtn('✂ Cricut PNG', '', async () => {
                const oldText = cricutBtn.textContent;
                cricutBtn.disabled = true;
                cricutBtn.textContent = 'Rendering...';
                try {
                    const options = readCricutOptionsFromInputs(cricutBorderField.input, cricutFloodField.input);
                    await composerExportCricut(options);
                } finally {
                    cricutBtn.disabled = false;
                    cricutBtn.textContent = oldText;
                }
            });

            [cricutBorderField.input, cricutFloodField.input].forEach(input => {
                input.addEventListener('input', composerScheduleCricutPreview);
                input.addEventListener('change', () => {
                    readCricutOptionsFromInputs(cricutBorderField.input, cricutFloodField.input);
                    composerScheduleCricutPreview();
                });
            });

            cricutGroup.appendChild(cricutBorderField);
            cricutGroup.appendChild(cricutFloodField);
            cricutGroup.appendChild(cricutBtn);
            cricutGroup.appendChild(composerCricutPreview);
            toolbar.appendChild(cricutGroup);

            composerSection.appendChild(toolbar);

            // Canvas wrapper
            const canvasWrapper = document.createElement('div');
            canvasWrapper.className = 'composer-canvas-wrapper';

            composerSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            composerSvg.setAttribute('viewBox', `0 0 ${COMPOSER_VB_W} ${COMPOSER_VB_H}`);
            composerSvg.setAttribute('class', 'composer-canvas');
            composerSvg.style.aspectRatio = '1';

            // Background click deselects
            composerSvg.addEventListener('mousedown', (e) => {
                if (e.target === composerSvg) {
                    composerDeselectAll();
                }
            });

            // Mouse/touch handlers for drag
            composerSvg.addEventListener('mousedown', composerOnPointerDown);
            composerSvg.addEventListener('mousemove', composerOnPointerMove);
            composerSvg.addEventListener('mouseup', composerOnPointerUp);
            composerSvg.addEventListener('mouseleave', composerOnPointerUp);
            composerSvg.addEventListener('touchstart', composerOnPointerDown, { passive: false });
            composerSvg.addEventListener('touchmove', composerOnPointerMove, { passive: false });
            composerSvg.addEventListener('touchend', composerOnPointerUp);
            composerSvg.addEventListener('touchcancel', composerOnPointerUp);

            // Scroll-wheel zooms the canvas
            canvasWrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                composerSetZoom(composerZoom * (e.deltaY < 0 ? 1.1 : 0.9));
            }, { passive: false });

            canvasWrapper.appendChild(composerSvg);

            // Zoom controls overlay
            const zoomControls = document.createElement('div');
            zoomControls.className = 'composer-zoom-controls';
            const zoomOut = document.createElement('button');
            zoomOut.textContent = '−';
            zoomOut.onclick = () => composerSetZoom(composerZoom * 0.8);
            const zoomIn = document.createElement('button');
            zoomIn.textContent = '+';
            zoomIn.onclick = () => composerSetZoom(composerZoom * 1.2);
            const zoomFit = document.createElement('button');
            zoomFit.textContent = 'Fit';
            zoomFit.onclick = () => composerSetZoom(1);
            const zoomLabel = document.createElement('span');
            zoomLabel.className = 'zoom-label';
            zoomLabel.id = 'composerZoomLabel';
            zoomLabel.textContent = '100%';
            zoomControls.appendChild(zoomOut);
            zoomControls.appendChild(zoomLabel);
            zoomControls.appendChild(zoomIn);
            zoomControls.appendChild(zoomFit);
            canvasWrapper.appendChild(zoomControls);

            composerSection.appendChild(canvasWrapper);

            // Status bar
            composerStatus = document.createElement('div');
            composerStatus.className = 'composer-status';
            composerStatus.textContent = 'Add objects using the "+ Composer" button on any extracted object card.';
            composerSection.appendChild(composerStatus);
            composerScheduleCricutPreview();

            document.getElementById('imageContainer').after(composerSection);
            composerSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ── Add object to composer ──

        function addToComposer(sourceSvg, srcW, srcH, productId, refW, refH) {
            ensureComposer(productId);

            if (!sourceSvg.querySelector('path')) return;

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', 'composer-object');
            const objId = composerNextId++;
            g.dataset.composerId = objId;
            g.dataset.srcW = srcW;
            g.dataset.srcH = srcH;

            // Scale relative to the original source image so objects from the
            // same stamp set keep their proportional sizes.  When no reference
            // dimensions are available (e.g. merged objects), fall back to fitting
            // the object itself to ~40% of the canvas.
            const hasRef = refW && refH;
            const refMaxDim = hasRef ? Math.max(refW, refH) : Math.max(srcW, srcH);
            const fitScale = (COMPOSER_VB_W * 0.7) / refMaxDim;
            g.dataset.objScale = fitScale;
            g.dataset.baseScale = fitScale;

            // Place centered initially
            const offsetX = (COMPOSER_VB_W - srcW * fitScale) / 2;
            const offsetY = (COMPOSER_VB_H - srcH * fitScale) / 2;
            g.dataset.tx = offsetX;
            g.dataset.ty = offsetY;
            g.setAttribute('transform', `translate(${offsetX}, ${offsetY}) scale(${fitScale})`);

            // Clone all child elements (preserves nested <g> transforms from merged objects)
            Array.from(sourceSvg.children).forEach(child => {
                const clone = child.cloneNode(true);
                clone.removeAttribute('class');
                g.appendChild(clone);
            });

            // Invisible hover outline rect (will be sized after append via getBBox)
            const hoverRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            hoverRect.setAttribute('class', 'hover-outline');
            g.appendChild(hoverRect);

            composerSvg.appendChild(g);

            // Size hover rect to actual content
            requestAnimationFrame(() => {
                composerSizeHoverRect(g);
            });

            composerUpdateStatus();
            composerDeselectAll();
            composerSelectObject(g);
        }

        function composerSizeHoverRect(g) {
            const hoverRect = g.querySelector('.hover-outline');
            if (!hoverRect) return;
            const uiEls = g.querySelectorAll('.hover-outline, .selection-rect, .resize-handle');
            uiEls.forEach(el => { el.setAttribute('width', 0); el.setAttribute('height', 0); });
            try {
                const box = g.getBBox();
                hoverRect.setAttribute('x', box.x - 2);
                hoverRect.setAttribute('y', box.y - 2);
                hoverRect.setAttribute('width', box.width + 4);
                hoverRect.setAttribute('height', box.height + 4);
            } catch (e) { /* ignore if not in DOM */ }
        }

        // ── Selection ──

        function composerSelectObject(g, addToSelection) {
            if (!addToSelection) {
                composerDeselectAll();
            }
            if (composerSelected.includes(g)) return;
            composerSelected.push(g);
            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
        }

        function composerDeselectObject(g) {
            composerSelected = composerSelected.filter(o => o !== g);
            g.querySelectorAll('.selection-rect, .resize-handle').forEach(el => el.remove());
            composerUpdateScaleLabel();
        }

        function composerDeselectAll() {
            composerSelected.forEach(g => {
                g.querySelectorAll('.selection-rect, .resize-handle').forEach(el => el.remove());
            });
            composerSelected = [];
            composerUpdateScaleLabel();
        }

        function composerSelectAll() {
            composerDeselectAll();
            composerSvg.querySelectorAll('.composer-object').forEach(g => {
                composerSelected.push(g);
            });
            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
        }

        function composerUpdateSelectionVisuals() {
            const HANDLE_SIZE = 8 / composerZoom;
            const PAD = 4;
            composerSelected.forEach(g => {
                let sel = g.querySelector('.selection-rect');
                if (!sel) {
                    sel = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    sel.setAttribute('class', 'selection-rect');
                    g.appendChild(sel);
                }

                // Remove old handles
                g.querySelectorAll('.resize-handle').forEach(h => h.remove());

                // Size to content bbox
                sel.setAttribute('width', 0);
                sel.setAttribute('height', 0);
                try {
                    const box = g.getBBox();
                    const bx = box.x - PAD;
                    const by = box.y - PAD;
                    const bw = box.width + PAD * 2;
                    const bh = box.height + PAD * 2;
                    sel.setAttribute('x', bx);
                    sel.setAttribute('y', by);
                    sel.setAttribute('width', bw);
                    sel.setAttribute('height', bh);

                    // Corner handles (only for single selection to keep it simple)
                    if (composerSelected.length === 1) {
                        const hs = HANDLE_SIZE;
                        const corners = [
                            { cls: 'handle-tl', cx: bx, cy: by },
                            { cls: 'handle-tr', cx: bx + bw, cy: by },
                            { cls: 'handle-bl', cx: bx, cy: by + bh },
                            { cls: 'handle-br', cx: bx + bw, cy: by + bh },
                        ];
                        corners.forEach(({ cls, cx, cy }) => {
                            const h = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                            h.setAttribute('class', 'resize-handle ' + cls);
                            h.setAttribute('x', cx - hs / 2);
                            h.setAttribute('y', cy - hs / 2);
                            h.setAttribute('width', hs);
                            h.setAttribute('height', hs);
                            h.setAttribute('rx', 1.5);
                            h.dataset.corner = cls.replace('handle-', '');
                            g.appendChild(h);
                        });
                    }
                } catch (e) {}
            });
        }

        function composerUpdateStatus() {
            if (!composerStatus) return;
            const count = composerSvg.querySelectorAll('.composer-object').length;
            composerStatus.textContent = count === 0
                ? 'Add objects using the "+ Composer" button on any extracted object card.'
                : `${count} object${count !== 1 ? 's' : ''} in workspace. Click to select, drag to move. Shift-click for multi-select.`;
            composerScheduleCricutPreview();
        }

        // ── Drag ──

        function composerSvgPoint(clientX, clientY) {
            const pt = composerSvg.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;
            return pt.matrixTransform(composerSvg.getScreenCTM().inverse());
        }

        function composerGetTranslate(g) {
            return {
                tx: parseFloat(g.dataset.tx || 0),
                ty: parseFloat(g.dataset.ty || 0)
            };
        }

        function composerApplyTransform(g) {
            const tx = parseFloat(g.dataset.tx || 0);
            const ty = parseFloat(g.dataset.ty || 0);
            const s = parseFloat(g.dataset.objScale || 1);
            g.setAttribute('transform', `translate(${tx}, ${ty}) scale(${s})`);
        }

        function composerOnPointerDown(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const svgPt = composerSvgPoint(clientX, clientY);

            // Check if a resize handle was clicked
            const handle = e.target.closest('.resize-handle');
            if (handle) {
                e.preventDefault();
                e.stopPropagation();
                const gEl = handle.closest('.composer-object');
                if (!gEl) return;
                composerResizeDrag = {
                    active: true,
                    g: gEl,
                    corner: handle.dataset.corner,
                    startSvgX: svgPt.x,
                    startSvgY: svgPt.y,
                    origScale: parseFloat(gEl.dataset.objScale || 1),
                    origTx: parseFloat(gEl.dataset.tx || 0),
                    origTy: parseFloat(gEl.dataset.ty || 0),
                    srcW: parseFloat(gEl.dataset.srcW || 100),
                    srcH: parseFloat(gEl.dataset.srcH || 100),
                };
                return;
            }

            const gEl = e.target.closest('.composer-object');
            if (!gEl) return;

            e.preventDefault();

            // Selection handling
            if (e.shiftKey || e.metaKey || e.ctrlKey) {
                if (composerSelected.includes(gEl)) {
                    composerDeselectObject(gEl);
                } else {
                    composerSelectObject(gEl, true);
                }
            } else {
                if (!composerSelected.includes(gEl)) {
                    composerSelectObject(gEl, false);
                }
            }

            // Start drag for all selected objects
            composerDrag = {
                active: true,
                startSvgX: svgPt.x,
                startSvgY: svgPt.y,
                origPositions: composerSelected.map(g => ({
                    el: g,
                    tx: parseFloat(g.dataset.tx || 0),
                    ty: parseFloat(g.dataset.ty || 0)
                }))
            };
        }

        function composerOnPointerMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Handle resize drag
            if (composerResizeDrag && composerResizeDrag.active) {
                e.preventDefault();
                const svgPt = composerSvgPoint(clientX, clientY);
                const { g, corner, startSvgX, startSvgY, origScale, origTx, origTy, srcW, srcH } = composerResizeDrag;

                // The anchor is the opposite corner from the one being dragged
                const origW = srcW * origScale;
                const origH = srcH * origScale;
                let anchorX, anchorY;
                if (corner === 'tl') { anchorX = origTx + origW; anchorY = origTy + origH; }
                else if (corner === 'tr') { anchorX = origTx; anchorY = origTy + origH; }
                else if (corner === 'bl') { anchorX = origTx + origW; anchorY = origTy; }
                else { anchorX = origTx; anchorY = origTy; } // br

                // Compute scale factor from the distance change between anchor and pointer
                const origDist = Math.hypot(startSvgX - anchorX, startSvgY - anchorY);
                const curDist = Math.hypot(svgPt.x - anchorX, svgPt.y - anchorY);
                if (origDist < 1) return;

                const scaleFactor = curDist / origDist;
                const newScale = origScale * scaleFactor;
                const newW = srcW * newScale;
                const newH = srcH * newScale;

                // Position so the anchor corner stays fixed
                let newTx, newTy;
                if (corner === 'tl') { newTx = anchorX - newW; newTy = anchorY - newH; }
                else if (corner === 'tr') { newTx = anchorX; newTy = anchorY - newH; }
                else if (corner === 'bl') { newTx = anchorX - newW; newTy = anchorY; }
                else { newTx = anchorX; newTy = anchorY; } // br

                g.dataset.objScale = newScale;
                g.dataset.tx = newTx;
                g.dataset.ty = newTy;
                composerApplyTransform(g);
                composerSizeHoverRect(g);
                composerUpdateSelectionVisuals();
                composerUpdateScaleLabel();
                return;
            }

            // Handle move drag
            if (!composerDrag || !composerDrag.active) return;
            e.preventDefault();

            const svgPt = composerSvgPoint(clientX, clientY);
            const dx = svgPt.x - composerDrag.startSvgX;
            const dy = svgPt.y - composerDrag.startSvgY;

            composerDrag.origPositions.forEach(({ el, tx, ty }) => {
                el.dataset.tx = tx + dx;
                el.dataset.ty = ty + dy;
                composerApplyTransform(el);
            });

            composerUpdateSelectionVisuals();
        }

        function composerOnPointerUp(e) {
            const changed = (composerResizeDrag && composerResizeDrag.active) || (composerDrag && composerDrag.active);
            if (composerResizeDrag) {
                composerResizeDrag.active = false;
                composerResizeDrag = null;
            }
            if (composerDrag) {
                composerDrag.active = false;
                composerDrag = null;
            }
            if (changed) composerScheduleCricutPreview();
        }

        // ── Layer controls ──

        function composerBringForward() {
            let changed = false;
            for (let i = composerSelected.length - 1; i >= 0; i--) {
                const g = composerSelected[i];
                const next = g.nextElementSibling;
                if (next && !composerSelected.includes(next)) {
                    g.parentNode.insertBefore(next, g);
                    changed = true;
                }
            }
            if (changed) composerScheduleCricutPreview();
        }

        function composerSendBackward() {
            let changed = false;
            composerSelected.forEach(g => {
                const prev = g.previousElementSibling;
                if (prev && !composerSelected.includes(prev)) {
                    g.parentNode.insertBefore(g, prev);
                    changed = true;
                }
            });
            if (changed) composerScheduleCricutPreview();
        }

        // ── Zoom ──

        function composerSetZoom(level) {
            composerZoom = Math.max(0.25, Math.min(5, level));
            if (!composerSvg) return;
            const vw = COMPOSER_VB_W / composerZoom;
            const vh = COMPOSER_VB_H / composerZoom;
            const ox = (COMPOSER_VB_W - vw) / 2;
            const oy = (COMPOSER_VB_H - vh) / 2;
            composerSvg.setAttribute('viewBox', `${ox} ${oy} ${vw} ${vh}`);
            const label = document.getElementById('composerZoomLabel');
            if (label) label.textContent = Math.round(composerZoom * 100) + '%';
        }

        // ── Resize ──

        function composerResizeSelected(factor) {
            if (composerSelected.length === 0) return;

            composerSelected.forEach(g => {
                const oldScale = parseFloat(g.dataset.objScale || 1);
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const srcW = parseFloat(g.dataset.srcW || 0);
                const srcH = parseFloat(g.dataset.srcH || 0);

                const newScale = oldScale * factor;

                // Scale around the object's center: adjust translate so the
                // center point stays in the same place on the canvas
                const oldCx = tx + (srcW * oldScale) / 2;
                const oldCy = ty + (srcH * oldScale) / 2;
                const newTx = oldCx - (srcW * newScale) / 2;
                const newTy = oldCy - (srcH * newScale) / 2;

                g.dataset.objScale = newScale;
                g.dataset.tx = newTx;
                g.dataset.ty = newTy;
                composerApplyTransform(g);
                composerSizeHoverRect(g);
            });

            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
            composerScheduleCricutPreview();
        }

        function composerResetScale() {
            if (composerSelected.length === 0) return;

            composerSelected.forEach(g => {
                const baseScale = parseFloat(g.dataset.baseScale || g.dataset.objScale || 1);
                const oldScale = parseFloat(g.dataset.objScale || 1);
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const srcW = parseFloat(g.dataset.srcW || 0);
                const srcH = parseFloat(g.dataset.srcH || 0);

                // Re-center after reset
                const cx = tx + (srcW * oldScale) / 2;
                const cy = ty + (srcH * oldScale) / 2;
                g.dataset.objScale = baseScale;
                g.dataset.tx = cx - (srcW * baseScale) / 2;
                g.dataset.ty = cy - (srcH * baseScale) / 2;
                composerApplyTransform(g);
                composerSizeHoverRect(g);
            });

            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
            composerScheduleCricutPreview();
        }

        function composerUpdateScaleLabel() {
            const label = document.getElementById('composerScaleLabel');
            if (!label) return;
            if (composerSelected.length === 1) {
                const base = parseFloat(composerSelected[0].dataset.baseScale || composerSelected[0].dataset.objScale);
                const cur = parseFloat(composerSelected[0].dataset.objScale);
                label.textContent = Math.round((cur / base) * 100) + '%';
            } else if (composerSelected.length > 1) {
                label.textContent = '—';
            } else {
                label.textContent = '100%';
            }
        }

        // ── Alignment ──

        function composerGetObjBounds(g) {
            const tx = parseFloat(g.dataset.tx || 0);
            const ty = parseFloat(g.dataset.ty || 0);
            const s = parseFloat(g.dataset.objScale || 1);
            const srcW = parseFloat(g.dataset.srcW || 0);
            const srcH = parseFloat(g.dataset.srcH || 0);
            const w = srcW * s;
            const h = srcH * s;
            return { tx, ty, w, h };
        }

        function composerAlign(mode) {
            if (composerSelected.length === 0) return;

            const bounds = composerSelected.map(g => composerGetObjBounds(g));

            if (mode === 'canvas-center') {
                composerSelected.forEach((g, i) => {
                    const b = bounds[i];
                    g.dataset.tx = (COMPOSER_VB_W - b.w) / 2;
                    g.dataset.ty = (COMPOSER_VB_H - b.h) / 2;
                    composerApplyTransform(g);
                });
            } else if (composerSelected.length >= 2) {
                switch (mode) {
                    case 'left': {
                        const minX = Math.min(...bounds.map(b => b.tx));
                        composerSelected.forEach((g, i) => {
                            g.dataset.tx = minX;
                            composerApplyTransform(g);
                        });
                        break;
                    }
                    case 'right': {
                        const maxRight = Math.max(...bounds.map(b => b.tx + b.w));
                        composerSelected.forEach((g, i) => {
                            g.dataset.tx = maxRight - bounds[i].w;
                            composerApplyTransform(g);
                        });
                        break;
                    }
                    case 'center-h': {
                        const avgCx = bounds.reduce((s, b) => s + b.tx + b.w / 2, 0) / bounds.length;
                        composerSelected.forEach((g, i) => {
                            g.dataset.tx = avgCx - bounds[i].w / 2;
                            composerApplyTransform(g);
                        });
                        break;
                    }
                    case 'top': {
                        const minY = Math.min(...bounds.map(b => b.ty));
                        composerSelected.forEach((g) => {
                            g.dataset.ty = minY;
                            composerApplyTransform(g);
                        });
                        break;
                    }
                    case 'bottom': {
                        const maxBot = Math.max(...bounds.map(b => b.ty + b.h));
                        composerSelected.forEach((g, i) => {
                            g.dataset.ty = maxBot - bounds[i].h;
                            composerApplyTransform(g);
                        });
                        break;
                    }
                    case 'center-v': {
                        const avgCy = bounds.reduce((s, b) => s + b.ty + b.h / 2, 0) / bounds.length;
                        composerSelected.forEach((g, i) => {
                            g.dataset.ty = avgCy - bounds[i].h / 2;
                            composerApplyTransform(g);
                        });
                        break;
                    }
                }
            } else if (composerSelected.length === 1) {
                // Single object: align relative to canvas
                const b = bounds[0];
                const g = composerSelected[0];
                switch (mode) {
                    case 'left':     g.dataset.tx = 0; break;
                    case 'right':    g.dataset.tx = COMPOSER_VB_W - b.w; break;
                    case 'center-h': g.dataset.tx = (COMPOSER_VB_W - b.w) / 2; break;
                    case 'top':      g.dataset.ty = 0; break;
                    case 'bottom':   g.dataset.ty = COMPOSER_VB_H - b.h; break;
                    case 'center-v': g.dataset.ty = (COMPOSER_VB_H - b.h) / 2; break;
                }
                composerApplyTransform(g);
            }

            composerUpdateSelectionVisuals();
            composerScheduleCricutPreview();
        }

        // ── Remove / Clear ──

        function composerRemoveSelected() {
            composerSelected.forEach(g => g.remove());
            composerSelected = [];
            composerUpdateStatus();
        }

        function composerClear() {
            composerSvg.querySelectorAll('.composer-object').forEach(g => g.remove());
            composerSelected = [];
            composerNextId = 1;
            composerUpdateStatus();
        }

        // ── Merge ──

        function composerGetGroupBounds(g) {
            const tx = parseFloat(g.dataset.tx || 0);
            const ty = parseFloat(g.dataset.ty || 0);
            const s = parseFloat(g.dataset.objScale || 1);

            // Temporarily hide non-content rects for accurate bbox
            const uiEls = g.querySelectorAll('.selection-rect, .hover-outline, .resize-handle');
            uiEls.forEach(el => el.style.display = 'none');

            let box;
            try { box = g.getBBox(); } catch (e) { box = { x: 0, y: 0, width: 0, height: 0 }; }

            uiEls.forEach(el => el.style.display = '');

            return {
                x1: tx + box.x * s,
                y1: ty + box.y * s,
                x2: tx + (box.x + box.width) * s,
                y2: ty + (box.y + box.height) * s
            };
        }

        function composerSerializeGroupContent(g) {
            const serializer = new XMLSerializer();
            const skip = ['selection-rect', 'hover-outline', 'resize-handle'];
            let inner = '';
            Array.from(g.children).forEach(child => {
                if (child.classList && skip.some(c => child.classList.contains(c))) return;
                inner += serializer.serializeToString(child);
            });
            return inner;
        }

        function composerMerge() {
            const objects = composerSvg.querySelectorAll('.composer-object');
            if (objects.length === 0) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            objects.forEach(g => {
                const b = composerGetGroupBounds(g);
                minX = Math.min(minX, b.x1);
                minY = Math.min(minY, b.y1);
                maxX = Math.max(maxX, b.x2);
                maxY = Math.max(maxY, b.y2);
            });
            if (!isFinite(minX)) return;

            const mergedW = maxX - minX;
            const mergedH = maxY - minY;

            let content = '';
            objects.forEach(g => {
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const s = parseFloat(g.dataset.objScale || 1);
                const inner = composerSerializeGroupContent(g);
                content += `<g transform="translate(${tx - minX}, ${ty - minY}) scale(${s})">${inner}</g>`;
            });

            const mergedSvgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${mergedW} ${mergedH}" width="${mergedW}" height="${mergedH}">${content}</svg>`;

            const productId = composerProductId || 'composed';
            createExtractedObjectCard(mergedSvgStr, Math.round(mergedW), Math.round(mergedH), productId, 'Merged');

            composerStatus.textContent = 'Merged! New object card created. You can add it back to the composer for further composition.';
        }

        // ── Cricut export from composer ──

        function buildComposerCricutExportSvg() {
            const objects = composerSvg.querySelectorAll('.composer-object');
            if (objects.length === 0) return null;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            objects.forEach(g => {
                const b = composerGetGroupBounds(g);
                minX = Math.min(minX, b.x1);
                minY = Math.min(minY, b.y1);
                maxX = Math.max(maxX, b.x2);
                maxY = Math.max(maxY, b.y2);
            });
            if (!isFinite(minX)) return null;

            const w = maxX - minX;
            const h = maxY - minY;

            // The composer coordinate space is small (800-unit viewBox), so
            // passing those raw values to generateCricutPNG produces a low-res
            // render.  Compute an upscale factor that brings the output close
            // to the original source-image resolution.
            let maxSrcDim = 0;
            let maxComposerDim = 0;
            objects.forEach(g => {
                const srcW = parseFloat(g.dataset.srcW || 0);
                const srcH = parseFloat(g.dataset.srcH || 0);
                const s = parseFloat(g.dataset.objScale || 1);
                maxSrcDim = Math.max(maxSrcDim, srcW, srcH);
                maxComposerDim = Math.max(maxComposerDim, srcW * s, srcH * s);
            });
            const upscale = maxComposerDim > 0 ? Math.max(1, maxSrcDim / maxComposerDim) : 1;

            const W = w * upscale;
            const H = h * upscale;

            const tmpSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            tmpSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            tmpSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            tmpSvg.setAttribute('width', W);
            tmpSvg.setAttribute('height', H);

            objects.forEach(g => {
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const s = parseFloat(g.dataset.objScale || 1);
                const gWrap = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                gWrap.setAttribute('transform', `translate(${(tx - minX) * upscale}, ${(ty - minY) * upscale}) scale(${s * upscale})`);
                const skipCls = ['selection-rect', 'hover-outline', 'resize-handle'];
                Array.from(g.children).forEach(child => {
                    if (child.classList && skipCls.some(c => child.classList.contains(c))) return;
                    gWrap.appendChild(child.cloneNode(true));
                });
                tmpSvg.appendChild(gWrap);
            });

            const pid = composerProductId || 'composed';
            return {
                svg: tmpSvg,
                productId: pid,
                width: Math.round(W),
                height: Math.round(H)
            };
        }

        async function composerExportCricut(options) {
            const exportData = buildComposerCricutExportSvg();
            if (!exportData) return;
            await generateCricutPNG(exportData.svg, exportData.productId, exportData.width, exportData.height, options);
        }
    </script>
</body>
</html>
