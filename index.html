                            previewScale: getCricutPreviewScale(width, height)
                        });
                        if (token !== cricutPreviewToken ||
                            !isWorkspaceGenerationCurrent(previewGeneration)) return;
                        cricutPreviewImg.src = canvas.toDataURL('image/png');
                        if (svg.parentNode === preview) svg.remove();
                        if (!cricutPreviewImg.parentNode) preview.insertBefore(cricutPreviewImg, cricutPreviewStatus);
                        cricutPreviewStatus.textContent = '';
                        cricutPreviewStatus.style.display = 'none';
                    } catch (err) {
                        if (token === cricutPreviewToken &&
                            isWorkspaceGenerationCurrent(previewGeneration)) {
                            cricutPreviewStatus.textContent = 'Preview failed';
                            cricutPreviewStatus.style.display = 'inline-block';
                            console.error('Cricut preview failed', err);
                        }
                    }
                }, 250);
            };
            const resetCricutPreview = () => {
                cricutPreviewToken++;
                clearTimeout(cricutPreviewTimer);
                cricutPreviewTimer = null;
                cricutPreviewStatus.textContent = '';
                cricutPreviewStatus.style.display = 'none';
            };
            objectState.schedulePreview = scheduleCricutPreview;
            objectState.resetPreview = resetCricutPreview;

            const cricutButton = document.createElement('button');
            cricutButton.textContent = '✂ Cricut PNG';
            cricutButton.onclick = async () => {
                const oldText = cricutButton.textContent;
                cricutButton.disabled = true;
                cricutButton.textContent = 'Rendering...';
                try {
                    const liveCricutOptions = readCricutOptionsFromInputs(borderInput, floodInput);
                    await generateCricutPNG(svg, productId, width, height, liveCricutOptions);
                } finally {
                    cricutButton.disabled = false;
                    cricutButton.textContent = oldText;
                }
            };

            [borderInput, floodInput].forEach(input => {
                input.addEventListener('input', scheduleCricutPreview);
                input.addEventListener('change', () => {
                    readCricutOptionsFromInputs(borderInput, floodInput);
                    scheduleCricutPreview();
                });
            });

            header.appendChild(title);
            header.appendChild(removeButton);

            const actionRow = document.createElement('div');
            actionRow.className = 'object-action-row';

            const divider = document.createElement('div');
            divider.className = 'action-divider';

            const cricutGroup = document.createElement('div');
            cricutGroup.className = 'cricut-group';
            cricutGroup.appendChild(borderField);
            cricutGroup.appendChild(floodField);
            cricutGroup.appendChild(cricutButton);

            const composerButton = document.createElement('button');
            composerButton.className = 'add-to-composer-btn';
            composerButton.textContent = '+ Composer';
            composerButton.title = 'Add to composition workspace';
            composerButton.onclick = () => addToComposer(svg, width, height, productId, refW, refH, objectId);

            actionRow.appendChild(downloadButton);
            actionRow.appendChild(downloadJpgButton);
            actionRow.appendChild(divider);
            actionRow.appendChild(cricutGroup);

            const divider2 = document.createElement('div');
            divider2.className = 'action-divider';
            actionRow.appendChild(divider2);
            actionRow.appendChild(composerButton);

            // Create color controls for the object, seeded from options.color
            // (hydration) so a restored object shows its saved color/palette
            // immediately, not just the default black.
            const colorControl = createObjectColorControls(svg, scheduleCricutPreview, options.color);
            objectState.colorControl = colorControl;

            controls.appendChild(header);
            controls.appendChild(actionRow);
            controls.appendChild(colorControl.container);
            
            objectCard.appendChild(preview);
            objectCard.appendChild(controls);
            
            objectsContainer.appendChild(objectCard);
            scheduleCricutPreview();
            
            // Scroll to the new object card — skipped during project-open
            // hydration (options.scroll === false) so restoring N objects
            // doesn't jump the page N times.
            if (options.scroll !== false) {
                objectCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            return objectCard;
        }

        // Wraps createColorControls for an extracted object's SVG, seeding
        // initialState (options.color from hydration) and returning the
        // getState/setState pair alongside the assembled `.container` so the
        // caller can both mount the control and retain it for capture.
        function createObjectColorControls(svg, onColorChange, initialState) {
            const control = createColorControls(
                (color) => {
                    if (svg) svg.querySelectorAll('path').forEach(p => p.setAttribute('fill', color));
                    if (onColorChange) onColorChange();
                },
                initialState
            );

            const container = document.createElement('div');
            container.appendChild(control.colorControl);
            container.appendChild(control.colorPalette);
            control.container = container;

            return control;
        }

        // Captures every still-connected extracted object into plain,
        // serializable records for the project file. `state.svg` is stored
        // once at card-creation time and never replaced afterward — even
        // once the Cricut PNG preview swaps the visible <img> in for it and
        // detaches it from the preview (see scheduleCricutPreview above) —
        // so serializing it here always reflects the object's current
        // (possibly recolored) paths regardless of what's on screen.
        function captureExtractedObjects() {
            return Array.from(projectWorkspace.extractedObjects.values())
                .filter(state => state.card.isConnected)
                .map(state => ({
                    id: state.id,
                    sourceId: state.sourceId,
                    productId: state.productId,
                    label: state.label,
                    width: state.width,
                    height: state.height,
                    referenceWidth: state.referenceWidth,
                    referenceHeight: state.referenceHeight,
                    svg: new XMLSerializer().serializeToString(state.svg),
                    color: state.colorControl.getState(),
                    cricut: persistedCricutOptions(readCricutOptionsFromInputs(state.borderInput, state.floodInput, false))
                }));
        }

        // Recreates one saved extracted object exactly as captureExtractedObjects
        // recorded it: same id/sourceId/label, same saved SVG (parsed through
        // parseSvgElement inside createExtractedObjectCard — never innerHTML),
        // same color/Cricut state, no auto-scroll. The object attaches by its
        // stable sourceId (the objects container key), never the shared
        // productId. Returns null (logged, not thrown) if the object's source
        // never got its objects-${sourceId} area — e.g. that source failed to
        // hydrate — so one bad record can't corrupt the rest of an otherwise-
        // good project open.
        function hydrateExtractedObject(record) {
            return createExtractedObjectCard(
                record.svg,
                record.width,
                record.height,
                record.productId,
                record.label.replace(/^Object\s*/i, '') || record.label,
                record.referenceWidth,
                record.referenceHeight,
                {
                    id: record.id,
                    sourceId: record.sourceId,
                    label: record.label,
                    color: record.color,
                    cricut: record.cricut,
                    scroll: false
                }
            );
        }

        function sanitizeForFilename(name) {
            return name
                .trim()
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '_')
                .replace(/_+/g, '_')
                .replace(/^_|_$/g, '');
        }

        function buildDownloadFilename(productId, suffix) {
            const sanitized = sanitizeForFilename(detectedStampSetName);
            const parts = ['stampinup', productId];
            if (sanitized) parts.push(sanitized);
            if (suffix) parts.push(suffix);
            return parts.join('_') + '.svg';
        }

        function downloadObjectSVG(svg, productId, originalWidth, originalHeight) {
            if (!svg) return;

            const svgCopy = svg.cloneNode(true);
            svgCopy.setAttribute('viewBox', `0 0 ${originalWidth} ${originalHeight}`);
            svgCopy.setAttribute('width', originalWidth);
            svgCopy.setAttribute('height', originalHeight);

            const svgData = new XMLSerializer().serializeToString(svgCopy);
            const blob = new Blob([svgData], { type: 'image/svg+xml' });

            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = buildDownloadFilename(productId, `object_${Date.now()}`);

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function downloadObjectPNG(svg, productId, originalWidth, originalHeight) {
            if (!svg) return;
            svgToImageBlob(svg, originalWidth, originalHeight, 'image/png', blob => {
                triggerDownload(blob, buildDownloadFilename(productId, `object_${Date.now()}`).replace(/\.svg$/, '.png'));
            });
        }

        function downloadObjectJPG(svg, productId, originalWidth, originalHeight) {
            if (!svg) return;
            svgToImageBlob(svg, originalWidth, originalHeight, 'image/jpeg', blob => {
                triggerDownload(blob, buildDownloadFilename(productId, `object_${Date.now()}`).replace(/\.svg$/, '.jpg'));
            });
        }

        function downloadSVG(svg, productId, originalWidth, originalHeight) {
            if (!svg) return;
            
            // Create a copy of the SVG to modify
            const svgCopy = svg.cloneNode(true);
            
            // Set the viewBox to match original dimensions
            svgCopy.setAttribute('viewBox', `0 0 ${originalWidth} ${originalHeight}`);
            
            // Set width and height to match original dimensions
            svgCopy.setAttribute('width', originalWidth);
            svgCopy.setAttribute('height', originalHeight);
            
            // Create a blob from the SVG
            const svgData = new XMLSerializer().serializeToString(svgCopy);
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            
            // Create a download link
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = buildDownloadFilename(productId);
            
            // Trigger the download
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function svgToImageBlob(svg, originalWidth, originalHeight, mimeType, callback) {
            const svgCopy = svg.cloneNode(true);
            svgCopy.setAttribute('viewBox', `0 0 ${originalWidth} ${originalHeight}`);
            svgCopy.setAttribute('width', originalWidth);
            svgCopy.setAttribute('height', originalHeight);

            const svgData = new XMLSerializer().serializeToString(svgCopy);
            const svgBlob = new Blob([svgData], { type: 'image/svg+xml' });
            const svgUrl = URL.createObjectURL(svgBlob);

            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = originalWidth;
                canvas.height = originalHeight;
                const ctx = canvas.getContext('2d');
                if (mimeType === 'image/jpeg') {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, originalWidth, originalHeight);
                }
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(svgUrl);
                canvas.toBlob(callback, mimeType);
            };
            img.src = svgUrl;
        }

        function triggerDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function downloadPNG(svg, productId, originalWidth, originalHeight) {
            if (!svg) return;
            svgToImageBlob(svg, originalWidth, originalHeight, 'image/png', blob => {
                triggerDownload(blob, buildDownloadFilename(productId).replace(/\.svg$/, '.png'));
            });
        }

        function downloadJPG(svg, productId, originalWidth, originalHeight) {
            if (!svg) return;
            svgToImageBlob(svg, originalWidth, originalHeight, 'image/jpeg', blob => {
                triggerDownload(blob, buildDownloadFilename(productId).replace(/\.svg$/, '.jpg'));
            });
        }

        // --- Cricut "Print Then Cut" export ---

        function renderSVGOffscreen(svg, origW, origH, targetW, targetH) {
            return new Promise((resolve, reject) => {
                const svgCopy = svg.cloneNode(true);
                svgCopy.setAttribute('viewBox', `0 0 ${origW} ${origH}`);
                svgCopy.setAttribute('width', targetW);
                svgCopy.setAttribute('height', targetH);

                const svgData = new XMLSerializer().serializeToString(svgCopy);
                const svgBlob = new Blob([svgData], { type: 'image/svg+xml' });
                const svgUrl = URL.createObjectURL(svgBlob);

                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = targetW;
                    canvas.height = targetH;
                    const ctx = canvas.getContext('2d');
                    // Draw on transparent background (no fill)
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(svgUrl);
                    resolve(canvas);
                };
                img.onerror = (e) => {
                    URL.revokeObjectURL(svgUrl);
                    reject(e);
                };
                img.src = svgUrl;
            });
        }

        function distanceTransform1D(f, n, out, v, z, inf) {
            let first = -1;
            for (let i = 0; i < n; i++) {
                if (f[i] < inf / 2) {
                    first = i;
                    break;
                }
            }

            if (first === -1) {
                for (let i = 0; i < n; i++) out[i] = inf;
                return;
            }

            let k = 0;
            v[0] = first;
            z[0] = -inf;
            z[1] = inf;

            for (let q = first + 1; q < n; q++) {
                if (f[q] >= inf / 2) continue;

                let s = 0;
                while (k >= 0) {
                    const r = v[k];
                    s = ((f[q] + q * q) - (f[r] + r * r)) / (2 * (q - r));
                    if (s > z[k]) break;
                    k--;
                }

                k++;
                v[k] = q;
                z[k] = k === 0 ? -inf : s;
                z[k + 1] = inf;
            }

            k = 0;
            for (let q = 0; q < n; q++) {
                while (z[k + 1] < q) k++;
                const r = v[k];
                const d = q - r;
                out[q] = d * d + f[r];
            }
        }

        function distanceToMaskSquared(mask, w, h, targetValue) {
            const n = w * h;
            const inf = 1e12;
            const maxDim = Math.max(w, h);
            const temp = new Float32Array(n);
            const f = new Float64Array(maxDim);
            const out = new Float64Array(maxDim);
            const v = new Int32Array(maxDim);
            const z = new Float64Array(maxDim + 1);

            for (let y = 0; y < h; y++) {
                const row = y * w;
                for (let x = 0; x < w; x++) {
                    f[x] = mask[row + x] === targetValue ? 0 : inf;
                }
                distanceTransform1D(f, w, out, v, z, inf);
                for (let x = 0; x < w; x++) {
                    temp[row + x] = out[x];
                }
            }

            for (let x = 0; x < w; x++) {
                for (let y = 0; y < h; y++) {
                    f[y] = temp[y * w + x];
                }
                distanceTransform1D(f, h, out, v, z, inf);
                for (let y = 0; y < h; y++) {
                    temp[y * w + x] = out[y];
                }
            }

            return temp;
        }

        function dilateCircular(mask, w, h, radius) {
            if (radius <= 0) return new Uint8Array(mask);

            const distances = distanceToMaskSquared(mask, w, h, 1);
            const result = new Uint8Array(w * h);
            const radiusSquared = radius * radius;
            for (let i = 0; i < result.length; i++) {
                result[i] = distances[i] <= radiusSquared ? 1 : 0;
            }
            return result;
        }

        function erodeCircular(mask, w, h, radius) {
            if (radius <= 0) return new Uint8Array(mask);
            const distances = distanceToMaskSquared(mask, w, h, 0);
            const result = new Uint8Array(w * h);
            const radiusSquared = radius * radius;
            for (let i = 0; i < result.length; i++) {
                result[i] = mask[i] && distances[i] > radiusSquared ? 1 : 0;
            }
            return result;
        }

        function closeGapsCircular(mask, w, h, radius) {
            if (radius <= 0) return new Uint8Array(mask);
            const expanded = dilateCircular(mask, w, h, radius);
            return erodeCircular(expanded, w, h, radius);
        }

        function findExteriorPixels(blocked, w, h) {
            const exterior = new Uint8Array(w * h);
            const queue = new Int32Array(w * h);
            let head = 0, tail = 0;

            const enqueue = (idx) => {
                if (blocked[idx] || exterior[idx]) return;
                exterior[idx] = 1;
                queue[tail++] = idx;
            };

            for (let x = 0; x < w; x++) {
                enqueue(x);
                enqueue((h - 1) * w + x);
            }
            for (let y = 0; y < h; y++) {
                enqueue(y * w);
                enqueue(y * w + w - 1);
            }

            while (head < tail) {
                const idx = queue[head++];
                const x = idx % w;
                const y = (idx / w) | 0;
                if (x > 0)     enqueue(idx - 1);
                if (x < w - 1) enqueue(idx + 1);
                if (y > 0)     enqueue(idx - w);
                if (y < h - 1) enqueue(idx + w);
            }

            return exterior;
        }

        async function buildCricutCanvas(svg, width, height, rawOptions) {
            const options = normalizeCricutOptions(rawOptions);
            const scale = options.previewScale;
            const renderW = Math.max(1, Math.round(width * scale));
            const renderH = Math.max(1, Math.round(height * scale));
            const bufferScaled = options.outerBufferPx * scale;
            const closeRadiusScaled = (options.gapFloodPx * scale) / 2;

            // Keep the current 25px/0px output dimensions unchanged while adding
            // enough temporary space for aggressive gap-closing passes.
            const pad = Math.ceil((bufferScaled * 2) + closeRadiusScaled);
            const tw = renderW + pad * 2;
            const th = renderH + pad * 2;

            const svgCanvas = await renderSVGOffscreen(svg, width, height, renderW, renderH);
            const renderCanvas = document.createElement('canvas');
            renderCanvas.width = tw;
            renderCanvas.height = th;
            renderCanvas.getContext('2d').drawImage(svgCanvas, pad, pad);

            const ctx = renderCanvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, tw, th);
            const data = imageData.data;
            const n = tw * th;

            // Step 1: Classify ink pixels (alpha > 32)
            const isInk = new Uint8Array(n);
            for (let i = 0; i < n; i++) {
                isInk[i] = data[i * 4 + 3] > 32 ? 1 : 0;
            }

            // Step 2: Flood fill from the edges through non-ink pixels.
            const isExterior = findExteriorPixels(isInk, tw, th);

            // Step 3: Build silhouette mask (ink + interior non-ink)
            const silhouette = new Uint8Array(n);
            for (let i = 0; i < n; i++) {
                silhouette[i] = (isInk[i] || !isExterior[i]) ? 1 : 0;
            }

            // Step 4: Close gaps first, then apply the independent outer buffer.
            // gapFloodPx is the max gap to bridge, so the close radius is half.
            const closedSilhouette = closeGapsCircular(silhouette, tw, th, closeRadiusScaled);
            const dilated = dilateCircular(closedSilhouette, tw, th, bufferScaled);

            // Step 5: Second flood fill from edges through non-dilated pixels to find the
            // true exterior. The dilated border acts as a solid wall, so any pixel
            // enclosed inside it (including interior holes that leaked through thin
            // ink seams) will NOT be reached and should be filled white.
            const trulyExterior = findExteriorPixels(dilated, tw, th);

            // Step 6: Smooth the outer edge of the white region with a small blur.
            // This anti-aliases the pixel staircase on the border without visibly
            // changing the border size — interior pixels stay fully opaque (255),
            // only the outermost few pixels get a smooth alpha falloff.
            const edgeSrc = document.createElement('canvas');
            edgeSrc.width = tw;
            edgeSrc.height = th;
            const edgeSrcCtx = edgeSrc.getContext('2d');
            const edgeSrcData = edgeSrcCtx.createImageData(tw, th);
            for (let i = 0; i < n; i++) {
                if (dilated[i] || !trulyExterior[i]) {
                    edgeSrcData.data[i * 4]     = 255;
                    edgeSrcData.data[i * 4 + 1] = 255;
                    edgeSrcData.data[i * 4 + 2] = 255;
                    edgeSrcData.data[i * 4 + 3] = 255;
                }
            }
            edgeSrcCtx.putImageData(edgeSrcData, 0, 0);

            const edgeDst = document.createElement('canvas');
            edgeDst.width = tw;
            edgeDst.height = th;
            const edgeDstCtx = edgeDst.getContext('2d');
            edgeDstCtx.filter = 'blur(1.5px)';
            edgeDstCtx.drawImage(edgeSrc, 0, 0);
            edgeDstCtx.filter = 'none';
            const smoothedEdge = edgeDstCtx.getImageData(0, 0, tw, th).data;

            const outData = new ImageData(tw, th);
            const out = outData.data;
            for (let i = 0; i < n; i++) {
                const a = smoothedEdge[i * 4 + 3];
                if (a > 0) {
                    out[i * 4]     = 255;
                    out[i * 4 + 1] = 255;
                    out[i * 4 + 2] = 255;
                    out[i * 4 + 3] = a;   // smooth falloff at the outer edge
                }
            }

            // Draw white backing, then stamp ink on top
            const outCanvas = document.createElement('canvas');
            outCanvas.width = tw;
            outCanvas.height = th;
            const outCtx = outCanvas.getContext('2d');
            outCtx.putImageData(outData, 0, 0);
            outCtx.drawImage(renderCanvas, 0, 0);

            return outCanvas;
        }

        function canvasToBlob(canvas, mimeType) {
            return new Promise(resolve => {
                canvas.toBlob(blob => resolve(blob), mimeType);
            });
        }

        async function generateCricutPNG(svg, productId, width, height, optionsOrBuffer, gapFloodPx) {
            if (!svg) return;
            const options = normalizeCricutOptions(optionsOrBuffer, gapFloodPx);
            const outCanvas = await buildCricutCanvas(svg, width, height, {
                ...options,
                previewScale: 2
            });
            const blob = await canvasToBlob(outCanvas, 'image/png');
            if (!blob) return;
            const filename = buildDownloadFilename(productId, `object_${Date.now()}_cricut`).replace(/\.svg$/, '.png');
            triggerDownload(blob, filename);
        }

        // ═══════════════════════════════════════════════════════
        //  Composer Workspace
        // ═══════════════════════════════════════════════════════

        const COMPOSER_VB_W = 800;
        const COMPOSER_VB_H = 800;
        let composerSection = null;
        let composerSvg = null;
        let composerStatus = null;
        let composerProductId = null;
        let composerNextId = 1;
        let composerSelected = [];   // array of <g> elements
        let composerDrag = null;     // {active, startSvgX, startSvgY, origPositions}
        let composerResizeDrag = null; // {g, corner, startSvgX, startSvgY, origScale, origTx, origTy, srcW, srcH}
        let composerRotateDrag = null; // {g, centerX, centerY, startAngle, origRotation}

        // preview tokens can be reused after reset/rollback; this generation
        // cannot, so an already-running old promise can never target globals
        // belonging to a newer composer.
        let composerInstanceGeneration = 0;
        const COMPOSER_HISTORY_LIMIT = 50;
        let composerHistoryPast = [];
        let composerHistoryFuture = [];
        let composerHistoryRestoring = false;
        let composerHistoryShortcutAttached = false;

        // state, zoom/pan, Cricut preview, pattern session/UI) — used by
        // clearFullWorkspace right before a project replaces the workspace.
        // Safe to call even when the composer was never opened (composerSection
        // is still null) or has already been reset.
        function resetComposerWorkspace() {
            composerInstanceGeneration += 1;
            clearTimeout(composerCricutPreviewTimer);

            composerSvg = null;

            composerCricutPreviewTimer = null;

        // ── Composer snapshot/detach/restore (workspace-replacement transaction) ──
        // Together these let openProjectFile detach the live composer without
        // destroying it, so a failed hydration can put the exact previous
        // composer (canvas, objects, transient state, DOM position) back.

        function snapshotComposerState() {
            return {
                section: composerSection,
                // ensureComposer attaches composerSection right after the image
                // container; remember that anchor so restore reattaches in place.
                anchor: composerSection && composerSection.parentNode ? document.getElementById('imageContainer') : null,
                svg: composerSvg,
                status: composerStatus,
                productId: composerProductId,
                nextId: composerNextId,
                selected: composerSelected,
                drag: composerDrag,
                resizeDrag: composerResizeDrag,
                rotateDrag: composerRotateDrag,
                zoom: composerZoom,
                panX: composerPanX,
                panY: composerPanY,
                panDrag: composerPanDrag,
                cricutPreviewImg: composerCricutPreviewImg,
                cricutPreviewStatus: composerCricutPreviewStatus,
                cricutPreviewWasScheduled: composerCricutPreviewTimer !== null,
                cricutPreviewToken: composerCricutPreviewToken,
                patternSession: composerPatternSession,
                patternPanel: composerPatternPanel,
                patternMode: composerPatternMode,
                patternInputs: composerPatternInputs,
                historyPast: composerHistoryPast,
                historyFuture: composerHistoryFuture

        }

        // Detaches (never destroys) the live composer: removes its DOM node and
        // nulls every live global so ensureComposer builds a fresh composer for
        // the incoming project. The detached section stays alive on the caller's
        // snapshot for a possible restore.
        function detachComposerState() {
            composerInstanceGeneration += 1;
            clearTimeout(composerCricutPreviewTimer);
            if (composerSection && composerSection.parentNode) composerSection.remove();
            composerSection = null;
            composerSvg = null;
            composerStatus = null;
            composerProductId = null;
            composerNextId = 1;
            composerSelected = [];
            composerDrag = null;
            composerResizeDrag = null;
            composerRotateDrag = null;
            composerZoom = 1;
            composerPanX = 0;
            composerPanY = 0;
            composerPanDrag = null;
            composerCricutPreviewImg = null;
            composerCricutPreviewStatus = null;
            composerCricutPreviewTimer = null;
            composerCricutPreviewToken = 0;
            composerPatternSession = null;
            composerPatternPanel = null;
            composerPatternMode = null;
            composerPatternInputs = {};
            composerHistoryPast = [];
            composerHistoryFuture = [];
            composerHistoryRestoring = false;
        }

        function restoreComposerState(snapshot) {
            composerInstanceGeneration += 1;
            composerSection = snapshot.section;
            composerSvg = snapshot.svg;
            composerStatus = snapshot.status;
            composerProductId = snapshot.productId;
            composerNextId = snapshot.nextId;
            composerSelected = snapshot.selected;
            composerDrag = snapshot.drag;
            composerResizeDrag = snapshot.resizeDrag;
            composerRotateDrag = snapshot.rotateDrag;
            composerZoom = snapshot.zoom;
            composerPanX = snapshot.panX;
            composerPanY = snapshot.panY;
            composerPanDrag = snapshot.panDrag;
            composerCricutPreviewImg = snapshot.cricutPreviewImg;
            composerCricutPreviewStatus = snapshot.cricutPreviewStatus;
            // detach cleared the old timer; never resurrect that dead handle.
            composerCricutPreviewTimer = null;
            composerCricutPreviewToken = snapshot.cricutPreviewToken;
            composerPatternSession = snapshot.patternSession;
            composerPatternPanel = snapshot.patternPanel;
            composerPatternMode = snapshot.patternMode;
            composerPatternInputs = snapshot.patternInputs;
            composerHistoryPast = snapshot.historyPast || [];
            composerHistoryFuture = snapshot.historyFuture || [];
            composerHistoryRestoring = false;
            if (composerSection && snapshot.anchor) snapshot.anchor.after(composerSection);
            // Recompute from restored live state in the new composer lifetime.
            if (composerSection && composerSvg) {
                composerUpdateHistoryButtons();
                composerScheduleCricutPreview();
            }
        }

        // ── Semantic undo / redo history ──
        // History captures only durable composer content. Selection ids travel
        // with a committed content state so restored objects remain convenient
        // to edit, but selection alone never creates an entry.

        function composerCaptureHistoryState() {
            if (!composerSvg) return null;
            return {
                productId: composerProductId || '',
                nextId: composerNextId,
                selectedIds: composerSelected
                    .filter(g => g && g.isConnected)
                    .map(g => g.dataset.composerId),
                objects: Array.from(composerSvg.querySelectorAll('.composer-object')).map(g => ({
                    id: g.dataset.composerId,
                    sourceObjectId: g.dataset.sourceObjectId || '',
                    sourceWidth: parseFloat(g.dataset.srcW),
                    sourceHeight: parseFloat(g.dataset.srcH),
                    x: parseFloat(g.dataset.tx),
                    y: parseFloat(g.dataset.ty),
                    scale: parseFloat(g.dataset.objScale),
                    baseScale: parseFloat(g.dataset.baseScale),
                    rotation: composerGetRotation(g),
                    svg: wrapComposerContent(g)
                }))
            };
        }

        function composerHistoryContentKey(state) {
            return JSON.stringify({
                productId: state.productId,
                objects: state.objects
            });
        }

        function composerUpdateHistoryButtons() {
            if (!composerSection) return;
            const undoButton = composerSection.querySelector('#composerUndoButton');
            const redoButton = composerSection.querySelector('#composerRedoButton');
            if (undoButton) undoButton.disabled = composerHistoryPast.length <= 1;
            if (redoButton) redoButton.disabled = composerHistoryFuture.length === 0;
        }

        function composerResetHistory({ captureCurrent = true } = {}) {
            composerHistoryPast = [];
            composerHistoryFuture = [];
            if (captureCurrent && composerSvg) {
                composerHistoryPast.push(composerCaptureHistoryState());
            }
            composerUpdateHistoryButtons();
        }

        function composerCommitHistory() {
            if (composerHistoryRestoring || !composerSvg || composerIsPatternPreviewActive()) return false;
            const next = composerCaptureHistoryState();
            const current = composerHistoryPast[composerHistoryPast.length - 1];
            if (current && composerHistoryContentKey(current) === composerHistoryContentKey(next)) {
                current.selectedIds = next.selectedIds;
                current.nextId = next.nextId;
                composerUpdateHistoryButtons();
                return false;
            }
            composerHistoryPast.push(next);
            if (composerHistoryPast.length > COMPOSER_HISTORY_LIMIT + 1) {
                composerHistoryPast.shift();
            }
            composerHistoryFuture = [];
            composerUpdateHistoryButtons();
            return true;
        }

        function composerRestoreHistoryState(state) {
            if (!composerSvg || !state) return;
            composerHistoryRestoring = true;
            try {
                if (composerIsPatternPreviewActive()) {
                    composerCancelPatternPreview({ deselect: true });
                }
                composerDeselectAll();
                composerSvg.querySelectorAll('.composer-object').forEach(g => g.remove());
                composerSelected = [];
                composerNextId = 1;
                composerProductId = state.productId;
                state.objects.forEach(createComposerObjectFromRecord);
                composerNextId = Math.max(composerNextId, state.nextId || 1);

                const selectedIds = new Set(state.selectedIds || []);
                composerSelected = Array.from(composerSvg.querySelectorAll('.composer-object'))
                    .filter(g => selectedIds.has(g.dataset.composerId));
                composerUpdateSelectionVisuals();
                composerUpdateScaleLabel();
                composerUpdateRotationLabel();
                composerUpdateStatus();
            } finally {
                composerHistoryRestoring = false;
            }
        }

        function composerUndo() {
            if (composerHistoryPast.length <= 1) return false;
            composerHistoryFuture.push(composerHistoryPast.pop());
            composerRestoreHistoryState(composerHistoryPast[composerHistoryPast.length - 1]);
            composerUpdateHistoryButtons();
            return true;
        }

        function composerRedo() {
            if (composerHistoryFuture.length === 0) return false;
            const state = composerHistoryFuture.pop();
            composerHistoryPast.push(state);
            composerRestoreHistoryState(state);
            composerUpdateHistoryButtons();
            return true;
        }

        function composerHandleHistoryShortcut(e) {
            if (!composerSection || !composerSvg || e.altKey || (!e.metaKey && !e.ctrlKey)) return;
            const target = e.target;
            const tag = target && target.tagName ? target.tagName.toLowerCase() : '';
            if (target && (target.isContentEditable || ['input', 'textarea', 'select'].includes(tag))) return;

            const key = String(e.key || '').toLowerCase();
            const wantsUndo = key === 'z' && !e.shiftKey;
            const wantsRedo = (key === 'z' && e.shiftKey) ||
                (key === 'y' && e.ctrlKey && !e.metaKey);
            if (!wantsUndo && !wantsRedo) return;
            e.preventDefault();
            if (wantsRedo) composerRedo();
            else composerUndo();

            composerSvg.addEventListener('mousedown', (e) => {
                if (e.target === composerSvg) {
                    composerPanDrag = {
                        active: true,
                        startClientX: e.clientX,
                        startClientY: e.clientY,
                        origPanX: composerPanX,
                        origPanY: composerPanY,
                        moved: false,
                    };
                }
            });
            composerSvg.addEventListener('touchstart', (e) => {
                if (e.target === composerSvg && e.touches.length === 1) {
                    composerPanDrag = {
                        active: true,
                        startClientX: e.touches[0].clientX,
                        startClientY: e.touches[0].clientY,
                        origPanX: composerPanX,
                        origPanY: composerPanY,
                        moved: false,

            // Mouse/touch handlers for drag
            composerSvg.addEventListener('mousedown', composerOnPointerDown);
            composerSvg.addEventListener('mousemove', composerOnPointerMove);
            composerSvg.addEventListener('mouseup', composerOnPointerUp);
            composerSvg.addEventListener('mouseleave', composerOnPointerUp);
            composerSvg.addEventListener('touchstart', composerOnPointerDown, { passive: false });
            composerSvg.addEventListener('touchmove', composerOnPointerMove, { passive: false });
            composerSvg.addEventListener('touchend', composerOnPointerUp);
            composerSvg.addEventListener('touchcancel', composerOnPointerUp);

            // Canvas-app scroll convention (Figma/Miro): plain scroll pans,
            // Ctrl/Cmd+scroll zooms toward the cursor. A macOS trackpad
            // pinch arrives as a ctrlKey wheel event, so pinch-to-zoom works
            // too. Keeping plain scroll as pan means a jittery Magic Mouse
            // can't accidentally lurch the zoom level.
            canvasWrapper.addEventListener('wheel', (e) => {
                // When scroll gestures are toggled off, let the event fall
                // through so the page scrolls normally.
                if (!composerScrollGesturesEnabled) return;
                e.preventDefault();
                const rect = composerSvg.getBoundingClientRect();
                if (rect.width <= 0 || rect.height <= 0) return;
                if (e.ctrlKey || e.metaKey) {
                    // Exponential scaling keeps discrete wheel notches
                    // (|deltaY| ~100) and fine pinch deltas (|deltaY| ~1-10)
                    // feeling proportionate. deltaMode 1 = line-based deltas.
                    const speed = e.deltaMode === 1 ? 0.05 : 0.002;
                    const newZoom = Math.max(0.25, Math.min(5, composerZoom * Math.exp(-e.deltaY * speed)));
                    // Shift pan so the SVG point under the cursor stays put.
                    const fx = (e.clientX - rect.left) / rect.width - 0.5;
                    const fy = (e.clientY - rect.top) / rect.height - 0.5;
                    composerPanX += fx * (COMPOSER_VB_W / composerZoom - COMPOSER_VB_W / newZoom);
                    composerPanY += fy * (COMPOSER_VB_H / composerZoom - COMPOSER_VB_H / newZoom);
                    composerSetZoom(newZoom);
                } else {
                    const svgPerPx = (COMPOSER_VB_W / composerZoom) / rect.width;
                    composerPanX += e.deltaX * svgPerPx;
                    composerPanY += e.deltaY * svgPerPx;

            }, { passive: false });
