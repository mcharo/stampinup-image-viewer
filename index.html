        }

        // ── Add object to composer ──

        // Builds and appends a <g class="composer-object"> from a plain
        // ComposerRecord.objects[i]-shaped record (id/sourceObjectId/
        // sourceWidth/sourceHeight/x/y/scale/baseScale/rotation/svg): parses
        // record.svg through the same safe DOMParser path used elsewhere
        // (parseSvgElement — never innerHTML), clones only its children,
        // applies the exact saved transform, and keeps composerNextId ahead
        // of the highest restored id so a later live add can never collide.
        // Shared by addToComposer (a live extraction) and hydrateComposer
        // (restoring a saved project), so both paths build composer objects
        // identically.
        function createComposerObjectFromRecord(record) {
            const svgRoot = parseSvgElement(record.svg);

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', 'composer-object');
            g.dataset.composerId = record.id;
            g.dataset.sourceObjectId = record.sourceObjectId || '';
            g.dataset.srcW = record.sourceWidth;
            g.dataset.srcH = record.sourceHeight;
            g.dataset.objScale = record.scale;
            g.dataset.baseScale = record.baseScale;
            g.dataset.tx = record.x;
            g.dataset.ty = record.y;
            g.dataset.rotation = record.rotation;
            composerApplyTransform(g);

            if (svgRoot) {
                // Clone all child elements (preserves nested <g> transforms from merged objects)
                Array.from(svgRoot.children).forEach(child => {
                    const clone = child.cloneNode(true);
                    clone.removeAttribute('class');
                    g.appendChild(clone);
                });
            } else {
                console.error(`createComposerObjectFromRecord: could not parse SVG for composer object "${record.id}"; created with no content`);
            }

            // Invisible hover outline rect (will be sized after append via getBBox)
            const hoverRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            hoverRect.setAttribute('class', 'hover-outline');
            g.appendChild(hoverRect);

            composerSvg.appendChild(g);
            requestAnimationFrame(() => composerSizeHoverRect(g));

            const numericId = parseInt(record.id, 10);
            if (Number.isFinite(numericId) && numericId >= composerNextId) composerNextId = numericId + 1;

            return g;
        }

        function addToComposer(sourceSvg, srcW, srcH, productId, refW, refH, sourceObjectId) {
            ensureComposer(productId);

            if (!sourceSvg.querySelector('path')) return;

            // Scale relative to the original source image so objects from the
            // same stamp set keep their proportional sizes.  When no reference
            // dimensions are available (e.g. merged objects), fall back to fitting
            // the object itself to ~40% of the canvas.
            const hasRef = refW && refH;
            const refMaxDim = hasRef ? Math.max(refW, refH) : Math.max(srcW, srcH);
            const fitScale = (COMPOSER_VB_W * 0.7) / refMaxDim;

            // Place centered initially
            const offsetX = (COMPOSER_VB_W - srcW * fitScale) / 2;
            const offsetY = (COMPOSER_VB_H - srcH * fitScale) / 2;

            const g = createComposerObjectFromRecord({
                id: String(composerNextId),
                sourceObjectId: sourceObjectId || '',
                sourceWidth: srcW,
                sourceHeight: srcH,
                x: offsetX,
                y: offsetY,
                scale: fitScale,
                baseScale: fitScale,
                rotation: 0,
                svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${srcW} ${srcH}">${composerSerializeGroupContent(sourceSvg)}</svg>`
            });

            composerUpdateStatus();
            composerDeselectAll();
            composerSelectObject(g);
            composerCommitHistory();
        }

        function composerSizeHoverRect(g) {
            const hoverRect = g.querySelector('.hover-outline');
            if (!hoverRect) return;
            const uiEls = g.querySelectorAll('.hover-outline, .selection-rect, .resize-handle, .rotate-handle, .rotate-handle-stem');
            uiEls.forEach(el => { el.style.display = 'none'; el.setAttribute('width', 0); el.setAttribute('height', 0); });
            try {
                const box = g.getBBox();
                hoverRect.setAttribute('x', box.x - 2);
                hoverRect.setAttribute('y', box.y - 2);
                hoverRect.setAttribute('width', box.width + 4);
                hoverRect.setAttribute('height', box.height + 4);
            } catch (e) { /* ignore if not in DOM */ }
            uiEls.forEach(el => { el.style.display = ''; });
        }

        // ── Selection ──

        function composerSelectObject(g, addToSelection) {
            if (composerIsPatternPreviewActive()) {
                const src = composerPatternSession.source;
                // Selecting anything else (or multi-select) dismisses preview.
                if (g !== src || addToSelection) {
                    composerCancelPatternPreview({ deselect: false });
                } else {
                    // Keep preview; just ensure the source stays sole selection.
                    composerSelected.forEach(el => {
                        if (el !== g) {
                            el.querySelectorAll('.selection-rect, .resize-handle, .rotate-handle, .rotate-handle-stem').forEach(n => n.remove());
                        }
                    });
                    composerSelected = [g];
                    composerUpdateSelectionVisuals();
                    composerUpdateScaleLabel();
                    composerUpdateRotationLabel();
                    return;
                }
            }
            if (!addToSelection) {
                composerDeselectAll();
            }
            if (composerSelected.includes(g)) return;
            composerSelected.push(g);
            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
            composerUpdateRotationLabel();
        }

        function composerDeselectObject(g) {
            if (composerIsPatternPreviewActive() && g === composerPatternSession.source) {
                composerCancelPatternPreview({ deselect: true });
                return;
            }
            composerSelected = composerSelected.filter(o => o !== g);
            g.querySelectorAll('.selection-rect, .resize-handle, .rotate-handle, .rotate-handle-stem').forEach(el => el.remove());
            composerUpdateScaleLabel();
            composerUpdateRotationLabel();
        }

        function composerDeselectAll() {
            if (composerIsPatternPreviewActive()) {
                composerCancelPatternPreview({ deselect: true });
                return;
            }
            composerSelected.forEach(g => {
                g.querySelectorAll('.selection-rect, .resize-handle, .rotate-handle, .rotate-handle-stem').forEach(el => el.remove());
            });
            composerSelected = [];
            composerUpdateScaleLabel();
            composerUpdateRotationLabel();
        }

        function composerSelectAll() {
            composerDeselectAll();
            composerSvg.querySelectorAll('.composer-object').forEach(g => {
                composerSelected.push(g);
            });
            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
            composerUpdateRotationLabel();
        }

        function composerUpdateSelectionVisuals() {
            // Selection chrome is drawn inside each object's scaled group, so
            // local sizes must cancel both viewBox zoom and the object's
            // objScale to keep handles a constant screen size.
            composerSelected.forEach(g => {
                const objScale = Math.max(parseFloat(g.dataset.objScale || 1), 1e-6);
                const screenUnit = composerZoom * objScale;
                const HANDLE_SIZE = 8 / screenUnit;
                const PAD = 4 / screenUnit;
                const dash = `${6 / screenUnit} ${3 / screenUnit}`;

                let sel = g.querySelector('.selection-rect');
                if (!sel) {
                    sel = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    sel.setAttribute('class', 'selection-rect');
                    g.appendChild(sel);
                }

                // Remove old handles
                g.querySelectorAll('.resize-handle, .rotate-handle, .rotate-handle-stem').forEach(h => h.remove());

                // Size to content bbox
                sel.setAttribute('width', 0);
                sel.setAttribute('height', 0);
                try {
                    const box = g.getBBox();
                    const bx = box.x - PAD;
                    const by = box.y - PAD;
                    const bw = box.width + PAD * 2;
                    const bh = box.height + PAD * 2;
                    sel.setAttribute('x', bx);
                    sel.setAttribute('y', by);
                    sel.setAttribute('width', bw);
                    sel.setAttribute('height', bh);
                    sel.setAttribute('stroke-dasharray', dash);

                    // Corner handles (only for single selection to keep it simple)
                    if (composerSelected.length === 1) {
                        const hs = HANDLE_SIZE;
                        const corners = [
                            { cls: 'handle-tl', cx: bx, cy: by },
                            { cls: 'handle-tr', cx: bx + bw, cy: by },
                            { cls: 'handle-bl', cx: bx, cy: by + bh },
                            { cls: 'handle-br', cx: bx + bw, cy: by + bh },
                        ];
                        corners.forEach(({ cls, cx, cy }) => {
                            const h = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                            h.setAttribute('class', 'resize-handle ' + cls);
                            h.setAttribute('x', cx - hs / 2);
                            h.setAttribute('y', cy - hs / 2);
                            h.setAttribute('width', hs);
                            h.setAttribute('height', hs);
                            h.setAttribute('rx', hs * 0.2);
                            h.dataset.corner = cls.replace('handle-', '');
                            g.appendChild(h);
                        });

                        // Rotate handle: a circle floating above the top edge,
                        // connected to the selection rect by a dashed stem.
                        // Drawn as a child of the group so it rotates with the
                        // object, keeping it visually attached to the top edge.
                        const stemLen = hs * 2;
                        const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        stem.setAttribute('class', 'rotate-handle-stem');
                        stem.setAttribute('x1', bx + bw / 2);
                        stem.setAttribute('y1', by);
                        stem.setAttribute('x2', bx + bw / 2);
                        stem.setAttribute('y2', by - stemLen);
                        stem.setAttribute('stroke-dasharray', `${3 / screenUnit} ${2 / screenUnit}`);
                        g.appendChild(stem);

                        const rotHandle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        rotHandle.setAttribute('class', 'rotate-handle');
                        rotHandle.setAttribute('cx', bx + bw / 2);
                        rotHandle.setAttribute('cy', by - stemLen);
                        rotHandle.setAttribute('r', hs * 0.6);
                        g.appendChild(rotHandle);
                    }
                } catch (e) {}
            });
        }

        function composerUpdateStatus() {
            if (!composerStatus) return;
            const count = composerSvg.querySelectorAll('.composer-object').length;
            composerStatus.textContent = count === 0
                ? 'Add objects using the "+ Composer" button on any extracted object card.'
                : `${count} object${count !== 1 ? 's' : ''} in workspace. Click to select, drag to move, use the ↺/↻ buttons or the round handle to rotate (Shift snaps to 15°). Shift-click for multi-select.`;
            composerScheduleCricutPreview();
        }

        // ── Drag ──

        function composerSvgPoint(clientX, clientY) {
            const pt = composerSvg.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;
            return pt.matrixTransform(composerSvg.getScreenCTM().inverse());
        }

        function composerGetTranslate(g) {
            return {
                tx: parseFloat(g.dataset.tx || 0),
                ty: parseFloat(g.dataset.ty || 0)
            };
        }

        function composerGetRotation(g) {
            return parseFloat(g.dataset.rotation || 0);
        }

        // Builds the object transform string. Rotation happens around the
        // object's visual center (in the post-translate, pre-scale space the
        // center sits at (srcW*s/2, srcH*s/2)), so rotating never shifts the
        // object's center point — which also keeps center-based scaling and
        // scale-reset behavior working unchanged for rotated objects.
        function composerBuildTransform(tx, ty, s, rot, srcW, srcH) {
            let t = `translate(${tx}, ${ty})`;
            if (rot) {
                t += ` rotate(${rot}, ${srcW * s / 2}, ${srcH * s / 2})`;
            }
            t += ` scale(${s})`;
            return t;
        }

        function composerApplyTransform(g) {
            const tx = parseFloat(g.dataset.tx || 0);
            const ty = parseFloat(g.dataset.ty || 0);
            const s = parseFloat(g.dataset.objScale || 1);
            const rot = composerGetRotation(g);
            const srcW = parseFloat(g.dataset.srcW || 0);
            const srcH = parseFloat(g.dataset.srcH || 0);
            g.setAttribute('transform', composerBuildTransform(tx, ty, s, rot, srcW, srcH));
        }

        function composerOnPointerDown(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const svgPt = composerSvgPoint(clientX, clientY);

            // Check if the rotate handle was clicked
            const rotHandle = e.target.closest('.rotate-handle');
            if (rotHandle) {
                e.preventDefault();
                e.stopPropagation();
                const gEl = rotHandle.closest('.composer-object');
                if (!gEl) return;
                const tx = parseFloat(gEl.dataset.tx || 0);
                const ty = parseFloat(gEl.dataset.ty || 0);
                const s = parseFloat(gEl.dataset.objScale || 1);
                const srcW = parseFloat(gEl.dataset.srcW || 0);
                const srcH = parseFloat(gEl.dataset.srcH || 0);
                // Rotation pivot = object center (invariant under rotation)
                const centerX = tx + (srcW * s) / 2;
                const centerY = ty + (srcH * s) / 2;
                composerRotateDrag = {
                    active: true,
                    g: gEl,
                    centerX,
                    centerY,
                    startAngle: Math.atan2(svgPt.y - centerY, svgPt.x - centerX),
                    origRotation: composerGetRotation(gEl),
                };
                return;
            }

            // Check if a resize handle was clicked
            const handle = e.target.closest('.resize-handle');
            if (handle) {
                e.preventDefault();
                e.stopPropagation();
                const gEl = handle.closest('.composer-object');
                if (!gEl) return;
                composerResizeDrag = {
                    active: true,
                    g: gEl,
                    corner: handle.dataset.corner,
                    startSvgX: svgPt.x,
                    startSvgY: svgPt.y,
                    origScale: parseFloat(gEl.dataset.objScale || 1),
                    origTx: parseFloat(gEl.dataset.tx || 0),
                    origTy: parseFloat(gEl.dataset.ty || 0),
                    srcW: parseFloat(gEl.dataset.srcW || 100),
                    srcH: parseFloat(gEl.dataset.srcH || 100),
                };
                return;
            }

            const gEl = e.target.closest('.composer-object');
            if (!gEl) return;

            e.preventDefault();

            // Selection handling
            if (e.shiftKey || e.metaKey || e.ctrlKey) {
                if (composerSelected.includes(gEl)) {
                    composerDeselectObject(gEl);
                } else {
                    composerSelectObject(gEl, true);
                }
            } else {
                if (!composerSelected.includes(gEl)) {
                    composerSelectObject(gEl, false);
                }
            }

            // Position is locked while a pattern preview is active.
            if (composerIsPatternPreviewActive()) return;

            // Start drag for all selected objects
            composerDrag = {
                active: true,
                startSvgX: svgPt.x,
                startSvgY: svgPt.y,
                origPositions: composerSelected.map(g => ({
                    el: g,
                    tx: parseFloat(g.dataset.tx || 0),
                    ty: parseFloat(g.dataset.ty || 0)
                }))
            };
        }

        function composerOnPointerMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Handle canvas pan (empty-background drag)
            if (composerPanDrag && composerPanDrag.active) {
                e.preventDefault();
                const dx = clientX - composerPanDrag.startClientX;
                const dy = clientY - composerPanDrag.startClientY;
                if (!composerPanDrag.moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
                    composerPanDrag.moved = true;
                    if (composerSvg) composerSvg.classList.add('is-panning');
                }
                if (composerPanDrag.moved) {
                    const rect = composerSvg.getBoundingClientRect();
                    const vw = COMPOSER_VB_W / composerZoom;
                    const scale = rect.width > 0 ? vw / rect.width : 1;
                    // Dragging the canvas right reveals content to the left.
                    composerPanX = composerPanDrag.origPanX - dx * scale;
                    composerPanY = composerPanDrag.origPanY - dy * scale;
                    composerApplyViewBox();
                }
                return;
            }

            // Handle rotate drag
            if (composerRotateDrag && composerRotateDrag.active) {
                e.preventDefault();
                const svgPt = composerSvgPoint(clientX, clientY);
                const { g, centerX, centerY, startAngle, origRotation } = composerRotateDrag;
                const angle = Math.atan2(svgPt.y - centerY, svgPt.x - centerX);
                let newRot = origRotation + (angle - startAngle) * 180 / Math.PI;
                // Hold Shift to snap to 15° increments
                if (e.shiftKey) {
                    newRot = Math.round(newRot / 15) * 15;
                }
                // Normalize to (-180, 180] for a friendly label
                newRot = ((newRot % 360) + 540) % 360 - 180;
                g.dataset.rotation = newRot;
                composerApplyTransform(g);
                composerUpdateRotationLabel();
                if (composerIsPatternPreviewActive()) composerRefreshPatternPreview();
                return;
            }

            // Handle resize drag
            if (composerResizeDrag && composerResizeDrag.active) {
                e.preventDefault();
                const svgPt = composerSvgPoint(clientX, clientY);
                const { g, corner, startSvgX, startSvgY, origScale, origTx, origTy, srcW, srcH } = composerResizeDrag;

                // During pattern preview, always scale about the pinned center.
                if (composerIsPatternPreviewActive()) {
                    const cx = composerPatternSession.snapshot.cx;
                    const cy = composerPatternSession.snapshot.cy;
                    const origDistC = Math.hypot(startSvgX - cx, startSvgY - cy);
                    const curDistC = Math.hypot(svgPt.x - cx, svgPt.y - cy);
                    if (origDistC < 1) return;
                    const newScaleC = origScale * (curDistC / origDistC);
                    g.dataset.objScale = newScaleC;
                    g.dataset.tx = cx - (srcW * newScaleC) / 2;
                    g.dataset.ty = cy - (srcH * newScaleC) / 2;
                    composerApplyTransform(g);
                    composerSizeHoverRect(g);
                    composerRefreshPatternPreview();
                    return;
                }

                // For rotated objects the unrotated corner positions no longer
                // match what's on screen, so anchor the scale to the object's
                // center (which is invariant under rotation) instead of the
                // opposite corner.
                if (composerGetRotation(g) !== 0) {
                    const cx = origTx + (srcW * origScale) / 2;
                    const cy = origTy + (srcH * origScale) / 2;
                    const origDistC = Math.hypot(startSvgX - cx, startSvgY - cy);
                    const curDistC = Math.hypot(svgPt.x - cx, svgPt.y - cy);
                    if (origDistC < 1) return;
                    const newScaleC = origScale * (curDistC / origDistC);
                    g.dataset.objScale = newScaleC;
                    g.dataset.tx = cx - (srcW * newScaleC) / 2;
                    g.dataset.ty = cy - (srcH * newScaleC) / 2;
                    composerApplyTransform(g);
                    composerSizeHoverRect(g);
                    composerUpdateSelectionVisuals();
                    composerUpdateScaleLabel();
                    return;
                }

                // The anchor is the opposite corner from the one being dragged
                const origW = srcW * origScale;
                const origH = srcH * origScale;
                let anchorX, anchorY;
                if (corner === 'tl') { anchorX = origTx + origW; anchorY = origTy + origH; }
                else if (corner === 'tr') { anchorX = origTx; anchorY = origTy + origH; }
                else if (corner === 'bl') { anchorX = origTx + origW; anchorY = origTy; }
                else { anchorX = origTx; anchorY = origTy; } // br

                // Compute scale factor from the distance change between anchor and pointer
                const origDist = Math.hypot(startSvgX - anchorX, startSvgY - anchorY);
                const curDist = Math.hypot(svgPt.x - anchorX, svgPt.y - anchorY);
                if (origDist < 1) return;

                const scaleFactor = curDist / origDist;
                const newScale = origScale * scaleFactor;
                const newW = srcW * newScale;
                const newH = srcH * newScale;

                // Position so the anchor corner stays fixed
                let newTx, newTy;
                if (corner === 'tl') { newTx = anchorX - newW; newTy = anchorY - newH; }
                else if (corner === 'tr') { newTx = anchorX; newTy = anchorY - newH; }
                else if (corner === 'bl') { newTx = anchorX - newW; newTy = anchorY; }
                else { newTx = anchorX; newTy = anchorY; } // br

                g.dataset.objScale = newScale;
                g.dataset.tx = newTx;
                g.dataset.ty = newTy;
                composerApplyTransform(g);
                composerSizeHoverRect(g);
                composerUpdateSelectionVisuals();
                composerUpdateScaleLabel();
                return;
            }

            // Handle move drag
            if (!composerDrag || !composerDrag.active) return;
            e.preventDefault();

            const svgPt = composerSvgPoint(clientX, clientY);
            const dx = svgPt.x - composerDrag.startSvgX;
            const dy = svgPt.y - composerDrag.startSvgY;

            composerDrag.origPositions.forEach(({ el, tx, ty }) => {
                el.dataset.tx = tx + dx;
                el.dataset.ty = ty + dy;
                composerApplyTransform(el);
            });

            composerUpdateSelectionVisuals();
        }

        function composerOnPointerUp(e) {
            if (composerPanDrag && composerPanDrag.active) {
                const wasClick = !composerPanDrag.moved;
                composerPanDrag = null;
                if (composerSvg) composerSvg.classList.remove('is-panning');
                // Click on empty canvas (no pan movement): deselect / cancel preview.
                if (wasClick) {
                    if (composerIsPatternPreviewActive()) {
                        composerCancelPatternPreview({ deselect: true });
                    } else {
                        composerDeselectAll();
                    }
                }
                return;
            }

            const changed = (composerResizeDrag && composerResizeDrag.active)
                || (composerDrag && composerDrag.active)
                || (composerRotateDrag && composerRotateDrag.active);
            if (composerRotateDrag) {
                composerRotateDrag.active = false;
                composerRotateDrag = null;
            }
            if (composerResizeDrag) {
                composerResizeDrag.active = false;
                composerResizeDrag = null;
            }
            if (composerDrag) {
                composerDrag.active = false;
                composerDrag = null;
            }
            if (changed) {
                composerScheduleCricutPreview();
                if (!composerIsPatternPreviewActive()) composerCommitHistory();
            }
        }

        // ── Layer controls ──

        function composerBringForward() {
            if (composerIsPatternPreviewActive()) composerCancelPatternPreview();
            let changed = false;
            for (let i = composerSelected.length - 1; i >= 0; i--) {
                const g = composerSelected[i];
                const next = g.nextElementSibling;
                if (next && !composerSelected.includes(next)) {
                    g.parentNode.insertBefore(next, g);
                    changed = true;
                }
            }
            if (changed) {
                composerScheduleCricutPreview();
                composerCommitHistory();
            }
        }

        function composerSendBackward() {
            if (composerIsPatternPreviewActive()) composerCancelPatternPreview();
            let changed = false;
            composerSelected.forEach(g => {
                const prev = g.previousElementSibling;
                if (prev && !composerSelected.includes(prev)) {
                    g.parentNode.insertBefore(g, prev);
                    changed = true;
                }
            });
            if (changed) {
                composerScheduleCricutPreview();
                composerCommitHistory();
            }
        }

        // ── Zoom / Pan ──

        function composerApplyViewBox() {
            if (!composerSvg) return;
            const vw = COMPOSER_VB_W / composerZoom;
            const vh = COMPOSER_VB_H / composerZoom;
            const ox = (COMPOSER_VB_W - vw) / 2 + composerPanX;
            const oy = (COMPOSER_VB_H - vh) / 2 + composerPanY;
            composerSvg.setAttribute('viewBox', `${ox} ${oy} ${vw} ${vh}`);
        }

        function composerSetZoom(level, opts = {}) {
            composerZoom = Math.max(0.25, Math.min(5, level));
            if (opts.resetPan) {
                composerPanX = 0;
                composerPanY = 0;
            }
            if (!composerSvg) return;
            composerApplyViewBox();
            const label = document.getElementById('composerZoomLabel');
            if (label) label.textContent = Math.round(composerZoom * 100) + '%';
            // Rebuild selection chrome so handle geometry tracks the new zoom.
            if (composerSelected.length) composerUpdateSelectionVisuals();
        }

        // Zooms and pans so the union bounds of all objects fill the view
        // (with a small margin), zooming in past 100% when the content is
        // small. An empty canvas resets to the default 100% view.
        function composerZoomToFit() {
            if (!composerSvg) return;
            const objects = Array.from(composerSvg.querySelectorAll('.composer-object'));
            if (objects.length === 0) {
                composerSetZoom(1, { resetPan: true });
                return;
            }
            let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
            objects.forEach(g => {
                const b = composerGetGroupBounds(g);
                x1 = Math.min(x1, b.x1); y1 = Math.min(y1, b.y1);
                x2 = Math.max(x2, b.x2); y2 = Math.max(y2, b.y2);
            });
            const w = x2 - x1;
            const h = y2 - y1;
            if (!(w > 0) || !(h > 0)) {
                composerSetZoom(1, { resetPan: true });
                return;
            }
            // 1.1 leaves a ~5% margin on each side of the content.
            const zoom = Math.min(COMPOSER_VB_W / w, COMPOSER_VB_H / h) / 1.1;
            // Pan the view center onto the content center (pan is expressed
            // in SVG units and is independent of zoom, see composerApplyViewBox).
            composerPanX = (x1 + x2) / 2 - COMPOSER_VB_W / 2;
            composerPanY = (y1 + y2) / 2 - COMPOSER_VB_H / 2;
            composerSetZoom(zoom);
        }

        // ── Resize ──

        function composerResizeSelected(factor) {
            if (composerSelected.length === 0) return;

            composerSelected.forEach(g => {
                const oldScale = parseFloat(g.dataset.objScale || 1);
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const srcW = parseFloat(g.dataset.srcW || 0);
                const srcH = parseFloat(g.dataset.srcH || 0);

                const newScale = oldScale * factor;

                // Scale around the object's center: adjust translate so the
                // center point stays in the same place on the canvas
                const oldCx = tx + (srcW * oldScale) / 2;
                const oldCy = ty + (srcH * oldScale) / 2;
                const newTx = oldCx - (srcW * newScale) / 2;
                const newTy = oldCy - (srcH * newScale) / 2;

                g.dataset.objScale = newScale;
                g.dataset.tx = newTx;
                g.dataset.ty = newTy;
                composerApplyTransform(g);
                composerSizeHoverRect(g);
            });

            if (composerIsPatternPreviewActive()) {
                composerRefreshPatternPreview();
                return;
            }
            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
            composerScheduleCricutPreview();
            composerCommitHistory();
        }

        function composerResetScale() {
            if (composerSelected.length === 0) return;

            composerSelected.forEach(g => {
                const baseScale = parseFloat(g.dataset.baseScale || g.dataset.objScale || 1);
                const oldScale = parseFloat(g.dataset.objScale || 1);
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const srcW = parseFloat(g.dataset.srcW || 0);
                const srcH = parseFloat(g.dataset.srcH || 0);

                // Re-center after reset
                const cx = tx + (srcW * oldScale) / 2;
                const cy = ty + (srcH * oldScale) / 2;
                g.dataset.objScale = baseScale;
                g.dataset.tx = cx - (srcW * baseScale) / 2;
                g.dataset.ty = cy - (srcH * baseScale) / 2;
                composerApplyTransform(g);
                composerSizeHoverRect(g);
            });

            if (composerIsPatternPreviewActive()) {
                composerRefreshPatternPreview();
                return;
            }
            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
            composerScheduleCricutPreview();
            composerCommitHistory();
        }

        function composerUpdateScaleLabel() {
            const label = document.getElementById('composerScaleLabel');
            if (!label) return;
            if (composerSelected.length === 1) {
                const base = parseFloat(composerSelected[0].dataset.baseScale || composerSelected[0].dataset.objScale);
                const cur = parseFloat(composerSelected[0].dataset.objScale);
                label.textContent = Math.round((cur / base) * 100) + '%';
            } else if (composerSelected.length > 1) {
                label.textContent = '—';
            } else {
                label.textContent = '100%';
            }
        }

        // ── Rotation ──

        function composerRotateSelected(deltaDeg) {
            if (composerSelected.length === 0) return;

            composerSelected.forEach(g => {
                let rot = composerGetRotation(g) + deltaDeg;
                // Normalize to (-180, 180] for a friendly label
                rot = ((rot % 360) + 540) % 360 - 180;
                g.dataset.rotation = rot;
                composerApplyTransform(g);
            });

            if (composerIsPatternPreviewActive()) {
                composerRefreshPatternPreview();
                return;
            }
            composerUpdateSelectionVisuals();
            composerUpdateRotationLabel();
            composerScheduleCricutPreview();
            composerCommitHistory();
        }

        function composerResetRotation() {
            if (composerSelected.length === 0) return;

            composerSelected.forEach(g => {
                g.dataset.rotation = 0;
                composerApplyTransform(g);
            });

            if (composerIsPatternPreviewActive()) {
                composerRefreshPatternPreview();
                return;
            }
            composerUpdateSelectionVisuals();
            composerUpdateRotationLabel();
            composerScheduleCricutPreview();
            composerCommitHistory();
        }

        function composerUpdateRotationLabel() {
            const label = document.getElementById('composerRotationLabel');
            if (!label) return;
            if (composerSelected.length === 1) {
                label.textContent = Math.round(composerGetRotation(composerSelected[0])) + '°';
            } else if (composerSelected.length > 1) {
                label.textContent = '—';
            } else {
                label.textContent = '0°';
            }
        }

        // ── Patterns ──
        //
        // Circular: arranges N total instances of a single selected object
        // around a ring. The ring is positioned so the original object becomes
        // the "12 o'clock" instance and doesn't move — removing the new copies
        // returns the canvas to its prior state.
        // Grid: fills a rows × cols grid, with the original as the top-left
        // cell.

        let composerPatternPanel = null;
        let composerPatternMode = null;
        let composerPatternInputs = {};
        // Active preview session: ghosts on an overlay until Apply or Cancel.
        // { source, mode, snapshot: { tx, ty, objScale, rotation, cx, cy } }
        let composerPatternSession = null;

        const COMPOSER_PATTERN_UI_SKIP = [
            'selection-rect', 'hover-outline', 'resize-handle', 'rotate-handle', 'rotate-handle-stem'
        ];

        function composerBuildPatternPanel() {
            const panel = document.createElement('div');
            panel.className = 'composer-pattern-panel';

            const title = document.createElement('span');
            title.className = 'pattern-title';
            panel.appendChild(title);

            const mkNum = (labelText, value, min, max, titleText) => {
                const label = document.createElement('label');
                const span = document.createElement('span');
                span.textContent = labelText;
                const input = document.createElement('input');
                input.type = 'number';
                input.min = String(min);
                input.max = String(max);
                input.step = '1';
                input.value = String(value);
                input.title = titleText;
                input.setAttribute('aria-label', titleText);
                label.appendChild(span);
                label.appendChild(input);
                label.input = input;
                return label;
            };

            // Circular fields
            const countField = mkNum('Copies', 5, 2, 60, 'Total number of instances in the ring (including the original)');
            const radiusField = mkNum('Radius', 100, 1, 2000, 'Ring radius in canvas units (pattern center to each copy\'s center)');
            const rotateField = document.createElement('label');
            const rotateCheck = document.createElement('input');
            rotateCheck.type = 'checkbox';
            rotateCheck.checked = true;
            rotateCheck.title = 'Rotate each copy to follow the ring';
            const rotateSpan = document.createElement('span');
            rotateSpan.textContent = 'Rotate copies';
            rotateField.appendChild(rotateCheck);
            rotateField.appendChild(rotateSpan);
            rotateField.input = rotateCheck;

            // Grid fields
            const rowsField = mkNum('Rows', 2, 1, 30, 'Number of grid rows');
            const colsField = mkNum('Cols', 3, 1, 30, 'Number of grid columns');
            const gapXField = mkNum('Gap X', 0, -500, 1000, 'Extra horizontal space between visible content edges (0 = touching, negative = overlap)');
            const gapYField = mkNum('Gap Y', 0, -500, 1000, 'Extra vertical space between visible content edges (0 = touching, negative = overlap)');

            const applyBtn = document.createElement('button');
            applyBtn.className = 'pattern-apply';
            applyBtn.textContent = 'Apply';
            applyBtn.onclick = composerApplyPattern;
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'Cancel';
            cancelBtn.onclick = () => composerCancelPatternPreview();

            [countField, radiusField, rotateField, rowsField, colsField, gapXField, gapYField, applyBtn, cancelBtn]
                .forEach(el => panel.appendChild(el));

            // Auto-suggest a radius that spaces the copies out whenever the
            // count changes (only until the user edits the radius themselves).
            let radiusTouched = false;
            const onPatternInput = () => composerRefreshPatternPreview();
            radiusField.input.addEventListener('input', () => { radiusTouched = true; onPatternInput(); });
            countField.input.addEventListener('input', () => {
                const src = composerPatternSession?.source || (composerSelected.length === 1 ? composerSelected[0] : null);
                if (!radiusTouched && src) {
                    radiusField.input.value = String(composerSuggestRadius(src, parseInt(countField.input.value, 10) || 5));
                }
                onPatternInput();
            });
            rotateCheck.addEventListener('change', onPatternInput);
            [rowsField, colsField, gapXField, gapYField].forEach(f => {
                f.input.addEventListener('input', onPatternInput);
            });

            composerPatternPanel = panel;
            composerPatternInputs = {
                title, countField, radiusField, rotateField,
                rowsField, colsField, gapXField, gapYField,
                resetRadiusTouched: () => { radiusTouched = false; }
            };
            return panel;
        }

        function composerGetObjCenter(g) {
            const tx = parseFloat(g.dataset.tx || 0);
            const ty = parseFloat(g.dataset.ty || 0);
            const s = parseFloat(g.dataset.objScale || 1);
            const srcW = parseFloat(g.dataset.srcW || 0);
            const srcH = parseFloat(g.dataset.srcH || 0);
            return { cx: tx + (srcW * s) / 2, cy: ty + (srcH * s) / 2, w: srcW * s, h: srcH * s };
        }

        function composerSuggestRadius(g, count) {
            // Radius where adjacent copies roughly touch (circumference fits
            // `count` copies of the object's larger dimension), padded a bit.
            const { w, h } = composerGetObjCenter(g);
            const maxDim = Math.max(w, h, 1);
            return Math.max(Math.round(maxDim), Math.round((count * maxDim) / (2 * Math.PI) * 1.15));
        }

        function composerIsPatternPreviewActive() {
            return !!composerPatternSession;
        }

        function composerSnapshotPatternSource(g) {
            const tx = parseFloat(g.dataset.tx || 0);
            const ty = parseFloat(g.dataset.ty || 0);
            const objScale = parseFloat(g.dataset.objScale || 1);
            const rotation = composerGetRotation(g);
            const srcW = parseFloat(g.dataset.srcW || 0);
            const srcH = parseFloat(g.dataset.srcH || 0);
            return {
                tx, ty, objScale, rotation,
                cx: tx + (srcW * objScale) / 2,
                cy: ty + (srcH * objScale) / 2,
            };
        }

        function composerRestorePatternSnapshot(g, snapshot) {
            g.dataset.tx = snapshot.tx;
            g.dataset.ty = snapshot.ty;
            g.dataset.objScale = snapshot.objScale;
            g.dataset.rotation = snapshot.rotation;
            composerApplyTransform(g);
            composerSizeHoverRect(g);
        }

        // Keep the source object's center pinned while scaling during preview.
        function composerPinPatternSourceCenter() {
            if (!composerPatternSession) return;
            const g = composerPatternSession.source;
            if (!g.isConnected) return;
            const s = parseFloat(g.dataset.objScale || 1);
            const srcW = parseFloat(g.dataset.srcW || 0);
            const srcH = parseFloat(g.dataset.srcH || 0);
            g.dataset.tx = composerPatternSession.snapshot.cx - (srcW * s) / 2;
            g.dataset.ty = composerPatternSession.snapshot.cy - (srcH * s) / 2;
            composerApplyTransform(g);
        }

        function composerGetPatternOverlay() {
            if (!composerSvg) return null;
            let overlay = composerSvg.querySelector('.composer-pattern-preview');
            if (!overlay) {
                overlay = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                overlay.setAttribute('class', 'composer-pattern-preview');
                composerSvg.appendChild(overlay);
            }
            // Keep ghosts above real objects
            composerSvg.appendChild(overlay);
            return overlay;
        }

        function composerClearPatternOverlay() {
            const overlay = composerSvg && composerSvg.querySelector('.composer-pattern-preview');
            if (overlay) overlay.replaceChildren();
        }

        function composerSyncPatternButtons(mode) {
            const circularButton = document.getElementById('composerPatternCircularButton');
            const gridButton = document.getElementById('composerPatternGridButton');
            if (circularButton) circularButton.classList.toggle('active', mode === 'circular');
            if (gridButton) gridButton.classList.toggle('active', mode === 'grid');
        }

        function composerClosePatternPanelUI() {
            if (!composerPatternPanel) return;
            composerPatternPanel.classList.remove('open');
            composerPatternMode = null;
            composerSyncPatternButtons(null);
        }

        function composerShowPatternPanelFields(mode) {
            const p = composerPatternInputs;
            const circular = mode === 'circular';
            p.title.textContent = circular ? 'Circular pattern' : 'Grid pattern';
            composerSyncPatternButtons(mode);
            [p.countField, p.radiusField, p.rotateField].forEach(el => el.style.display = circular ? '' : 'none');
            [p.rowsField, p.colsField, p.gapXField, p.gapYField].forEach(el => el.style.display = circular ? 'none' : '');
        }

        // Returns { ok, error?, copies: [{tx,ty,rotation}], message? } for the
        // NEW instances only (original is not included).
        function composerComputePatternCopies(g, mode) {
            const p = composerPatternInputs;
            if (mode === 'circular') {
                const count = Math.min(60, Math.max(2, parseInt(p.countField.input.value, 10) || 5));
                const radius = Math.max(1, parseFloat(p.radiusField.input.value) || composerSuggestRadius(g, count));
                const rotateCopies = p.rotateField.input.checked;
                const { cx, cy, w, h } = composerGetObjCenter(g);
                const origRot = composerGetRotation(g);
                const pcx = cx;
                const pcy = cy + radius;
                const step = 360 / count;
                const copies = [];
                for (let i = 1; i < count; i++) {
                    const angDeg = -90 + i * step;
                    const rad = angDeg * Math.PI / 180;
                    copies.push({
                        tx: pcx + radius * Math.cos(rad) - w / 2,
                        ty: pcy + radius * Math.sin(rad) - h / 2,
                        rotation: rotateCopies ? composerNormalizeAngle(origRot + i * step) : origRot,
                    });
                }
                return { ok: true, copies, message: `Circular preview: ${count} instances, radius ${radius}.` };
            }

            if (mode === 'grid') {
                const rows = Math.min(30, Math.max(1, parseInt(p.rowsField.input.value, 10) || 1));
                const cols = Math.min(30, Math.max(1, parseInt(p.colsField.input.value, 10) || 1));
                if (rows * cols < 2) {
                    return { ok: false, error: 'Grid pattern needs at least 2 cells.', copies: [] };
                }
                if (rows * cols > 200) {
                    return { ok: false, error: 'Grid pattern is limited to 200 cells.', copies: [] };
                }
                // Step by the visible content AABB (not the full source frame),
                // so Gap 0 means ink edges touch even when the SVG has padding.
                const gapX = parseFloat(p.gapXField.input.value);
                const gapY = parseFloat(p.gapYField.input.value);
                const content = composerGetGroupBounds(g);
                const contentW = Math.max(0, content.x2 - content.x1);
                const contentH = Math.max(0, content.y2 - content.y1);
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const rot = composerGetRotation(g);
                const stepX = contentW + (Number.isFinite(gapX) ? gapX : 0);
                const stepY = contentH + (Number.isFinite(gapY) ? gapY : 0);
                const copies = [];
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (r === 0 && c === 0) continue;
                        copies.push({
                            tx: tx + c * stepX,
                            ty: ty + r * stepY,
                            rotation: rot,
                        });
                    }
                }
                return { ok: true, copies, message: `Grid preview: ${rows} × ${cols} instances.` };
            }

            return { ok: false, error: 'No pattern selected.', copies: [] };
        }

        function composerCloneContentNodes(g, into) {
            Array.from(g.children).forEach(child => {
                if (child.classList && COMPOSER_PATTERN_UI_SKIP.some(c => child.classList.contains(c))) return;
                into.appendChild(child.cloneNode(true));
            });
        }

        // Clones a composer object's content (skipping selection UI) into a
        // fresh group that shares the source's scale metadata.
        function composerCloneObject(g) {
            const clone = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            clone.setAttribute('class', 'composer-object');
            // String() to match the id convention used everywhere else
            // (createComposerObjectFromRecord, addToComposer). In a browser
            // DOMStringMap coerces anyway, but assigning the raw number here
            // left composerCloneObject relying on that coercion.
            clone.dataset.composerId = String(composerNextId++);
            ['srcW', 'srcH', 'objScale', 'baseScale'].forEach(k => {
                if (g.dataset[k] !== undefined) clone.dataset[k] = g.dataset[k];
            });
            composerCloneContentNodes(g, clone);

            const hoverRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            hoverRect.setAttribute('class', 'hover-outline');
            clone.appendChild(hoverRect);
            return clone;
        }

        function composerNormalizeAngle(deg) {
            return ((deg % 360) + 540) % 360 - 180;
        }

        function composerRefreshPatternPreview() {
            if (!composerPatternSession || !composerSvg) return;
            const g = composerPatternSession.source;
            if (!g.isConnected) {
                composerCancelPatternPreview({ deselect: true });
                return;
            }
            composerPinPatternSourceCenter();
            const overlay = composerGetPatternOverlay();
            overlay.replaceChildren();

            const layout = composerComputePatternCopies(g, composerPatternSession.mode);
            if (!layout.ok) {
                if (composerStatus) composerStatus.textContent = layout.error;
                return;
            }

            const srcW = parseFloat(g.dataset.srcW || 0);
            const srcH = parseFloat(g.dataset.srcH || 0);
            const s = parseFloat(g.dataset.objScale || 1);

            layout.copies.forEach(({ tx, ty, rotation }) => {
                const ghost = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                composerCloneContentNodes(g, ghost);
                ghost.setAttribute('transform', composerBuildTransform(tx, ty, s, rotation, srcW, srcH));
                overlay.appendChild(ghost);
            });

            if (composerStatus && layout.message) {
                composerStatus.textContent = layout.message + ' Adjust size/rotation or params, then Apply.';
            }
            composerUpdateSelectionVisuals();
            composerUpdateScaleLabel();
            composerUpdateRotationLabel();
        }

        function composerCancelPatternPreview(opts = {}) {
            const { deselect = false } = opts;
            if (!composerPatternSession) {
                composerClosePatternPanelUI();
                if (deselect) composerDeselectAll();
                return;
            }
            const { source, snapshot } = composerPatternSession;
            composerPatternSession = null;
            composerClearPatternOverlay();
            composerClosePatternPanelUI();
            if (source && source.isConnected) {
                composerRestorePatternSnapshot(source, snapshot);
            }
            if (deselect) {
                composerSelected.forEach(g => {
                    g.querySelectorAll('.selection-rect, .resize-handle, .rotate-handle, .rotate-handle-stem').forEach(el => el.remove());
                });
                composerSelected = [];
            } else if (source && source.isConnected) {
                if (!composerSelected.includes(source)) {
                    composerSelected = [source];
                }
                composerUpdateSelectionVisuals();
            }
            composerUpdateScaleLabel();
            composerUpdateRotationLabel();
            composerUpdateStatus();
        }

        function composerTogglePatternPanel(mode) {
            if (!composerPatternPanel) return;

            // Toggle off current mode → cancel preview
            if (composerPatternMode === mode && composerPatternPanel.classList.contains('open')) {
                composerCancelPatternPreview();
                return;
            }

            // Switch circular ↔ grid within an active session
            if (composerPatternSession && composerPatternPanel.classList.contains('open')) {
                composerPatternMode = mode;
                composerPatternSession.mode = mode;
                composerShowPatternPanelFields(mode);
                if (mode === 'circular') {
                    composerPatternInputs.resetRadiusTouched();
                    composerPatternInputs.radiusField.input.value = String(
                        composerSuggestRadius(composerPatternSession.source, parseInt(composerPatternInputs.countField.input.value, 10) || 5)
                    );
                }
                composerRefreshPatternPreview();
                return;
            }

            if (composerSelected.length !== 1) {
                composerStatus.textContent = 'Select a single object first, then choose a pattern.';
                return;
            }

            const g = composerSelected[0];
            composerPatternMode = mode;
            composerPatternSession = {
                source: g,
                mode,
                snapshot: composerSnapshotPatternSource(g),
            };
            composerShowPatternPanelFields(mode);
            if (mode === 'circular') {
                composerPatternInputs.resetRadiusTouched();
                composerPatternInputs.radiusField.input.value = String(
                    composerSuggestRadius(g, parseInt(composerPatternInputs.countField.input.value, 10) || 5)
                );
            }
            composerPatternPanel.classList.add('open');
            composerRefreshPatternPreview();
        }

        function composerClosePatternPanel() {
            composerCancelPatternPreview();
        }

        function composerApplyPattern() {
            if (!composerPatternSession) {
                composerStatus.textContent = 'Select a single object first, then choose a pattern.';
                return;
            }
            const g = composerPatternSession.source;
            if (!g.isConnected) {
                composerCancelPatternPreview({ deselect: true });
                return;
            }

            composerPinPatternSourceCenter();
            const layout = composerComputePatternCopies(g, composerPatternSession.mode);
            if (!layout.ok) {
                composerStatus.textContent = layout.error;
                return;
            }

            const created = [];
            layout.copies.forEach(({ tx, ty, rotation }) => {
                const copy = composerCloneObject(g);
                copy.dataset.tx = tx;
                copy.dataset.ty = ty;
                copy.dataset.rotation = rotation;
                composerApplyTransform(copy);
                composerSvg.appendChild(copy);
                created.push(copy);
            });

            // Commit: drop overlay/session without reverting source transforms.
            composerPatternSession = null;
            composerClearPatternOverlay();
            composerClosePatternPanelUI();

            requestAnimationFrame(() => created.forEach(composerSizeHoverRect));

            // Select the whole pattern (original + copies).
            composerSelected.forEach(el => {
                el.querySelectorAll('.selection-rect, .resize-handle, .rotate-handle, .rotate-handle-stem').forEach(n => n.remove());
            });
            composerSelected = [];
            composerSelectObject(g, false);
            created.forEach(copy => composerSelectObject(copy, true));

            const appliedMsg = layout.message
                ? layout.message
                    .replace('Circular preview:', 'Circular pattern created:')
                    .replace('Grid preview:', 'Grid pattern created:')
                : `Pattern created: ${created.length + 1} instances.`;
            composerUpdateStatus();
            composerStatus.textContent = appliedMsg;
            composerScheduleCricutPreview();
            composerCommitHistory();
        }

        // ── Alignment ──        // Returns the axis-aligned bounding box of the (possibly rotated)
        // object frame in canvas coordinates.  x/y/w/h describe the AABB;
        // offX/offY are the offsets from the translate origin (tx, ty) to the
        // AABB origin, so callers can position the AABB by setting
        // tx = targetX - offX (for unrotated objects offX/offY are 0 and this
        // degenerates to the old tx-based behavior).
        function composerGetObjBounds(g) {
            const tx = parseFloat(g.dataset.tx || 0);
            const ty = parseFloat(g.dataset.ty || 0);
            const s = parseFloat(g.dataset.objScale || 1);
            const srcW = parseFloat(g.dataset.srcW || 0);
            const srcH = parseFloat(g.dataset.srcH || 0);
            const w = srcW * s;
            const h = srcH * s;
            const rot = composerGetRotation(g);

            if (!rot) {
                return { x: tx, y: ty, w, h, offX: 0, offY: 0 };
            }

            // Rotate the frame's corners around the object center and take the
            // min/max to get the AABB.
            const rad = rot * Math.PI / 180;
            const cos = Math.cos(rad), sin = Math.sin(rad);
            const cx = tx + w / 2, cy = ty + h / 2;
            const corners = [[tx, ty], [tx + w, ty], [tx, ty + h], [tx + w, ty + h]];
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            corners.forEach(([px, py]) => {
                const rx = cx + (px - cx) * cos - (py - cy) * sin;
                const ry = cy + (px - cx) * sin + (py - cy) * cos;
                minX = Math.min(minX, rx); maxX = Math.max(maxX, rx);
                minY = Math.min(minY, ry); maxY = Math.max(maxY, ry);
            });
            return { x: minX, y: minY, w: maxX - minX, h: maxY - minY, offX: minX - tx, offY: minY - ty };
        }

        function composerAlign(mode) {
            if (composerSelected.length === 0) return;
            if (composerIsPatternPreviewActive()) {
                composerStatus.textContent = 'Finish or cancel the pattern preview before aligning.';
                return;
            }

            const bounds = composerSelected.map(g => composerGetObjBounds(g));

            // Helpers that position an object's visual AABB (rotation-aware):
            // setting the AABB origin means adjusting translate by the offset
            // between the translate origin and the AABB origin.
            const setBoundsX = (g, b, x) => { g.dataset.tx = x - b.offX; composerApplyTransform(g); };
            const setBoundsY = (g, b, y) => { g.dataset.ty = y - b.offY; composerApplyTransform(g); };

            if (mode === 'canvas-center') {
                composerSelected.forEach((g, i) => {
                    const b = bounds[i];
                    setBoundsX(g, b, (COMPOSER_VB_W - b.w) / 2);
                    setBoundsY(g, b, (COMPOSER_VB_H - b.h) / 2);
                });
            } else if (composerSelected.length >= 2) {
                switch (mode) {
                    case 'left': {
                        const minX = Math.min(...bounds.map(b => b.x));
                        composerSelected.forEach((g, i) => setBoundsX(g, bounds[i], minX));
                        break;
                    }
                    case 'right': {
                        const maxRight = Math.max(...bounds.map(b => b.x + b.w));
                        composerSelected.forEach((g, i) => setBoundsX(g, bounds[i], maxRight - bounds[i].w));
                        break;
                    }
                    case 'center-h': {
                        const avgCx = bounds.reduce((s, b) => s + b.x + b.w / 2, 0) / bounds.length;
                        composerSelected.forEach((g, i) => setBoundsX(g, bounds[i], avgCx - bounds[i].w / 2));
                        break;
                    }
                    case 'top': {
                        const minY = Math.min(...bounds.map(b => b.y));
                        composerSelected.forEach((g, i) => setBoundsY(g, bounds[i], minY));
                        break;
                    }
                    case 'bottom': {
                        const maxBot = Math.max(...bounds.map(b => b.y + b.h));
                        composerSelected.forEach((g, i) => setBoundsY(g, bounds[i], maxBot - bounds[i].h));
                        break;
                    }
                    case 'center-v': {
                        const avgCy = bounds.reduce((s, b) => s + b.y + b.h / 2, 0) / bounds.length;
                        composerSelected.forEach((g, i) => setBoundsY(g, bounds[i], avgCy - bounds[i].h / 2));
                        break;
                    }
                }
            } else if (composerSelected.length === 1) {
                // Single object: align relative to canvas
                const b = bounds[0];
                const g = composerSelected[0];
                switch (mode) {
                    case 'left':     setBoundsX(g, b, 0); break;
                    case 'right':    setBoundsX(g, b, COMPOSER_VB_W - b.w); break;
                    case 'center-h': setBoundsX(g, b, (COMPOSER_VB_W - b.w) / 2); break;
                    case 'top':      setBoundsY(g, b, 0); break;
                    case 'bottom':   setBoundsY(g, b, COMPOSER_VB_H - b.h); break;
                    case 'center-v': setBoundsY(g, b, (COMPOSER_VB_H - b.h) / 2); break;
                }
            }

            composerUpdateSelectionVisuals();
            composerScheduleCricutPreview();
            composerCommitHistory();
        }

        // ── Remove / Clear ──

        function composerRemoveSelected() {
            if (composerIsPatternPreviewActive()) {
                composerClearPatternOverlay();
                composerPatternSession = null;
                composerClosePatternPanelUI();
            }
            composerSelected.forEach(g => g.remove());
            composerSelected = [];
            composerUpdateStatus();
            composerCommitHistory();
        }

        function composerClear() {
            if (composerIsPatternPreviewActive()) {
                composerClearPatternOverlay();
                composerPatternSession = null;
                composerClosePatternPanelUI();
            }
            composerSvg.querySelectorAll('.composer-object').forEach(g => g.remove());
            composerSelected = [];
            composerNextId = 1;
            composerUpdateStatus();
            composerCommitHistory();
        }

        // ── Merge ──

        function composerGetGroupBounds(g) {
            const tx = parseFloat(g.dataset.tx || 0);
            const ty = parseFloat(g.dataset.ty || 0);
            const s = parseFloat(g.dataset.objScale || 1);

            // Temporarily hide non-content rects for accurate bbox
            const uiEls = g.querySelectorAll('.selection-rect, .hover-outline, .resize-handle, .rotate-handle, .rotate-handle-stem');
            uiEls.forEach(el => el.style.display = 'none');

            let box;
            try { box = g.getBBox(); } catch (e) { box = { x: 0, y: 0, width: 0, height: 0 }; }

            uiEls.forEach(el => el.style.display = '');

            const rot = composerGetRotation(g);
            if (!rot) {
                return {
                    x1: tx + box.x * s,
                    y1: ty + box.y * s,
                    x2: tx + (box.x + box.width) * s,
                    y2: ty + (box.y + box.height) * s
                };
            }

            // Rotate the content bbox corners around the object's rotation
            // pivot (its frame center) and take the extremes.
            const srcW = parseFloat(g.dataset.srcW || 0);
            const srcH = parseFloat(g.dataset.srcH || 0);
            const cx = tx + (srcW * s) / 2;
            const cy = ty + (srcH * s) / 2;
            const rad = rot * Math.PI / 180;
            const cos = Math.cos(rad), sin = Math.sin(rad);
            const corners = [
                [tx + box.x * s, ty + box.y * s],
                [tx + (box.x + box.width) * s, ty + box.y * s],
                [tx + box.x * s, ty + (box.y + box.height) * s],
                [tx + (box.x + box.width) * s, ty + (box.y + box.height) * s],
            ];
            let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
            corners.forEach(([px, py]) => {
                const rx = cx + (px - cx) * cos - (py - cy) * sin;
                const ry = cy + (px - cx) * sin + (py - cy) * cos;
                x1 = Math.min(x1, rx); x2 = Math.max(x2, rx);
                y1 = Math.min(y1, ry); y2 = Math.max(y2, ry);
            });
            return { x1, y1, x2, y2 };
        }

        function composerSerializeGroupContent(g) {
            const serializer = new XMLSerializer();
            const skip = [
                'selection-rect', 'hover-outline', 'resize-handle', 'rotate-handle', 'rotate-handle-stem',
                'composer-pattern-preview'
            ];
            let inner = '';
            Array.from(g.children).forEach(child => {
                if (child.classList && skip.some(c => child.classList.contains(c))) return;
                inner += serializer.serializeToString(child);
            });
            return inner;
        }

        // Wraps one composer object's real content (never its transient
        // selection/hover/resize/rotate UI, nor a pattern-preview overlay) in
        // a standalone <svg> sized to its own source dimensions — this is the
        // per-object "svg" field persisted by captureComposer.
        function wrapComposerContent(g) {
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${g.dataset.srcW} ${g.dataset.srcH}">` +
                composerSerializeGroupContent(g) +
                '</svg>';
        }

        // Snapshot of the live composer scene for project save. Only real
        // .composer-object nodes are captured (in their current DOM/layer
        // order) — never transient selection handles, hover outlines, an
        // active pattern-preview overlay, or drag/pan/zoom state. A
        // composer object's sourceObjectId is only kept if that extracted
        // object is still live; otherwise it's blanked ('') rather than
        // saved as a dangling reference the codec would reject.
        function captureComposer() {
            if (!composerSvg) return null;
            const objects = Array.from(composerSvg.querySelectorAll('.composer-object'));
            return {
                width: COMPOSER_VB_W,
                height: COMPOSER_VB_H,
                productId: composerProductId || '',
                cricut: persistedCricutOptions(getComposerCricutOptions(false)),
                objects: objects.map(g => {
                    const candidateSourceId = g.dataset.sourceObjectId || '';
                    return {
                        id: g.dataset.composerId,
                        sourceObjectId: projectWorkspace.extractedObjects.has(candidateSourceId) ? candidateSourceId : '',
                        sourceWidth: parseFloat(g.dataset.srcW),
                        sourceHeight: parseFloat(g.dataset.srcH),
                        x: parseFloat(g.dataset.tx),
                        y: parseFloat(g.dataset.ty),
                        scale: parseFloat(g.dataset.objScale),
                        baseScale: parseFloat(g.dataset.baseScale),
                        rotation: composerGetRotation(g),
                        svg: wrapComposerContent(g)
                    };
                })
            };
        }

        // Rebuilds the composer scene from a captureComposer() record: opens
        // (or reuses) the composer canvas without scrolling, restores the
        // Cricut border/flood fields, then recreates every object in the
        // saved DOM/layer order via createComposerObjectFromRecord.
        function hydrateComposer(record) {
            if (!record) return;
            ensureComposer(record.productId, { scroll: false });
            document.getElementById('composerCricutBorder').value = record.cricut.outerBufferPx;
            document.getElementById('composerCricutFlood').value = record.cricut.gapFloodPx;
            record.objects.forEach(createComposerObjectFromRecord);
            composerDeselectAll();
            composerUpdateStatus();
            composerScheduleCricutPreview();
            composerResetHistory();
        }

        function composerMerge() {
            if (composerIsPatternPreviewActive()) {
                composerCancelPatternPreview();
            }
            const objects = composerSvg.querySelectorAll('.composer-object');
            if (objects.length === 0) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            objects.forEach(g => {
                const b = composerGetGroupBounds(g);
                minX = Math.min(minX, b.x1);
                minY = Math.min(minY, b.y1);
                maxX = Math.max(maxX, b.x2);
                maxY = Math.max(maxY, b.y2);
            });
            if (!isFinite(minX)) return;

            const mergedW = maxX - minX;
            const mergedH = maxY - minY;

            let content = '';
            objects.forEach(g => {
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const s = parseFloat(g.dataset.objScale || 1);
                const rot = composerGetRotation(g);
                const srcW = parseFloat(g.dataset.srcW || 0);
                const srcH = parseFloat(g.dataset.srcH || 0);
                const inner = composerSerializeGroupContent(g);
                content += `<g transform="${composerBuildTransform(tx - minX, ty - minY, s, rot, srcW, srcH)}">${inner}</g>`;
            });

            const mergedSvgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${mergedW} ${mergedH}" width="${mergedW}" height="${mergedH}">${content}</svg>`;

            const productId = composerProductId || 'composed';
            // Thread refs sized so re-adding this merged card to the composer
            // lands at fitScale = 1 — i.e. its native composer-units size —
            // keeping it scale-consistent with the un-merged siblings it was
            // built from. mergedW/mergedH are already in composer units, so
            // passing the original plate's pixel dims would over-shrink it.
            const mergedRef = COMPOSER_VB_W * 0.7;
            // Objects containers are keyed on the stable source id, not the
            // productId, so route the merged card to a real source card:
            // prefer a source matching the composer's productId, else the
            // first available source. (Falls back to null -> productId, which
            // fails clearly if there are no source cards to attach to.)
            const mergeControlKey = resolveObjectsControlKey(productId);
            const mergedCard = createExtractedObjectCard(
                mergedSvgStr, Math.round(mergedW), Math.round(mergedH), productId, 'Merged', mergedRef, mergedRef,
                mergeControlKey ? { controlKey: mergeControlKey, sourceId: mergeControlKey } : {}
            );
            if (!mergedCard) {
                composerStatus.textContent = 'Unable to merge: Convert at least one source to SVG first.';
                return false;
            }

            composerStatus.textContent = 'Merged! New object card created. You can add it back to the composer for further composition.';
            return true;
        }

        // ── Cricut export from composer ──

        function buildComposerCricutExportSvg() {
            const objects = composerSvg.querySelectorAll('.composer-object');
            if (objects.length === 0) return null;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            objects.forEach(g => {
                const b = composerGetGroupBounds(g);
                minX = Math.min(minX, b.x1);
                minY = Math.min(minY, b.y1);
                maxX = Math.max(maxX, b.x2);
                maxY = Math.max(maxY, b.y2);
            });
            if (!isFinite(minX)) return null;

            const w = maxX - minX;
            const h = maxY - minY;

            // The composer coordinate space is small (800-unit viewBox), so
            // passing those raw values to generateCricutPNG produces a low-res
            // render.  Compute an upscale factor that brings the output close
            // to the original source-image resolution.
            let maxSrcDim = 0;
            let maxComposerDim = 0;
            objects.forEach(g => {
                const srcW = parseFloat(g.dataset.srcW || 0);
                const srcH = parseFloat(g.dataset.srcH || 0);
                const s = parseFloat(g.dataset.objScale || 1);
                maxSrcDim = Math.max(maxSrcDim, srcW, srcH);
                maxComposerDim = Math.max(maxComposerDim, srcW * s, srcH * s);
            });
            const upscale = maxComposerDim > 0 ? Math.max(1, maxSrcDim / maxComposerDim) : 1;

            const W = w * upscale;
            const H = h * upscale;

            const tmpSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            tmpSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            tmpSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            tmpSvg.setAttribute('width', W);
            tmpSvg.setAttribute('height', H);

            objects.forEach(g => {
                const tx = parseFloat(g.dataset.tx || 0);
                const ty = parseFloat(g.dataset.ty || 0);
                const s = parseFloat(g.dataset.objScale || 1);
                const rot = composerGetRotation(g);
                const gSrcW = parseFloat(g.dataset.srcW || 0);
                const gSrcH = parseFloat(g.dataset.srcH || 0);
                const gWrap = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                gWrap.setAttribute('transform', composerBuildTransform((tx - minX) * upscale, (ty - minY) * upscale, s * upscale, rot, gSrcW, gSrcH));
                const skipCls = ['selection-rect', 'hover-outline', 'resize-handle', 'rotate-handle', 'rotate-handle-stem'];
                Array.from(g.children).forEach(child => {
                    if (child.classList && skipCls.some(c => child.classList.contains(c))) return;
                    gWrap.appendChild(child.cloneNode(true));
                });
                tmpSvg.appendChild(gWrap);
            });

            const pid = composerProductId || 'composed';
            return {
                svg: tmpSvg,
                productId: pid,
                width: Math.round(W),
                height: Math.round(H)
            };
        }

        async function composerExportCricut(options) {
            const exportData = buildComposerCricutExportSvg();
            if (!exportData) return;
            await generateCricutPNG(exportData.svg, exportData.productId, exportData.width, exportData.height, options);
        }
    </script>
</body>
</html>
